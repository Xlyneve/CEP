<style>
@font-face {
  font-family: 'fors';

body {
  margin: 0;
  font-family: 'fors', sans-serif;
  font-size: 12px;
  color: #222;
  background: none;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: url('site-background.webp') no-repeat center center;
  background-size: cover;
  filter: blur(25px) brightness(0.88) saturate(1.08);
  z-index: -1;
  pointer-events: none;
}
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(
      circle at 70% 40%,
      rgba(232, 205, 255, 0.20),
      transparent 38%
    ),
    linear-gradient(
      90deg,
      rgba(255, 239, 166, 0.10),
      rgba(232, 205, 255, 0.18),
      rgba(214, 245, 255, 0.16)

  z-index: -1;
  pointer-events: none;
}

/* Full width top header glassmorphism */
.top-header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 70px; /* adjust height if needed */
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px; /* horizontal padding */
  background: rgba(255, 255, 255, 0.2); /* frosted glass */
  border-bottom: 1px solid rgba(255, 255, 255, 0.3);
  border-radius: 0 0 16px 16px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);

  animation: fadeIn 1.5s ease forwards;
}

.page-header h1 {
  margin: 0;
  font-size: 24px;
  color: #222;
}


@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-5px); }
  to { opacity: 1; transform: translateY(0); }
}

}

.input-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;

  position: fixed;
  bottom: 80px;
  right: 20px;

  width: 300px;
  max-width: calc(100vw - 40px);

  padding: 15px;
  border-radius: 14px;

  background: rgba(255, 255, 255, 0.72);
  backdrop-filter: blur(18px) saturate(160%);

    0 0 22px rgba(255, 255, 255, 0.35),
    inset 0 0 18px rgba(255, 255, 255, 0.22);

  transform: translateY(calc(100% + 120px));
  opacity: 0;

  transition:
    transform 0.4s ease,
    opacity 0.4s ease,
    box-shadow 0.4s ease;

  z-index: 5000;
  pointer-events: auto;
}

.input-group.show {

    0 0 24px rgba(255, 239, 166, 0.28),
    0 0 28px rgba(232, 205, 255, 0.24),

/* Glassy input fields */
.input-group input[type="text"],

}

@keyframes copiedShimmerSweep {
  0% {

  }

  pendingNewNoteTimestamp = createdAt;

  const text = plainTextToHTML(rawText);

  const newDoc = await addDoc(collection(db, 'explainNotes'), {
    title: title || 'Untitled',
    text,
    timestamp: createdAt
  });

  newestNoteId = newDoc.id;
  resetAddForm();
});

function resetAddForm() {
  const titleEl = document.getElementById('noteTitle');
  const textEl = document.getElementById('noteText');
  const inputGroup = document.querySelector('.input-group');
  const toggleBtn = document.getElementById('toggleInput');

  if (titleEl) titleEl.value = '';
  if (textEl) {
    textEl.value = '';
    textEl.style.height = '';
  }

  closeAddPanel();
}
// --- Render notes ---
function renderNotes(notesToRender = allNotes) {
  const container = document.getElementById('notesContainer');
  container.innerHTML = '';

  notesToRender.forEach((note) => {
    const card = document.createElement('div');
	card.className = note.editing ? 'note-card editing-note' : 'note-card';
	card.style.position = 'relative';
	card.dataset.id = note.id;
	
	if (
  note.id === newestNoteId ||
  (pendingNewNoteTimestamp && note.timestamp === pendingNewNoteTimestamp)
) {
  card.classList.add('new-note-highlight');

  setTimeout(() => {
    card.scrollIntoView({
      behavior: 'smooth',
      block: 'center',
      inline: 'nearest'
    });
  }, 300);

  setTimeout(() => {
    card.classList.remove('new-note-highlight');
    newestNoteId = null;
    pendingNewNoteTimestamp = null;
  }, 2600);
}

    if (note.editing) {
      card.innerHTML = `
        <input type="text" id="editTitle-${note.id}" class="edit-title" value="${escapeAttr(note.title)}" />
        <div id="editText-${note.id}" class="edit-box" contenteditable="true">${note.text || ''}</div>
        <div class="formatting-buttons">
  <button type="button" class="btn-bold-edit">Bold</button>
<button type="button" class="btn-underline-edit">Underline</button>
<button type="button" class="btn-highlight-edit">Highlight</button>
</div>
        <div class="timestamp">Last updated: ${formatTS(note.timestamp)}</div>
        <div class="edit-controls" style="display:flex; gap:8px; margin-top:8px;">
  <button type="button" class="btn-save-edit">Save</button>
<button type="button" class="btn-cancel-edit">Cancel</button>
</div>
        
      `;
    } else {
      const displayText = linkifyUrlsInHTML(
  removeDuplicateBracketLinks(note.text || '')
);

card.innerHTML = `
  <div class="note-title">${escapeHTML(note.title)}</div>
  <div class="note-text">${displayText}</div>
  <div class="timestamp">Saved on ${formatTS(note.timestamp)}</div>
  <div class="btn-group">
    <button class="btn-edit" title="Edit">✎</button>
	<button class="btn-delete" title="Delete">×</button>
  </div>
  
`;
    }

    // Click-to-copy note text only
    card.addEventListener('click', (e) => {
     if (e.target.closest('button, input, textarea, a, [contenteditable="true"]')) return;
      copyNoteHTML(note, card);
    });

    // Long press to show Edit/Delete
    let pressTimer;
    const startPress = () => {
      if (note.editing) return;
      pressTimer = setTimeout(() => {
        card.classList.add('show-buttons');
      }, 800);
    };
    const clearPress = () => clearTimeout(pressTimer);

    card.addEventListener('pointerdown', startPress);
    card.addEventListener('pointerup', clearPress);
    card.addEventListener('pointerleave', clearPress);
    card.addEventListener('pointercancel', clearPress);

    container.appendChild(card);
  });
}

document.getElementById('notesContainer').addEventListener('paste', (e) => {
  const editBox = e.target.closest('.edit-box');
  if (!editBox) return;

  e.preventDefault();

  const html = e.clipboardData.getData('text/html');
  const text = e.clipboardData.getData('text/plain');

  const content = html
    ? cleanPastedHTML(html)
    : escapeHTML(text).replace(/\n/g, '<br>');

  document.execCommand('insertHTML', false, content);
});

function formatTS(ts){ try { return new Date(ts).toLocaleString(); } catch { return ''; } }

function escapeHTML(s=''){
  return s.replace(/[&<>"']/g, m => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#39;'
  }[m]));
}

function escapeAttr(s=''){ 
  return escapeHTML(s); 
}

function plainTextToHTML(text = '') {
  return escapeHTML(text)
    .replace(/\r\n/g, '\n')
    .replace(/\n/g, '<br>');
}

function getFilteredNotes(){
  if (!currentFilter) return allNotes;

  return allNotes.filter(n =>
    (n.title || '').toLowerCase().includes(currentFilter) ||
    (stripHTML(n.text || '').toLowerCase().includes(currentFilter))
  );
}
// Toggle edit
window.toggleEdit = (id) => {
  const note = allNotes.find(n => n.id === id);
  if (!note) return;
  note._originalTitle = note.title;
  note._originalText = note.text;
  note.editing = true;
  renderNotes(getFilteredNotes());
};

// Save edits
window.saveEdit = async (id) => {
  const note = allNotes.find(n => n.id === id);
  if (!note) return;

  const titleEl = document.getElementById(`editTitle-${id}`);
  const textEl = document.getElementById(`editText-${id}`);

  const newTitle = (titleEl?.value || '').trim();
  const newText = (textEl?.innerHTML || '').trim();

  // Important: force card out of edit mode BEFORE Firestore refreshes
  forceExitEditingId = id;
  note.title = newTitle || 'Untitled';
  note.text = newText;
  note.editing = false;
  delete note._originalTitle;
  delete note._originalText;

  renderNotes(getFilteredNotes());

  await updateDoc(doc(db, 'explainNotes', id), {
    title: newTitle || 'Untitled',
    text: newText,
    timestamp: new Date().toISOString()
  });
};

// Cancel edits
window.cancelEdit = (id) => {
  const note = allNotes.find(n => n.id === id);
  if (!note) return;

  forceExitEditingId = id;
  note.title = note._originalTitle ?? note.title;
  note.text = note._originalText ?? note.text;
  note.editing = false;
  delete note._originalTitle;
  delete note._originalText;

  renderNotes(getFilteredNotes());
};

// Delete note
window.deleteNote = async (id) => {
  if (confirm("Delete this note?")) {
    await deleteDoc(doc(db, 'explainNotes', id));
  }
};

function cleanPastedHTML(html = '') {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;

  // Remove unsafe / messy tags
  tmp.querySelectorAll('script, style, meta, link').forEach(el => el.remove());

  tmp.querySelectorAll('*').forEach(el => {
    [...el.attributes].forEach(attr => {
      const name = attr.name.toLowerCase();

      // Remove onclick/onload/etc
      if (name.startsWith('on')) {
        el.removeAttribute(attr.name);
      }

      // Remove pasted font/size/color/spacing styles
      if (name === 'style') {
        el.removeAttribute('style');
      }

      // Remove random pasted classes except your highlight class
      if (name === 'class' && !el.classList.contains('highlight-gradient')) {
        el.removeAttribute('class');
      }

      // Remove Word/Google Docs junk
      if (name.startsWith('data-') || name.startsWith('aria-')) {
        el.removeAttribute(attr.name);
      }
    });
  });

  return tmp.innerHTML;
}

function normalizeUrl(url) {
  const v = String(url || '').trim();
  if (!v) return '';
  if (/^(https?:\/\/|mailto:|tel:)/i.test(v)) return v;
  return `https://${v}`;
}

function removeDuplicateBracketLinks(html = '') {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;

  const normalizeCompare = (url = '') =>
    normalizeUrl(url)
      .replace(/\/$/, '')
      .toLowerCase();

  tmp.querySelectorAll('a').forEach(a => {
    const href = normalizeCompare(a.getAttribute('href') || a.textContent || '');
    if (!href) return;

    let node = a.nextSibling;
    let steps = 0;

    while (node && steps < 6) {
      steps++;

      // Skip spaces and line breaks between link and duplicate bracket URL
      if (node.nodeType === Node.TEXT_NODE && node.textContent.trim() === '') {
        node = node.nextSibling;
        continue;
      }

      if (node.nodeType === Node.ELEMENT_NODE && node.tagName === 'BR') {
        const br = node;
        node = node.nextSibling;
        br.remove();
        continue;
      }

      if (node.nodeType !== Node.TEXT_NODE) break;

      const text = node.textContent || '';

      const bracketUrlMatch = text.match(/\(\s*(https?:\/\/[^\s)]+)\s*\)/i);
      if (!bracketUrlMatch) break;

      const bracketUrl = normalizeCompare(bracketUrlMatch[1]);

      if (bracketUrl === href) {
        node.textContent = text.replace(bracketUrlMatch[0], '').trimStart();
      }

      break;
    }
  });

  return tmp.innerHTML;
}

function linkifyUrlsInHTML(html = '') {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;

  const walker = document.createTreeWalker(tmp, NodeFilter.SHOW_TEXT);
  const textNodes = [];

  while (walker.nextNode()) {
    const node = walker.currentNode;
    if (!node.parentElement.closest('a')) {
      textNodes.push(node);
    }
  }

  const urlRegex = /((https?:\/\/)?(www\.)?([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}(\/[^\s<]*)?)/g;

  textNodes.forEach(node => {
    const text = node.nodeValue;
    urlRegex.lastIndex = 0;

    if (!urlRegex.test(text)) return;
    urlRegex.lastIndex = 0;

    const frag = document.createDocumentFragment();
    let lastIndex = 0;

    let match;

    while ((match = urlRegex.exec(text)) !== null) {
      const urlText = match[0];
      const offset = match.index;

      frag.appendChild(document.createTextNode(text.slice(lastIndex, offset)));

      const a = document.createElement('a');
      a.href = normalizeUrl(urlText);
      a.textContent = urlText;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';

      frag.appendChild(a);

      lastIndex = offset + urlText.length;
    }

    frag.appendChild(document.createTextNode(text.slice(lastIndex)));
    node.replaceWith(frag);
  });

  return tmp.innerHTML;
}

async function copyNoteHTML(note, cardEl){
  const textEl = cardEl.querySelector('.note-text') || document.getElementById(`editText-${note.id}`);
  const html = textEl ? textEl.innerHTML : '';
  if (!html) return;

  const normalizedHTML = linkifyUrlsInHTML(
  removeDuplicateBracketLinks(
    removeLeadingIndent(
      normalizeHighlightWrappers(html)
    )
  )
);

  const plain = stripHTML(normalizedHTML);

  const showTick = () => {
  cardEl.classList.remove('show-copied');

  // Restart animation every time the card is copied
  void cardEl.offsetWidth;

  cardEl.classList.add('show-copied');

  setTimeout(() => {
    cardEl.classList.remove('show-copied');
  }, 1500);
};

  try {
    if (navigator.clipboard && window.ClipboardItem) {
      const data = {
        'text/html': new Blob([normalizedHTML], { type: 'text/html' }),
        'text/plain': new Blob([plain], { type: 'text/plain' })
      };

      await navigator.clipboard.write([new ClipboardItem(data)]);
      showTick();
      return;
    }
  } catch {}

  const onCopy = (e) => {
    e.preventDefault();
    e.clipboardData.setData('text/html', normalizedHTML);
    e.clipboardData.setData('text/plain', plain);
  };

  document.addEventListener('copy', onCopy, { once: true });
  document.execCommand('copy');
  showTick();
}

// Highlight wrapper normalization
function normalizeHighlightWrappers(html){
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  tmp.querySelectorAll('mark').forEach(el => {
  const span = document.createElement('span');
  span.className = 'highlight-gradient';
  while(el.firstChild) span.appendChild(el.firstChild);
  el.replaceWith(span);
});
  tmp.querySelectorAll('[style*="background-color"], [style*="background"]').forEach(el => {
  const span = document.createElement('span');
  span.className = 'highlight-gradient';
  while(el.firstChild) span.appendChild(el.firstChild);
  el.replaceWith(span);
});
  return tmp.innerHTML;
}

function removeLeadingIndent(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;

  // remove leading spaces, tabs, NBSPs and blank <br> before actual content
  while (tmp.firstChild) {
    const node = tmp.firstChild;

    if (node.nodeType === Node.TEXT_NODE) {
      node.textContent = node.textContent.replace(/^[\s\u00A0]+/, '');
      if (!node.textContent) {
        tmp.removeChild(node);
        continue;
      }
      break;
    }

    if (
      node.nodeType === Node.ELEMENT_NODE &&
      node.tagName === 'BR'
    ) {
      tmp.removeChild(node);
      continue;
    }

    // if first node is an element, clean its leading text too
    const walker = document.createTreeWalker(node, NodeFilter.SHOW_TEXT, null);
    const firstText = walker.nextNode();
    if (firstText) {
      firstText.textContent = firstText.textContent.replace(/^[\s\u00A0]+/, '');
    }
    break;
  }

  return tmp.innerHTML;
}

function stripHTML(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;

  tmp.querySelectorAll('br').forEach(br => {
    br.replaceWith('\n');
  });

  tmp.querySelectorAll('div, p').forEach(block => {
    if (block.nextSibling) block.append('\n');
  });

  return tmp.textContent || tmp.innerText || '';
}

// Format buttons
window.formatText = function(id, command){
  const editableDiv = document.getElementById(`editText-${id}`);
  if (!editableDiv) return;

  editableDiv.focus();

  if (command === 'bold') {
    document.execCommand('bold', false, null);
    return;
  }
  
  if (command === 'underline') {
  document.execCommand('underline', false, null);
  return;
}

  if (command === 'highlight') {
    const selection = window.getSelection();
    if (!selection.rangeCount) return;

    const range = selection.getRangeAt(0);
    const selectedText = selection.toString();
    if (!selectedText.trim()) return;

    const container = range.commonAncestorContainer;
    const parent = container.nodeType === 3 ? container.parentNode : container;

    if (parent.classList && parent.classList.contains('highlight-gradient')) {
      const textNode = document.createTextNode(parent.textContent);
      parent.replaceWith(textNode);
    } else {
      const span = document.createElement('span');
      span.className = 'highlight-gradient';
      span.textContent = selectedText;

      range.deleteContents();
      range.insertNode(span);
    }

    selection.removeAllRanges();
  }
};

// Search
document.getElementById('searchInput').addEventListener('input', e=>{
  currentFilter = e.target.value.toLowerCase();
  renderNotes(getFilteredNotes());
});

// Firestore live sync
onSnapshot(collection(db, 'explainNotes'), snapshot => {
  const previousEditing = new Map(
    allNotes
      .filter(n => n.editing && n.id !== forceExitEditingId)
      .map(n => [n.id, {
        editing: true,
        _originalTitle: n._originalTitle,
        _originalText: n._originalText
      }])
  );

  allNotes = snapshot.docs.map(docSnap => {
    const existingEdit = previousEditing.get(docSnap.id);

    return {
      ...docSnap.data(),
      id: docSnap.id,
      editing: existingEdit?.editing || false,
      _originalTitle: existingEdit?._originalTitle,
      _originalText: existingEdit?._originalText
    };
  });

  forceExitEditingId = null;
  renderNotes(getFilteredNotes());
});

// Toggle input group visibility
const toggleBtn = document.getElementById('toggleInput');
const inputGroup = document.querySelector('.input-group');
const noteTitle = document.getElementById('noteTitle');
const noteText = document.getElementById('noteText');

function openAddPanel() {
  inputGroup.classList.add('show');
  toggleBtn.textContent = '×';
}

function closeAddPanel() {
  inputGroup.classList.remove('show');
  toggleBtn.textContent = '+';
}

toggleBtn.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  e.stopPropagation();

  if (inputGroup.classList.contains('show')) {
    closeAddPanel();
  } else {
    openAddPanel();
  }
});

inputGroup.addEventListener('pointerdown', (e) => {
  e.stopPropagation();
});

document.addEventListener('pointerdown', (e) => {
  if (
    inputGroup.classList.contains('show') &&
    !inputGroup.contains(e.target) &&
    !toggleBtn.contains(e.target)
  ) {
    closeAddPanel();
  }
});

// Floating input formatting buttons
function formatFloatingText(command) {
  noteText.focus();
  const HIGHLIGHT_COLOR = '#F3F5A9';
  if (command === 'bold') document.execCommand('bold', false, null);
  else if (command === 'highlight') {
    try{
      const supported = document.queryCommandSupported && document.queryCommandSupported('hiliteColor');
      if(supported) document.execCommand('hiliteColor', false, HIGHLIGHT_COLOR);
      else document.execCommand('backColor', false, HIGHLIGHT_COLOR);
    }catch{ document.execCommand('backColor', false, HIGHLIGHT_COLOR);}
  }
}

noteText.addEventListener('input', () => {
  noteText.style.height = 'auto';
  noteText.style.height = noteText.scrollHeight + 'px';
});

document.addEventListener('input', (e) => {
  if (e.target.classList.contains('edit-title')) {
