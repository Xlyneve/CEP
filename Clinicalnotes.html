<!DOCTYPE html>
<html lang="en">
<head>
  <script src="auth-guard.js"></script>
  <script src="security.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clinical Notes</title>
<style>
/* General page setup */
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  font-family: 'Tahoma', sans-serif;
  overflow-x: hidden;
  position: relative;
  flex-direction: column;
  color: #111;
  background: none;
}

/* Frosted iPhone-style background */
body::before {
  content: "";
  position: fixed;
  inset: 0;

  background: url('2b.png') no-repeat 85% center fixed;
  background-size: cover;

  filter: blur(18px) brightness(0.82) saturate(0.85);
  transform: scale(1.08);

  z-index: -2;
  pointer-events: none;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;

  background:
    linear-gradient(
      to left,
      rgba(198, 198, 205, 0.52) 0%,
      rgba(198, 198, 205, 0.40) 18%,
      rgba(198, 198, 205, 0.22) 40%,
      rgba(198, 198, 205, 0.08) 65%,
      rgba(198, 198, 205, 0.02) 100%
    ),
    linear-gradient(
      135deg,
      rgba(255, 255, 255, 0.015),
      rgba(235, 233, 242, 0.025),
      rgba(255, 255, 255, 0.015)
    );

  backdrop-filter: blur(4px) saturate(90%);
  -webkit-backdrop-filter: blur(4px) saturate(90%);

  z-index: -1;
  pointer-events: none;
}

.main {
  display: flex;
  padding-top: 30px;
  gap: 12px;
  align-items: flex-start;
  
    width: 100%;
  min-height: 100vh;
  box-sizing: border-box;
}

.input-panel {
  transition:
    transform 0.28s ease,
    opacity 0.22s ease,
    padding 0.22s ease,
    border-color 0.22s ease;
}

.input-panel,
.note-card,
.pinned-note {
  will-change: transform, opacity;
}

.main.panel-hidden {
  gap: 0;
}

.main.panel-hidden .input-panel {
  flex-basis: 0;
  width: 0;
  padding: 0;
  border-color: transparent;
  opacity: 0;
  transform: translateX(-110%);
  pointer-events: none;
  overflow: hidden;
}

 .panel-toggle {
  position: fixed;
  left: 12px;
  top: 14px;
  transform: none;

  width: 32px;
  height: 46px;
  border-radius: 999px;

  border: 1px solid rgba(255, 255, 255, 0.68);
  background: rgba(255, 255, 255, 0.34);

  backdrop-filter: blur(16px) saturate(180%);
  -webkit-backdrop-filter: blur(16px) saturate(180%);

  box-shadow:
    0 8px 22px rgba(80, 90, 120, 0.16),
    inset 0 1px 0 rgba(255, 255, 255, 0.62),
    0 0 18px rgba(255, 255, 255, 0.36);

  color: rgba(20, 20, 30, 0.82);
  font-size: 26px;
  line-height: 1;
  cursor: pointer;
  z-index: 3000;

  transition:
    left 0.35s ease,
    background 0.25s ease,
    transform 0.25s ease;
}

.panel-toggle:hover {
  background: rgba(255, 255, 255, 0.56);
  transform: scale(1.06);
}

.main:not(.panel-hidden) .panel-toggle {
  left: 276px;
}

.input-panel {
  flex: 0 0 260px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 15px;
  border-radius: 24px;

  background:
    linear-gradient(
      145deg,
      rgba(255, 255, 255, 0.34),
      rgba(255, 255, 255, 0.12)
    );

  backdrop-filter: blur(18px) saturate(150%);
-webkit-backdrop-filter: blur(18px) saturate(150%);

  border: 1px solid rgba(255, 255, 255, 0.48);

  box-shadow:
    0 18px 42px rgba(0, 0, 0, 0.12),
    inset 0 1px 0 rgba(255, 255, 255, 0.48),
    inset 0 -22px 34px rgba(255, 255, 255, 0.12);

  height: calc(100vh - 40px);
  box-sizing: border-box;
  overflow-y: auto;
}

/* Pretty glass scrollbar for left panel only */
.input-panel {
  scrollbar-width: thin;
  scrollbar-color: rgba(255, 255, 255, 0.55) transparent;
}

.input-panel::-webkit-scrollbar {
  width: 7px;
}

.input-panel::-webkit-scrollbar-track {
  background: transparent;
}

.input-panel::-webkit-scrollbar-thumb {
  background: rgba(255, 255, 255, 0.42);
  border-radius: 999px;

  border: 1px solid rgba(255, 255, 255, 0.45);

  box-shadow:
    inset 0 0 6px rgba(255, 255, 255, 0.55),
    0 0 10px rgba(255, 255, 255, 0.22);

  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

.input-panel::-webkit-scrollbar-thumb:hover {
  background: rgba(255, 255, 255, 0.68);
}

.top-search {
  position: fixed;
  top: 14px;
  left: 80px;
  z-index: 3000;

  transition: left 0.35s ease;
}

.main:not(.panel-hidden) .top-search {
  left: 330px;
}

.top-search input {
  width: 210px;
  border: 1px solid rgba(255, 255, 255, 0.58);
  outline: none;

  background: rgba(255, 255, 255, 0.36);
  backdrop-filter: blur(18px) saturate(160%);
  -webkit-backdrop-filter: blur(18px) saturate(160%);

  border-radius: 999px;
  padding: 8px 13px;
  font-size: 12px;
  color: rgba(20, 20, 30, 0.90);

  box-shadow:
    0 8px 22px rgba(80, 90, 120, 0.14),
    inset 0 1px 0 rgba(255, 255, 255, 0.62);
}

.top-search input:focus {
  background: rgba(255, 255, 255, 0.58);
  border-color: rgba(255, 255, 255, 0.9);
}

.pinned-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 7px;
}

.pinned-title {
  margin-bottom: 0;
}

.pinned-edit-toggle {
  margin-top: 0 !important;
  padding: 3px 8px !important;
  border-radius: 999px !important;

  font-size: 10px;
  font-family: Tahoma, sans-serif;

  border: 1px solid rgba(255, 255, 255, 0.58) !important;
  background: rgba(255, 255, 255, 0.28) !important;

  color: rgba(20, 20, 30, 0.72) !important;

  backdrop-filter: blur(10px) saturate(150%);
  -webkit-backdrop-filter: blur(10px) saturate(150%);

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.55),
    0 4px 10px rgba(80,90,120,0.10);

  cursor: pointer;
}

.pinned-edit-toggle.active {
  background: rgba(255, 255, 255, 0.58) !important;
  color: rgba(20, 20, 30, 0.95) !important;
}

.unpin-btn {
  opacity: 0;
  transform: scale(0.88);
  pointer-events: none;
}

.pinned-box.editing-pins .unpin-btn {
  opacity: 1;
  transform: scale(1);
  pointer-events: auto;
}


.pinned-box {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid rgba(255, 255, 255, 0.42);
}

.pinned-title {
  font-size: 11px;
  font-weight: 700;
  margin-bottom: 7px;
  color: rgba(20, 20, 30, 0.72);
}

.pinned-notes-list {
  display: flex;
  flex-direction: column;
  gap: 7px;
}

.pinned-note {
  position: relative;
  padding: 8px 30px 8px 9px;
  border-radius: 14px;

  background: rgba(255, 255, 255, 0.32);
  border: 1px solid rgba(255, 255, 255, 0.55);

  box-shadow:
    0 6px 14px rgba(80, 90, 120, 0.10),
    inset 0 1px 0 rgba(255, 255, 255, 0.58);

  cursor: pointer;
}

.pinned-note-title {
  font-family: 'Tahoma', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: #222;
  margin-bottom: 4px;
}

.pinned-note-preview {
  font-family: 'Tahoma', sans-serif;
  font-size: 10px;
  color: #333;
  line-height: 1.35;

  white-space: pre-wrap;
  word-wrap: break-word;
  overflow: visible;
}

.unpin-btn {
  position: absolute;
  top: 6px;
  right: 6px;

  width: 20px;
  height: 20px;
  border-radius: 999px;

  display: inline-flex;
  align-items: center;
  justify-content: center;

  border: 1px solid rgba(255, 255, 255, 0.65);
  background: rgba(255, 255, 255, 0.34);

  backdrop-filter: blur(10px) saturate(170%);
  -webkit-backdrop-filter: blur(10px) saturate(170%);

  color: rgba(20, 20, 30, 0.72);
  font-size: 11px;
  line-height: 1;
  cursor: pointer;

  opacity: 0;
  transform: scale(0.88);
  pointer-events: none;

  transition:
    opacity 160ms ease,
    transform 160ms ease,
    background 160ms ease;
}


.unpin-btn:hover {
  background: rgba(255, 255, 255, 0.58);
}


/* Inputs */
.input-panel input {
  border: 1px solid rgba(255, 255, 255, 0.58);
  outline: none;

  background: rgba(255, 255, 255, 0.32);
  backdrop-filter: blur(18px) saturate(160%);
  -webkit-backdrop-filter: blur(18px) saturate(160%);

  border-radius: 14px;
  padding: 8px 11px;
  font-size: 12px;
  color: rgba(20, 20, 30, 0.90);

  transition: background 0.2s, box-shadow 0.2s, border-color 0.2s;
  width: 100%;
  box-sizing: border-box;
}

.input-panel input:focus {
  background: rgba(255, 255, 255, 0.54);
  border-color: rgba(255, 255, 255, 0.82);
  box-shadow:
    0 8px 18px rgba(80, 90, 120, 0.10),
    inset 0 1px 0 rgba(255, 255, 255, 0.72);
}

/* Editable left panel note box */
#noteText.editable {
  border: 1px solid rgba(255, 255, 255, 0.58);
  outline: none;

  background: rgba(255, 255, 255, 0.32);
  backdrop-filter: blur(18px) saturate(160%);
  -webkit-backdrop-filter: blur(18px) saturate(160%);

  border-radius: 16px;
  padding: 10px 12px;
  font-size: 12px;
  color: rgba(20, 20, 30, 0.90);

  transition: background 0.2s, box-shadow 0.2s, height 0.2s ease;
  width: 100%;
  box-sizing: border-box;
  min-height: 100px;
  max-height: none;
  overflow: hidden;
  white-space: pre-wrap;
  word-wrap: break-word;
}

#noteText.editable:focus {
  background: rgba(255, 255, 255, 0.54);
  border-color: rgba(255, 255, 255, 0.82);
  box-shadow:
    0 8px 18px rgba(80, 90, 120, 0.10),
    inset 0 1px 0 rgba(255, 255, 255, 0.72);
}
#noteText.editable:empty:before {
  content: attr(data-placeholder);
  color: rgba(0,0,0,0.45);
}

/* Buttons */
.input-panel button, .format-buttons button {
  cursor: pointer;
  border-radius: 8px;
  padding: 6px 10px;
  transition: 0.3s;
}
.input-panel button {
  margin-top: 6px;
  background: rgba(255, 255, 255, 0.3);
  color: black;
  border: 2px solid rgba(255, 255, 255, 0.8);
}
.input-panel button:hover {
  background: rgba(255, 255, 255, 0.9);
  color: #6f42c1;
  border-color: #6f42c1;
}
.format-buttons button {
  background: rgba(255, 255, 255, 0.6);
  color: black;
  border: 2px solid rgba(255, 255, 255, 0.8);
}
.format-buttons button:hover {
  background: rgba(255, 255, 255, 0.9);
  color: #6f42c1;
  border-color: #6f42c1;
}
#addNoteHint {
  font-size: 10px;
  color: rgba(0,0,0,0.5);
  margin-top: 4px;
}


/* Notes masonry panel - true masonry using CSS columns */
.notes-panel {
  flex: 1;                /* use remaining width */
  column-count: 1;        /* default: 1 column */
  column-gap: 16px;
  padding: 30px 16px 16px 50px;
  box-sizing: border-box;
 
}

/* Each note fits into a column */
.note-card {
  position: relative;
  display: inline-block;
  width: 88%;

  padding: 14px;
  margin-bottom: 14px;
  border-radius: 24px;

  background:
  linear-gradient(
    145deg,
    rgba(255, 255, 255, 0.32),
    rgba(255, 255, 255, 0.11)
  );

  backdrop-filter: blur(16px) saturate(150%);
-webkit-backdrop-filter: blur(16px) saturate(150%);

  border: 1px solid rgba(255, 255, 255, 0.46);

  box-shadow:
    0 18px 42px rgba(20, 70, 110, 0.12),
    inset 0 1px 0 rgba(255, 255, 255, 0.46),
    inset 0 -24px 36px rgba(255, 255, 255, 0.06);

  color: rgba(20, 20, 30, 0.92);
  overflow: hidden;
  overflow-wrap: break-word;
  break-inside: avoid;

  transition:
    transform 0.18s ease,
    background 0.18s ease,
    box-shadow 0.18s ease;
}

.note-card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;

  background:
    radial-gradient(
      circle at 25% 12%,
      rgba(255, 255, 255, 0.30),
      rgba(255, 255, 255, 0.08) 34%,
      transparent 56%
    ),
    linear-gradient(
      145deg,
      rgba(160, 245, 255, 0.06),
      rgba(255, 255, 255, 0.03),
      rgba(80, 150, 255, 0.04)
    );

  pointer-events: none;
}

.note-card::after {
  content: "";
  position: absolute;
  left: 12%;
  top: 8px;
  width: 58%;
  height: 26%;

  border-radius: 999px;

  background:
    linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.18),
      rgba(255, 255, 255, 0.02)
    );

  filter: blur(8px);
  pointer-events: none;
}

.note-card > * {
  position: relative;
  z-index: 1;
}

/* Responsive column adjustments */
@media (min-width: 480px) { .notes-panel { column-count: 2; } }
@media (min-width: 768px) { .notes-panel { column-count: 3; } }
@media (min-width: 1024px) { .notes-panel { column-count: 4; } }


/* Titles and content */
.note-title {
  font-weight: 700;
  font-size: 13.5px;
  margin-bottom: 4px;
  color: rgba(20, 20, 30, 0.94);
  text-shadow: none;
}

.note-content {
  margin-bottom: 8px;
  font-size: 12.5px;
  white-space: pre-wrap;
  word-wrap: break-word;
  color: rgba(20, 20, 30, 0.84);
  text-shadow: none;
}
.note-actions { display: flex; justify-content: flex-end; gap: 6px; margin-top: 6px; }

/* Glassy buttons for note-actions */
/* Subtle lift on hover */
.note-card:hover {
  transform: translateY(-3px);

  background:
    linear-gradient(
      145deg,
      rgba(255, 255, 255, 0.56),
      rgba(255, 255, 255, 0.26)
    );

  box-shadow:
    0 22px 48px rgba(20, 70, 110, 0.20),
    inset 0 1px 0 rgba(255, 255, 255, 0.90),
    inset 0 -24px 36px rgba(255, 255, 255, 0.16);
}

/* Title and content remain understated */
.note-title {
  font-weight: 600;
  font-size: 13.5px;
  margin-bottom: 4px;
  color: #222;
}

.note-content {
  margin-bottom: 8px;
  font-size: 12.5px;
  white-space: pre-wrap;
  word-wrap: break-word;
  color: #333;
}

.note-actions button {
  background: rgba(255, 255, 255, 0.28);
  color: rgba(20, 20, 30, 0.86);

  border: 1px solid rgba(255, 255, 255, 0.52);
  border-radius: 12px;
  padding: 5px 10px;
  font-size: 11.5px;

  backdrop-filter: blur(18px) saturate(180%);
  -webkit-backdrop-filter: blur(18px) saturate(180%);

  cursor: pointer;
  transition: all 0.2s ease;

  box-shadow:
    0 6px 14px rgba(80, 80, 120, 0.10),
    inset 0 1px 0 rgba(255, 255, 255, 0.62);
}

.note-actions button:hover {
  background: rgba(255, 255, 255, 0.46);
  transform: scale(1.05);
  border-color: rgba(255, 255, 255, 0.72);
  color: rgba(20, 20, 30, 0.94);

  box-shadow:
    0 8px 18px rgba(80, 90, 120, 0.14),
    inset 0 1px 0 rgba(255, 255, 255, 0.72);
}

.note-card.show-copied {
  animation: copiedWholeCardGlow 1500ms ease;
  overflow: hidden;
}

.note-card.show-copied::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  z-index: 0;

  background:
    radial-gradient(
      circle at center,
      rgba(255, 255, 255, 0.90),
      rgba(255, 255, 255, 0.46) 38%,
      rgba(214, 245, 255, 0.22) 65%,
      rgba(255, 255, 255, 0.08) 100%
    );

  animation: copiedFullGlassGlow 1500ms ease forwards;
}

.note-card.show-copied::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  z-index: 0;

  background:
    linear-gradient(
      145deg,
      rgba(255, 255, 255, 0.42),
      rgba(255, 255, 255, 0.10)
    );

  animation: copiedSoftFrost 1500ms ease forwards;
}

.note-card.show-copied > * {
  position: relative;
  z-index: 2;
}

@keyframes copiedWholeCardGlow {
  0% {
    background:
      linear-gradient(
        145deg,
        rgba(255, 255, 255, 0.32),
        rgba(255, 255, 255, 0.11)
      );

    box-shadow:
      0 18px 42px rgba(20, 70, 110, 0.12),
      inset 0 1px 0 rgba(255, 255, 255, 0.46),
      inset 0 -24px 36px rgba(255, 255, 255, 0.06);
  }

  40% {
  background:
    linear-gradient(
      145deg,
      rgba(255, 255, 255, 0.78),
      rgba(255, 255, 255, 0.44)
    );

  border-color: rgba(255, 255, 255, 1);

  box-shadow:
    inset 0 0 38px rgba(255, 255, 255, 0.92),
    inset 0 0 70px rgba(214, 245, 255, 0.22),
    0 0 30px rgba(255, 255, 255, 0.95),
    0 0 54px rgba(214, 245, 255, 0.38),
    0 0 76px rgba(255, 255, 255, 0.35);
}

  100% {
    background:
      linear-gradient(
        145deg,
        rgba(255, 255, 255, 0.32),
        rgba(255, 255, 255, 0.11)
      );

    box-shadow:
      0 18px 42px rgba(20, 70, 110, 0.12),
      inset 0 1px 0 rgba(255, 255, 255, 0.46),
      inset 0 -24px 36px rgba(255, 255, 255, 0.06);
  }
}

@keyframes copiedFullGlassGlow {
  0% {
    opacity: 0;
  }

  35% {
    opacity: 1;
  }

  100% {
    opacity: 0;
  }
}

@keyframes copiedSoftFrost {
  0% {
    opacity: 0;
  }

  40% {
    opacity: 1;
  }

  100% {
    opacity: 0;
  }
}

/* Login panel */
.login-container { padding: 100px 20px; text-align: center; }
.login-container input { padding: 6px 10px; margin: 4px; font-size: 12px; border-radius: 6px; border: none; background: rgba(255,255,255,0.3); }
.login-container button { padding: 6px 16px; margin-top: 6px; }
</style>

  <div id="loginDiv" class="login-container">

  </div>

<div id="notesDiv" class="main panel-hidden" style="display:none;">

  <!-- Search moved to upper-right -->

  </div>

  <div id="pinnedNotesList" class="pinned-notes-list"></div>
</div>

    <!-- Hint for users -->

    </div>
  </div>
	<button id="panelToggle" class="panel-toggle" type="button">›</button>
	
  <div class="notes-panel" id="notesList"></div>

// --- Firebase config ---
const firebaseConfig = {
  apiKey: "AIzaSyDcM4E3wFhjUwZBYbnZoi1AAQtMe7TzNL8",
  authDomain: "notes-bcba6.firebaseapp.com",
  projectId: "notes-bcba6",
  storageBucket: "notes-bcba6.appspot.com",
  messagingSenderId: "101524739050",
  appId: "1:101524739050:web:7e5fe1c8fa224d69909893",
  measurementId: "G-SFWTJF4XVG"
};

const app = getApps().find(candidate => candidate.name === "clinical-notes") ||
  initializeApp(firebaseConfig, "clinical-notes");
const db   = getFirestore(app);
const auth = getAuth(app);
const allowedEmail = "xeve06@gmail.com";
const notesCol = collection(db, "clinicalNotes");
let ALL_NOTES = [];

// --- Track active editable ---
const noteTextEl = document.getElementById('noteText');
let activeEditable = noteTextEl;

// --- Handle Enter key → insert single <br> and move caret after it ---
noteTextEl.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  e.preventDefault(); 
  noteTextEl.focus();
  const sel = window.getSelection();
  if (!sel) return;

  if (sel.rangeCount === 0) {
    const br = document.createElement('br');
    noteTextEl.appendChild(br);
    const zw = document.createTextNode('\u200B');
    noteTextEl.appendChild(zw);
    const rng = document.createRange();
    rng.setStartAfter(zw);
    rng.collapse(true);
    sel.removeAllRanges();
    sel.addRange(rng);
    if (typeof autoGrow === 'function') autoGrow(noteTextEl);
    return;
  }

  const range = sel.getRangeAt(0);
  range.deleteContents();
  const br = document.createElement('br');
  range.insertNode(br);
  const zw = document.createTextNode('\u200B');
  br.parentNode.insertBefore(zw, br.nextSibling);
  range.setStartAfter(zw);
  range.collapse(true);
  sel.removeAllRanges();
  sel.addRange(range);
  if (typeof autoGrow === 'function') autoGrow(noteTextEl);
});

// --- Auth flow ---
onAuthStateChanged(auth, async user => {
  const authorized = user && user.emailVerified && user.email.toLowerCase() === allowedEmail;
  if (authorized) {
    document.getElementById('loginDiv').style.display  = 'none';
    document.getElementById('notesDiv').style.display  = 'flex';
    renderNotes();
  } else {
    if (user) await signOut(auth);
    document.getElementById('loginDiv').style.display  = 'block';
    document.getElementById('notesDiv').style.display  = 'none';
  }
});

document.getElementById('loginBtn').addEventListener('click', async () => {
  try {
    await signInWithPopup(auth, new GoogleAuthProvider());
  } catch (err) {
    document.getElementById('loginError').textContent = err.message;
  }
});

const pinnedBox = document.querySelector('.pinned-box');
const pinnedEditToggle = document.getElementById('pinnedEditToggle');

pinnedEditToggle.addEventListener('click', (e) => {
  e.stopPropagation();

  PINNED_EDIT_MODE = !PINNED_EDIT_MODE;

  pinnedBox.classList.toggle('editing-pins', PINNED_EDIT_MODE);
  pinnedEditToggle.classList.toggle('active', PINNED_EDIT_MODE);
  pinnedEditToggle.textContent = PINNED_EDIT_MODE ? 'Done' : 'Edit';
});

// --- Formatting buttons ---
window.formatText = (cmd) => {
  if (!activeEditable) return;
  activeEditable.focus();
  document.execCommand(cmd, false, null);
};

// --- Auto-resize contenteditable ---
const autoGrow = el => {
  if (el.textContent.trim() === '') el.innerHTML = '';
  el.style.height = 'auto';
  el.style.height = Math.max(100, el.scrollHeight) + 'px';
};
noteTextEl.addEventListener('input', () => autoGrow(noteTextEl));
noteTextEl.addEventListener('blur',  () => autoGrow(noteTextEl));
autoGrow(noteTextEl);

// --- Add Note ---
document.getElementById('addNoteBtn').addEventListener('click', async () => {
  const title = document.getElementById('noteTitle').value.trim() || "Untitled";
  const noteHTML = noteTextEl.innerHTML.trim();
  const url = document.getElementById('noteURL').value.trim();
  if (!noteHTML.replace(/<br\s*\/?>/gi,'').trim()) { alert("Cannot add empty note"); return; }

  try {
    await addDoc(notesCol, {
  title,
  note: noteHTML,
  url,
  pinned: false,
  time: new Date().toISOString()
});
    document.getElementById('noteTitle').value = '';
    document.getElementById('noteURL').value = '';
    noteTextEl.innerHTML = '';
    autoGrow(noteTextEl);
  } catch (err) {
    console.error(err);
    alert("Failed to add note");
  }
});

// --- Render Notes ---
function renderNotes() {
  onSnapshot(notesCol, snapshot => {
    ALL_NOTES = snapshot.docs.map(d => ({ id: d.id, ...d.data() }))
      .sort((a,b) => new Date(b.time) - new Date(a.time));

    drawNotes(ALL_NOTES);
  });
}

function renderPinnedNotes() {
  const pinnedList = document.getElementById('pinnedNotesList');
  if (!pinnedList) return;

  const pinnedNotes = ALL_NOTES.filter(n => n.pinned);

  pinnedList.innerHTML = '';

  if (!pinnedNotes.length) {
    pinnedList.innerHTML = `<div style="font-size:10px; color:rgba(0,0,0,0.45);">No pinned notes yet</div>`;
    return;
  }

  pinnedNotes.forEach(note => {
    const item = document.createElement('div');
    item.className = 'pinned-note';

    const title = document.createElement('div');
    title.className = 'pinned-note-title';
    title.textContent = note.title || 'Untitled';

    const preview = document.createElement('div');
    preview.className = 'pinned-note-preview';

    const tmp = document.createElement('div');
	CEPSecurity.setHTML(tmp, note.note || '');

	CEPSecurity.setHTML(preview, note.note || '');

    const unpin = document.createElement('button');
	unpin.className = 'unpin-btn';
	unpin.textContent = '×';
	unpin.title = 'Remove from pinned notes';

    unpin.addEventListener('click', async (e) => {
      e.stopPropagation();

      await updateDoc(doc(db, 'clinicalNotes', note.id), {
        pinned: false
      });
    });

    item.addEventListener('click', () => {
  if (PINNED_EDIT_MODE) return;

  const plainContent = tmp.innerText || '';

  navigator.clipboard.writeText(plainContent).then(() => {
    item.animate(
          [
            { background: 'rgba(255, 255, 255, 0.32)' },
            { background: 'rgba(255, 255, 255, 0.72)' },
            { background: 'rgba(255, 255, 255, 0.32)' }
          ],
          {
            duration: 900,
            easing: 'ease'
          }
        );
      });
    });

    item.append(title, preview, unpin);
    pinnedList.appendChild(item);
  });
}

function drawNotes(notesArray) {
  renderPinnedNotes();

  const list = document.getElementById('notesList');
  list.innerHTML = '';

  notesArray.forEach(data => {
    const div = document.createElement('div');
    div.className = 'note-card';

    // --- Title ---
    const titleEl = document.createElement('div');
    titleEl.className = 'note-title';
    titleEl.textContent = data.title || "Untitled";

    // --- Content ---
    const contentEl = document.createElement('div');
    contentEl.className = 'note-content';
    CEPSecurity.setHTML(contentEl, data.note || "");

    // --- Actions (Edit/Delete) ---
    const actions = document.createElement('div');
    actions.className = 'note-actions';
    actions.style.display = 'none';
    actions.innerHTML = `
  <button class="pin-btn">${data.pinned ? 'Unpin' : 'Pin'}</button>
  <button class="edit-btn">Edit</button>
  <button class="delete-btn">Delete</button>
`;

    // Append elements to note card
    div.append(titleEl, contentEl, actions);
    list.appendChild(div);

    // --- Copy on click ---
    div.addEventListener('click', () => {
      if (div.classList.contains('is-editing')) return;
      const htmlContent = contentEl.innerHTML;
      const plainContent = contentEl.innerText;

      navigator.clipboard.writeText(plainContent).then(() => {
  div.classList.remove('show-copied');

  // Restart animation every copy
  void div.offsetWidth;

  div.classList.add('show-copied');

  setTimeout(() => {
    div.classList.remove('show-copied');
  }, 1500);
});
    });

    // --- Long press to show actions ---
    let pressTimer;
    const startPress = () => { pressTimer = setTimeout(() => { actions.style.display='flex'; }, 800); };
    const endPress = () => clearTimeout(pressTimer);

    div.addEventListener('mousedown', startPress);
    div.addEventListener('mouseup', endPress);
    div.addEventListener('mouseleave', endPress);
    div.addEventListener('touchstart', startPress, {passive:true});
    div.addEventListener('touchend', endPress);
	
	actions.querySelector('.pin-btn').addEventListener('click', async (e) => {
  e.stopPropagation();

  await updateDoc(doc(db, 'clinicalNotes', data.id), {
    pinned: !data.pinned
  });
});

    // --- Delete ---
    actions.querySelector('.delete-btn').addEventListener('click', async (e) => {
  e.stopPropagation();
      if (confirm("Delete note?")) {
        await deleteDoc(doc(db, 'clinicalNotes', data.id));
      }
    });

    // --- Edit ---
    actions.querySelector('.edit-btn').addEventListener('click', (e) => {
  e.stopPropagation();
      div.classList.add('is-editing');
      titleEl.contentEditable = 'true';
      contentEl.contentEditable = 'true';
      activeEditable = contentEl;

      actions.innerHTML = `
        <button class="save-btn">Save</button>
        <button class="cancel-btn">Cancel</button>
      `;
      actions.style.display='flex';

      // --- Save ---
      actions.querySelector('.save-btn').addEventListener('click', async (e) => {
  e.stopPropagation();
        const newTitle = titleEl.textContent.trim() || "Untitled";
        const newHTML = contentEl.innerHTML.trim();
        if(!newHTML){ alert("Cannot save empty note"); return; }

        await updateDoc(doc(db, 'clinicalNotes', data.id), {
          title: newTitle,
          note: newHTML,
          url: data.url || '',
          time: new Date().toISOString()
        });

        div.classList.remove('is-editing');
        titleEl.contentEditable = 'false';
        contentEl.contentEditable = 'false';
        actions.style.display='none';
        activeEditable = noteTextEl;
      });

      // --- Cancel ---
      actions.querySelector('.cancel-btn').addEventListener('click', (e) => {
  e.stopPropagation();
        div.classList.remove('is-editing');
        titleEl.contentEditable = 'false';
        contentEl.contentEditable = 'false';
        actions.style.display='none';
        activeEditable = noteTextEl;
      });
    });

  });
}


// --- Search ---
document.getElementById('searchInput').addEventListener('input', e => {
  const term = e.target.value.toLowerCase();

  const filtered = ALL_NOTES.filter(n =>
    (n.title || '').toLowerCase().includes(term) ||
    (n.note || '').toLowerCase().includes(term)
  );

  drawNotes(filtered);
});

const notesDiv = document.getElementById('notesDiv');
const panelToggle = document.getElementById('panelToggle');

panelToggle.addEventListener('click', (e) => {
  e.preventDefault();
  e.stopPropagation();

  notesDiv.classList.toggle('panel-hidden');

  panelToggle.textContent = notesDiv.classList.contains('panel-hidden')
    ? '›'
    : '‹';
});

</script>
