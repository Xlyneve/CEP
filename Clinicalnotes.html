<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clinical Notes</title>
<style>
/* General page setup */
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  font-family: 'Tahoma', sans-serif;
  overflow-x: hidden;
  position: relative;
  flex-direction: column;
  color: #111;
  background: none;
}

/* Frosted iPhone-style background */
body::before {
  content: "";
  position: fixed;
  inset: 0;

  background: url('2b.png') no-repeat center center fixed;
  background-size: cover;

  filter: blur(24px) brightness(1.05) saturate(1.25);
  transform: scale(1.08);

  z-index: -2;
  pointer-events: none;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;

  background:
    linear-gradient(
      135deg,
      rgba(105, 210, 220, 0.14),
      rgba(255, 255, 255, 0.20),
      rgba(110, 170, 255, 0.12)
    );

  backdrop-filter: blur(4px) saturate(130%);
  -webkit-backdrop-filter: blur(4px) saturate(130%);

  z-index: -1;
  pointer-events: none;
}

.main {
  display: flex;
  padding-top: 26px;
  gap: 12px;
  align-items: flex-start;
}

.input-panel {
  flex: 0 0 260px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 15px;
  border-radius: 24px;

  background:
    linear-gradient(
      145deg,
      rgba(255, 255, 255, 0.46),
      rgba(255, 255, 255, 0.20)
    );

  backdrop-filter: blur(30px) saturate(180%);
  -webkit-backdrop-filter: blur(30px) saturate(180%);

  border: 1px solid rgba(255, 255, 255, 0.68);

  box-shadow:
    0 18px 42px rgba(20, 70, 110, 0.16),
    inset 0 1px 0 rgba(255, 255, 255, 0.82),
    inset 0 -22px 34px rgba(255, 255, 255, 0.12);

  height: calc(100vh - 40px);
  box-sizing: border-box;
  overflow-y: auto;
}


/* Inputs */
.input-panel input {
  border: 1px solid rgba(255, 255, 255, 0.58);
  outline: none;

  background: rgba(255, 255, 255, 0.32);
  backdrop-filter: blur(18px) saturate(160%);
  -webkit-backdrop-filter: blur(18px) saturate(160%);

  border-radius: 14px;
  padding: 8px 11px;
  font-size: 12px;
  color: rgba(20, 20, 30, 0.90);

  transition: background 0.2s, box-shadow 0.2s, border-color 0.2s;
  width: 100%;
  box-sizing: border-box;
}

.input-panel input:focus {
  background: rgba(255, 255, 255, 0.54);
  border-color: rgba(255, 255, 255, 0.82);
  box-shadow:
    0 8px 18px rgba(80, 90, 120, 0.10),
    inset 0 1px 0 rgba(255, 255, 255, 0.72);
}

/* Editable left panel note box */
#noteText.editable {
  border: 1px solid rgba(255, 255, 255, 0.58);
  outline: none;

  background: rgba(255, 255, 255, 0.32);
  backdrop-filter: blur(18px) saturate(160%);
  -webkit-backdrop-filter: blur(18px) saturate(160%);

  border-radius: 16px;
  padding: 10px 12px;
  font-size: 12px;
  color: rgba(20, 20, 30, 0.90);

  transition: background 0.2s, box-shadow 0.2s, height 0.2s ease;
  width: 100%;
  box-sizing: border-box;
  min-height: 100px;
  max-height: none;
  overflow: hidden;
  white-space: pre-wrap;
  word-wrap: break-word;
}

#noteText.editable:focus {
  background: rgba(255, 255, 255, 0.54);
  border-color: rgba(255, 255, 255, 0.82);
  box-shadow:
    0 8px 18px rgba(80, 90, 120, 0.10),
    inset 0 1px 0 rgba(255, 255, 255, 0.72);
}
#noteText.editable:empty:before {
  content: attr(data-placeholder);
  color: rgba(0,0,0,0.45);
}

/* Buttons */
.input-panel button, .format-buttons button {
  cursor: pointer;
  border-radius: 8px;
  padding: 6px 10px;
  transition: 0.3s;
}
.input-panel button {
  margin-top: 6px;
  background: rgba(255, 255, 255, 0.3);
  color: black;
  border: 2px solid rgba(255, 255, 255, 0.8);
}
.input-panel button:hover {
  background: rgba(255, 255, 255, 0.9);
  color: #6f42c1;
  border-color: #6f42c1;
}
.format-buttons button {
  background: rgba(255, 255, 255, 0.6);
  color: black;
  border: 2px solid rgba(255, 255, 255, 0.8);
}
.format-buttons button:hover {
  background: rgba(255, 255, 255, 0.9);
  color: #6f42c1;
  border-color: #6f42c1;
}
#addNoteHint {
  font-size: 10px;
  color: rgba(0,0,0,0.5);
  margin-top: 4px;
}


/* Notes masonry panel - true masonry using CSS columns */
.notes-panel {
  flex: 1;                /* use remaining width */
  column-count: 1;        /* default: 1 column */
  column-gap: 16px;
  padding: 16px;
  box-sizing: border-box;
 
}

/* Each note fits into a column */
.note-card {
  position: relative;
  display: inline-block;
  width: 88%;

  padding: 14px;
  margin-bottom: 14px;
  border-radius: 24px;

  background:
    linear-gradient(
      145deg,
      rgba(255, 255, 255, 0.48),
      rgba(255, 255, 255, 0.20)
    );

  backdrop-filter: blur(34px) saturate(190%);
  -webkit-backdrop-filter: blur(34px) saturate(190%);

  border: 1px solid rgba(255, 255, 255, 0.66);

  box-shadow:
    0 18px 42px rgba(20, 70, 110, 0.16),
    inset 0 1px 0 rgba(255, 255, 255, 0.82),
    inset 0 -24px 36px rgba(255, 255, 255, 0.12);

  color: rgba(20, 20, 30, 0.92);
  overflow: hidden;
  overflow-wrap: break-word;
  break-inside: avoid;

  transition:
    transform 0.18s ease,
    background 0.18s ease,
    box-shadow 0.18s ease;
}

.note-card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;

  background:
    radial-gradient(
      circle at 25% 12%,
      rgba(255, 255, 255, 0.68),
      rgba(255, 255, 255, 0.16) 34%,
      transparent 56%
    ),
    linear-gradient(
      145deg,
      rgba(160, 245, 255, 0.14),
      rgba(255, 255, 255, 0.08),
      rgba(80, 150, 255, 0.08)
    );

  pointer-events: none;
}

.note-card::after {
  content: "";
  position: absolute;
  left: 12%;
  top: 8px;
  width: 58%;
  height: 26%;

  border-radius: 999px;

  background:
    linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.42),
      rgba(255, 255, 255, 0.05)
    );

  filter: blur(8px);
  pointer-events: none;
}

.note-card > * {
  position: relative;
  z-index: 1;
}

/* Responsive column adjustments */
@media (min-width: 480px) { .notes-panel { column-count: 2; } }
@media (min-width: 768px) { .notes-panel { column-count: 3; } }
@media (min-width: 1024px) { .notes-panel { column-count: 4; } }


/* Titles and content */
.note-title {
  font-weight: 700;
  font-size: 13.5px;
  margin-bottom: 4px;
  color: rgba(20, 20, 30, 0.94);
  text-shadow: none;
}

.note-content {
  margin-bottom: 8px;
  font-size: 12.5px;
  white-space: pre-wrap;
  word-wrap: break-word;
  color: rgba(20, 20, 30, 0.84);
  text-shadow: none;
}
.note-actions { display: flex; justify-content: flex-end; gap: 6px; margin-top: 6px; }

/* Glassy buttons for note-actions */
/* Subtle lift on hover */
.note-card:hover {
  transform: translateY(-3px);

  background:
    linear-gradient(
      145deg,
      rgba(255, 255, 255, 0.56),
      rgba(255, 255, 255, 0.26)
    );

  box-shadow:
    0 22px 48px rgba(20, 70, 110, 0.20),
    inset 0 1px 0 rgba(255, 255, 255, 0.90),
    inset 0 -24px 36px rgba(255, 255, 255, 0.16);
}

/* Title and content remain understated */
.note-title {
  font-weight: 600;
  font-size: 13.5px;
  margin-bottom: 4px;
  color: #222;
}

.note-content {
  margin-bottom: 8px;
  font-size: 12.5px;
  white-space: pre-wrap;
  word-wrap: break-word;
  color: #333;
}

.note-actions button {
  background: rgba(255, 255, 255, 0.28);
  color: rgba(20, 20, 30, 0.86);

  border: 1px solid rgba(255, 255, 255, 0.52);
  border-radius: 12px;
  padding: 5px 10px;
  font-size: 11.5px;

  backdrop-filter: blur(18px) saturate(180%);
  -webkit-backdrop-filter: blur(18px) saturate(180%);

  cursor: pointer;
  transition: all 0.2s ease;

  box-shadow:
    0 6px 14px rgba(80, 80, 120, 0.10),
    inset 0 1px 0 rgba(255, 255, 255, 0.62);
}

.note-actions button:hover {
  background: rgba(255, 255, 255, 0.46);
  transform: scale(1.05);
  border-color: rgba(255, 255, 255, 0.72);
  color: rgba(20, 20, 30, 0.94);

  box-shadow:
    0 8px 18px rgba(80, 90, 120, 0.14),
    inset 0 1px 0 rgba(255, 255, 255, 0.72);
}


.note-actions button:hover {
  background: rgba(255,255,255,0.5);
  color: #6f42c1;
  border-color: rgba(111,66,193,0.5);
}.note-actions button:hover {
  background: rgba(255,255,255,0.45);
  transform: scale(1.05);
  border-color: rgba(111,66,193,0.5);
  color: #6f42c1;
  box-shadow: 0 4px 12px rgba(111,66,193,0.3);
}

/* Simple bold check mark */
.copy-check {
  position: absolute;
  top: 8px;
  right: 8px;
  font-size: 26px;       /* slightly larger */
  font-weight: 1000;      /* bold */
  color: #bbc5f8;        /* soft yellow */
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transform: scale(0.5);
  animation: popFade 1s ease forwards;
  pointer-events: none;  /* so it doesn’t block clicks */
  
}

@keyframes popFade {
  0% { opacity: 0; transform: scale(0.5); }
  30% { opacity: 1; transform: scale(1.2); }
  60% { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(0.8); }
}

/* Login panel */
.login-container { padding: 100px 20px; text-align: center; }
.login-container input { padding: 6px 10px; margin: 4px; font-size: 12px; border-radius: 6px; border: none; background: rgba(255,255,255,0.3); }
.login-container button { padding: 6px 16px; margin-top: 6px; }
</style>

</head>
<body>

  <!-- LOGIN PANEL -->
  <div id="loginDiv" class="login-container">
    <h2>Login</h2>
    <input type="email" id="loginEmail" placeholder="Email"><br>
    <input type="password" id="loginPass" placeholder="Password"><br>
    <button id="loginBtn">Login</button>
    <div id="loginError" style="color:red; margin-top:5px;"></div>
  </div>

  <!-- MAIN NOTES PANEL -->
  <div id="notesDiv" class="main" style="display:none;">
  <div class="input-panel">
    <!-- Search -->
    <div class="search-container">
      <input type="text" id="searchInput" placeholder="Search notes...">
    </div>

    <input id="noteTitle" placeholder="Title">

    <div class="format-buttons">
      <button type="button" onclick="formatText('bold')"><b>B</b></button>
      <button type="button" onclick="formatText('italic')"><i>I</i></button>
      <button type="button" onclick="formatText('underline')"><u>U</u></button>
    </div>

    <!-- Editable div instead of textarea -->
    <div id="noteText" class="editable" contenteditable="true" data-placeholder="Note..."></div>

    <input id="noteURL" placeholder="Optional URL">
    <button id="addNoteBtn">Add Note</button>

    <!-- Hint for users -->
    <div id="addNoteHint" style="font-size:10px; color:rgba(0,0,0,0.5); margin-top:4px; font-family: Tahoma, sans-serif;">
      Use Shift + Enter for a new line
    </div>
  </div>

  <div class="notes-panel" id="notesList"></div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
import {
  getAuth, signInWithEmailAndPassword, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

// --- Firebase config ---
const firebaseConfig = {
  apiKey: "AIzaSyDcM4E3wFhjUwZBYbnZoi1AAQtMe7TzNL8",
  authDomain: "notes-bcba6.firebaseapp.com",
  projectId: "notes-bcba6",
  storageBucket: "notes-bcba6.appspot.com",
  messagingSenderId: "101524739050",
  appId: "1:101524739050:web:7e5fe1c8fa224d69909893",
  measurementId: "G-SFWTJF4XVG"
};

const app  = initializeApp(firebaseConfig);
const db   = getFirestore(app);
const auth = getAuth(app);
const notesCol = collection(db, "clinicalNotes");
let ALL_NOTES = [];


// --- Track active editable ---
const noteTextEl = document.getElementById('noteText');
let activeEditable = noteTextEl;

// --- Handle Enter key → insert single <br> and move caret after it ---
noteTextEl.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  e.preventDefault(); 
  noteTextEl.focus();
  const sel = window.getSelection();
  if (!sel) return;

  if (sel.rangeCount === 0) {
    const br = document.createElement('br');
    noteTextEl.appendChild(br);
    const zw = document.createTextNode('\u200B');
    noteTextEl.appendChild(zw);
    const rng = document.createRange();
    rng.setStartAfter(zw);
    rng.collapse(true);
    sel.removeAllRanges();
    sel.addRange(rng);
    if (typeof autoGrow === 'function') autoGrow(noteTextEl);
    return;
  }

  const range = sel.getRangeAt(0);
  range.deleteContents();
  const br = document.createElement('br');
  range.insertNode(br);
  const zw = document.createTextNode('\u200B');
  br.parentNode.insertBefore(zw, br.nextSibling);
  range.setStartAfter(zw);
  range.collapse(true);
  sel.removeAllRanges();
  sel.addRange(range);
  if (typeof autoGrow === 'function') autoGrow(noteTextEl);
});

// --- Auth flow ---
onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById('loginDiv').style.display  = 'none';
    document.getElementById('notesDiv').style.display  = 'flex';
    renderNotes();
  } else {
    document.getElementById('loginDiv').style.display  = 'block';
    document.getElementById('notesDiv').style.display  = 'none';
  }
});

document.getElementById('loginBtn').addEventListener('click', async () => {
  const email = document.getElementById('loginEmail').value;
  const pass  = document.getElementById('loginPass').value;
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch (err) {
    document.getElementById('loginError').textContent = err.message;
  }
});

// --- Formatting buttons ---
window.formatText = (cmd) => {
  if (!activeEditable) return;
  activeEditable.focus();
  document.execCommand(cmd, false, null);
};

// --- Auto-resize contenteditable ---
const autoGrow = el => {
  if (el.textContent.trim() === '') el.innerHTML = '';
  el.style.height = 'auto';
  el.style.height = Math.max(100, el.scrollHeight) + 'px';
};
noteTextEl.addEventListener('input', () => autoGrow(noteTextEl));
noteTextEl.addEventListener('blur',  () => autoGrow(noteTextEl));
autoGrow(noteTextEl);

// --- Add Note ---
document.getElementById('addNoteBtn').addEventListener('click', async () => {
  const title = document.getElementById('noteTitle').value.trim() || "Untitled";
  const noteHTML = noteTextEl.innerHTML.trim();
  const url = document.getElementById('noteURL').value.trim();
  if (!noteHTML.replace(/<br\s*\/?>/gi,'').trim()) { alert("Cannot add empty note"); return; }

  try {
    await addDoc(notesCol, { title, note: noteHTML, url, time: new Date().toISOString() });
    document.getElementById('noteTitle').value = '';
    document.getElementById('noteURL').value = '';
    noteTextEl.innerHTML = '';
    autoGrow(noteTextEl);
  } catch (err) {
    console.error(err);
    alert("Failed to add note");
  }
});

// --- Render Notes ---
function renderNotes() {
  onSnapshot(notesCol, snapshot => {
    ALL_NOTES = snapshot.docs.map(d => ({ id: d.id, ...d.data() }))
      .sort((a,b) => new Date(b.time) - new Date(a.time));

    drawNotes(ALL_NOTES);
  });
}

function drawNotes(notesArray) {
  const list = document.getElementById('notesList');
  list.innerHTML = '';  // clear existing notes

  notesArray.forEach(data => {
    const div = document.createElement('div');
    div.className = 'note-card';

    // --- Title ---
    const titleEl = document.createElement('div');
    titleEl.className = 'note-title';
    titleEl.textContent = data.title || "Untitled";

    // --- Content ---
    const contentEl = document.createElement('div');
    contentEl.className = 'note-content';
    contentEl.innerHTML = data.note || "";

    // --- Actions (Edit/Delete) ---
    const actions = document.createElement('div');
    actions.className = 'note-actions';
    actions.style.display = 'none';
    actions.innerHTML = `
      <button class="edit-btn">Edit</button>
      <button class="delete-btn">Delete</button>
    `;

    // Append elements to note card
    div.append(titleEl, contentEl, actions);
    list.appendChild(div);

    // --- Copy on click ---
    div.addEventListener('click', () => {
      if (div.classList.contains('is-editing')) return;
      const htmlContent = contentEl.innerHTML;
      const plainContent = contentEl.innerText;

      navigator.clipboard.writeText(plainContent).then(() => {
        const check = document.createElement('div');
        check.className = 'copy-check';
        check.textContent = '✓';
        div.style.position = 'relative';
        div.appendChild(check);
        setTimeout(() => check.remove(), 1100);
      });
    });

    // --- Long press to show actions ---
    let pressTimer;
    const startPress = () => { pressTimer = setTimeout(() => { actions.style.display='flex'; }, 800); };
    const endPress = () => clearTimeout(pressTimer);

    div.addEventListener('mousedown', startPress);
    div.addEventListener('mouseup', endPress);
    div.addEventListener('mouseleave', endPress);
    div.addEventListener('touchstart', startPress, {passive:true});
    div.addEventListener('touchend', endPress);

    // --- Delete ---
    actions.querySelector('.delete-btn').addEventListener('click', async () => {
      if (confirm("Delete note?")) {
        await deleteDoc(doc(db, 'clinicalNotes', data.id));
      }
    });

    // --- Edit ---
    actions.querySelector('.edit-btn').addEventListener('click', () => {
      div.classList.add('is-editing');
      titleEl.contentEditable = 'true';
      contentEl.contentEditable = 'true';
      activeEditable = contentEl;

      actions.innerHTML = `
        <button class="save-btn">Save</button>
        <button class="cancel-btn">Cancel</button>
      `;
      actions.style.display='flex';

      // --- Save ---
      actions.querySelector('.save-btn').addEventListener('click', async () => {
        const newTitle = titleEl.textContent.trim() || "Untitled";
        const newHTML = contentEl.innerHTML.trim();
        if(!newHTML){ alert("Cannot save empty note"); return; }

        await updateDoc(doc(db, 'clinicalNotes', data.id), {
          title: newTitle,
          note: newHTML,
          url: data.url || '',
          time: new Date().toISOString()
        });

        div.classList.remove('is-editing');
        titleEl.contentEditable = 'false';
        contentEl.contentEditable = 'false';
        actions.style.display='none';
        activeEditable = noteTextEl;
      });

      // --- Cancel ---
      actions.querySelector('.cancel-btn').addEventListener('click', () => {
        div.classList.remove('is-editing');
        titleEl.contentEditable = 'false';
        contentEl.contentEditable = 'false';
        actions.style.display='none';
        activeEditable = noteTextEl;
      });
    });

  });
}

// --- Search ---
document.getElementById('searchInput').addEventListener('input', e => {
  const term = e.target.value.toLowerCase();

  const filtered = ALL_NOTES.filter(n =>
    (n.title || '').toLowerCase().includes(term) ||
    (n.note || '').toLowerCase().includes(term)
  );

  drawNotes(filtered);
});

</script>



</body>
</html>
