<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Minimal Chat with Full Features</title>
<style>
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  font-family: 'Tahoma', sans-serif;
  color: #222;
  display: flex;
  flex-direction: column;
  overflow: hidden;

  /* Background image */
  background: url('2b.png') no-repeat center center fixed;
  background-size: cover;
  position: relative;
}

/* Glass overlay (must NOT block clicks) */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(255, 255, 255, 0.7);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  z-index: 0;
  pointer-events: none;
}

#chat {
  flex-grow: 1;
  width: 100%;
  padding: 20px 5vw 160px 80px;
  overflow-y: auto;
  font-size: 12px;
  background: rgba(255, 255, 255, 0.25);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  box-sizing: border-box;
  border-radius: 12px;
  position: relative;
  z-index: 1;
}

/* Live results area */
#liveResults {
  position: relative;
  z-index: 2;
}

/* Message bubbles */
.message {
  margin-left: 7px;
  margin-bottom: 8px;
  line-height: 1.6;
  font-size: 12px;
  white-space: pre-wrap;
  word-wrap: break-word;
  word-break: break-word;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}

.message.user { align-items: flex-end; }

.message.bot {
  border-top: 1px solid rgba(0, 0, 0, 0.1);
  padding-top: 12px;
  margin-top: 12px;
  margin-left: 7px;
}

.message img {
  max-width: 100%;
  margin-top: 6px;
  border-radius: 8px;
}

.editableNote a:not(.conceptLink),
.chatBubble a:not(.conceptLink) {
  color: #1a0dab;
  text-decoration: underline;
}

.chatBubble {
  background: rgba(255, 255, 255, 0.88);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);

  border-radius: 16px;
  padding: 10px 16px;
  max-width: 88%;

  border: 1px solid rgba(0, 0, 0, 0.05);
  box-shadow: 0 6px 18px rgba(0, 0, 0, 0.05);

  color: #1f1f1f;
}

.chatBubble { position: relative; overflow: visible; }
.message { overflow: visible; }

.message.user .chatBubble {
  background: rgba(248, 244, 246, 0.75);
}

.message.bot .chatBubble {
  background: rgba(255, 255, 255, 0.75);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

input[type="file"]::file-selector-button {
  background: rgba(255, 255, 255, 0.25);
  border: 1px solid rgba(255, 255, 255, 0.4);
  border-radius: 8px;
  padding: 6px 12px;
  color: #333;
  cursor: pointer;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  box-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
  transition: box-shadow 0.3s ease;
}

input[type="file"]::file-selector-button:hover {
  background: rgba(255, 255, 255, 0.5);
  box-shadow: 0 0 20px 6px rgba(255, 255, 255, 0.7);
  color: #111;
}

/* Input Area */
#inputArea {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  width: 90vw;
  max-width: 600px;
  gap: 10px;
  background: rgba(255, 255, 255, 0.25);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 12px 20px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(100, 100, 100, 0.1);
  z-index: 100;
  box-sizing: border-box;
}

#inputArea, #notePanel {
  background: rgba(255, 255, 255, 0.3);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255, 255, 255, 0.4);
}

#userInput {
  flex-grow: 1;
  font-size: 12px;
  padding: 10px 16px;
  border-radius: 12px;
  border: 1px solid #ddd;
  background: #f9f9f9;
  color: #3a3a3a;
  outline: none;
}

#userInput:focus {
  border-color: #999;
  box-shadow: 0 0 6px rgba(100, 100, 100, 0.4);
}

#sendBtn { display: none; }

/* Note Input */
#noteInput {
  min-height: 60px;
  max-height: 400px;
  overflow-y: auto;
  font-size: 13px;
  padding: 10px;
  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, 0.4);
  background: rgba(255, 255, 255, 0.15);
  color: #222;
  outline: none;
  white-space: pre-wrap;
  margin-top: 0 !important;
  padding-top: 0 !important;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 0 10px 3px rgba(255, 255, 255, 0.3);
}

#noteInput:empty:before {
  content: attr(data-placeholder);
  color: #aaa;
  pointer-events: none;
  display: block;
}

/* Editable Notes */
.editableNote {
  background: none;
  color: #222;
  padding: 4px;
  border: none;
  font-size: 12px;
  font-family: 'Tahoma', sans-serif;
  white-space: pre-wrap;
  outline: none;
}



.resizableEmoji {
  display: inline-block;
  font-size: 1.5em;   /* Bigger than text */
  font-weight: normal;
  line-height: 1;
  vertical-align: middle;
  transform: translateY(0.8px);
}

/* Normal-size inline symbols (arrows, ≤, ≥, etc.) */
.inlineSymbol {
  display: inline-block;
  font-size: 1em;        /* same as text */
  font-weight: normal;
  line-height: 1.1;
  vertical-align: baseline;
  transform: none;
}

/* Tag chips under notes */
.tagRow{
  margin-top: 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.tagChip{
  font-family: 'Tahoma', sans-serif;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 999px;
  cursor: pointer;
  user-select: none;

  background: rgba(208, 160, 163, 0.18);
  border: 1px solid rgba(255, 255, 255, 0.55);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  color: #444;
  opacity: 0.9;
}

.tagChip:hover{
  opacity: 1;
  transform: scale(1.03);
}

/* Toolbar + Toggle */
#formatToggle {
  position: fixed;
  bottom: 40px;
  left: 20px;
  font-size: 20px;
  background: rgba(235, 235, 235, 0.25);
  border-radius: 50%;
  width: 44px;
  height: 44px;
  text-align: center;
  line-height: 44px;
  cursor: pointer;
  z-index: 105;
  box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.4);
  color: #444;
  transition: box-shadow 0.3s ease;
}

#formatToggle:hover {
  box-shadow: 0 0 15px rgba(255, 255, 255, 0.75);
  color: #222;
}

#formatToolbar {
  position: fixed;
  bottom: 80px;
  left: 20px;
  display: none;
  flex-direction: column;
  flex-wrap: nowrap;
  gap: 8px;
  align-items: center;
  justify-content: flex-start;
  background: rgba(255, 255, 255, 0.2);
  border: 1px solid rgba(255, 255, 255, 0.3);
  border-radius: 10px;
  padding: 5px 6px;
  z-index: 104;
  max-height: 500px;
  max-width: 90vw;
  overflow-x: auto;
  white-space: nowrap;
  -webkit-overflow-scrolling: touch;
  box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  scrollbar-width: none;
  -ms-overflow-style: none;
  color: #444;
}

#formatToolbar.visible { display: flex; }

.format-btn {
  flex: 0 0 auto;
  background: none;
  border: none;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  color: #444;
  padding: 6px;
  border-radius: 6px;
  opacity: 0.7;
  transition: transform 0.2s ease, opacity 0.2s ease;
}

.format-btn:hover {
  transform: scale(1.2);
  opacity: 1;
  color: #222;
}

.emoji {
  background: none;
  color: #444;
  border: none;
  cursor: pointer;
  opacity: 0.7;
  font-size: 16px;
  transition: all 0.2s ease;
}

.emoji:hover {
  transform: scale(1.2);
  opacity: 1;
}

/* Note Panel */
#noteContainer {
  position: fixed;
  bottom: 40px;
  right: 20px;
  width: 50px;
  height: 50px;
  z-index: 103;
}

/* Click-to-select image + resize handles (JS adds .img-selected) */
.editableNote img,
#noteInput img {
  max-width: 100%;
  height: auto;
  display: block;
  margin: 10px 0;
  border-radius: 8px;
}

.img-selected {
  outline: 2px solid rgba(208, 160, 163, 0.9);
  outline-offset: 2px;
}

/* Tiny floating resize panel */
#imgSizePanel {
  position: fixed;
  z-index: 10060;
  display: none;
  gap: 8px;
  align-items: center;
  padding: 8px 10px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.55);
  background: rgba(255,255,255,0.45);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.18);
  font-size: 12px;
}

#imgSizePanel input[type="range"] { width: 120px; }
#imgSizePanel input[type="number"] { width: 70px; }
#imgSizePanel button {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 14px;
  opacity: 0.8;
}
#imgSizePanel button:hover { opacity: 1; }
#addNoteToggle {
  position: fixed;
  width: 50px;
  height: 50px;
  font-size: 28px;
  border-radius: 50%;
  background: rgba(208, 160, 163, 0.3);
  color: #333;
  border: 1px solid rgba(255, 255, 255, 0.4);
  cursor: pointer;
  box-shadow: 0 0 12px rgba(208, 160, 163, 0.5);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  transition: box-shadow 0.3s ease;
}

#addNoteToggle:hover {
  box-shadow: 0 0 20px rgba(208, 160, 163, 0.8);
  color: #222;
}

/* =========================
   Minimal Table Style (FIXED)
========================= */

.cellBox {
  display: block;
  width: 100%;
  min-height: 24px;
  padding: 6px 8px;
  box-sizing: border-box;

  outline: none;
  white-space: pre-wrap;
  word-break: break-word;

  overflow: hidden;      /* hide scrollbars normally */
  resize: none;          /* no resize handle by default */
  background: transparent;
  transition: background 0.15s ease;
}

/* Show resize ONLY when hovering */
.editable-table td:hover .cellBox,
.editable-table th:hover .cellBox {
  resize: both;
  overflow: auto;        /* enable scroll only when resizing */
}

.editable-table {
  border-collapse: collapse;
  border: 1px solid rgba(0,0,0,0.15);
}

.editable-table th,
.editable-table td {
  border: 1px solid rgba(0,0,0,0.10);
  padding: 0;
  background: transparent;
  vertical-align: top;   /* fixes middle vs left issue */
  text-align: left;
}

.editable-table th .cellBox {
  font-weight: 600;
}

table.editable-table{
  width: 100%;
  table-layout: auto;   /* allow natural growth */
  border-collapse: collapse;
}

table.editable-table td{
  vertical-align: top;
}

  display: block;
  min-height: 0;        /* no forced height */
  padding: 6px 8px;
  white-space: pre-wrap;
  word-break: break-word;
  outline: none;
}

}

/* Floating table controls */



#notePanel {
  position: absolute;
  bottom: 60px;
  right: 0;
  width: 300px;
  background: rgba(254, 254, 254, 0.25);
  color: #222;
  border-radius: 12px;
  padding: 16px;
  display: none;
  flex-direction: column;
  gap: 12px;
  box-shadow:
    0 0 6px 1px rgba(220, 230, 255, 0.2),
    0 0 25px 8px rgba(204, 153, 255, 0.2);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 255, 255, 0.5);
  z-index: 104;
  transition: none;
}

#addNoteBtn {
  background: rgba(236, 235, 232, 0.25);
  color: #3a3a3a;
  border: 1px solid rgba(255, 255, 255, 0.4);
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  box-shadow: 0 0 10px rgba(236, 235, 232, 0.4);
  transition: box-shadow 0.3s ease;
}

#addNoteBtn:hover {
  box-shadow: 0 0 16px rgba(236, 235, 232, 0.7);
  color: #222;
}

/* =========================
   Concept pills (INLINE-FRIENDLY)
   - still looks like a pill
   - doesn’t “stand off” inside sentences
========================= */
.chatBubble a.conceptLink,
.editableNote a.conceptLink,
a.conceptLink,
a.conceptLink:visited {
  color: #2a2a2a !important;
  text-decoration: none !important;

  display: inline-flex;           /* key: inline + stable */
  align-items: baseline;          /* keeps text aligned */
  gap: 4px;                       /* space before badge */
  vertical-align: baseline;

  padding: 0 6px;                 /* tighter than before */
  border-radius: 10px;            /* less “capsule” */

  /* subtle pill by default */
  background: rgba(208, 160, 163, 0.15);
  border: 1px solid rgba(208, 160, 163, 0.22);

  /* flatter so it doesn’t pop off the line */
  box-shadow: none;

  /* make it readable in sentences */
  line-height: 1.25;
  transform: translateY(0.35px);  /* tiny optical baseline fix */

  cursor: pointer;
  transition:
    background 0.12s ease,
    border-color 0.12s ease,
    box-shadow 0.12s ease,
    transform 0.12s ease;
}


/* tiny visual cue that this concept has an image */
a.conceptLink.hasKbImage::after{
  content: "";
  display: inline-block;
  width: 6px;
  height: 6px;
  margin-left: 5px;
  border-radius: 999px;
  vertical-align: middle;
  background: rgba(170, 150, 210, 0.9);
  box-shadow: 0 0 0 2px rgba(255,255,255,0.7);
}

/* Add a super subtle “link cue” without blue underline */
.chatBubble a.conceptLink,
.editableNote a.conceptLink,
a.conceptLink {
  text-decoration: none !important;
}

/* Hover: more pill + slight lift (only when you interact) */
.chatBubble a.conceptLink:hover,
.editableNote a.conceptLink:hover,
a.conceptLink:hover {
  background: rgba(208, 160, 163, 0.20);
  border-color: rgba(208, 160, 163, 0.40);

  box-shadow:
    0 6px 18px rgba(0,0,0,0.10);

  transform: translateY(-0.5px);
  text-decoration-style: solid;
}

/* Keyboard focus (soft but visible) */
.chatBubble a.conceptLink:focus-visible,
.editableNote a.conceptLink:focus-visible,
a.conceptLink:focus-visible {
  outline: 2px solid rgba(208, 160, 163, 0.35);
  outline-offset: 2px;
}


/* Keyboard focus: visible but still soft */
.chatBubble a.conceptLink:focus-visible,
.editableNote a.conceptLink:focus-visible {
  outline: 2px solid rgba(208, 160, 163, 0.35);
  outline-offset: 2px;
}

/* Concept count badge */
.conceptCount {
  margin-left: 2px;        /* smaller */
  padding: 0 5px;          /* tighter */
  font-size: 9px;
  font-weight: 700;
  border-radius: 999px;
  line-height: 1.2;

  background: rgba(140, 150, 200, 0.18);
  border: 1px solid rgba(140, 150, 200, 0.28);
  color: #444;

  box-shadow: none;
  transform: translateY(-0.5px); /* sits nicer with text */
}

/* Hashtag suggest dropdown */
#tagSuggest {
  position: fixed;
  display: none;
  z-index: 10090;

  min-width: 180px;
  max-width: 70vw;
  max-height: 220px;
  overflow: auto;

  padding: 6px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.55);
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.18);

  font-size: 12px;
}

#tagSuggest .item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;

  padding: 6px 10px;
  border-radius: 10px;
  cursor: pointer;
  user-select: none;
  color: #333;
}

#tagSuggest .item:hover,
#tagSuggest .item.active {
  background: rgba(208, 160, 163, 0.22);
}

#tagSuggest .count {
  opacity: 0.65;
  font-size: 11px;
}

/* search highlight color */
.underlineMatch{

  border-bottom: 1px dotted rgba(0,0,0,0.35);
  padding: 0 2px;
  border-radius: 4px;
}

/* if the browser still applies <mark> defaults */
mark.underlineMatch{
  background: rgba(208, 160, 163, 0.25);
}

/* Floating emoji button + picker */
#floatingEmojiBtn {
  position: fixed;
  display: none;
  z-index: 10050;
  width: 34px;
  height: 34px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.55);

}

#floatingEmojiBtn:hover {

}

#floatingEmojiPanel {
  position: fixed;

  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.55);

}

#floatingEmojiPanel .pick {

#floatingEmojiPanel .pick:hover {

}

/* =========================
   Concept Definition Panel
========================= */
#defPanel {

}
a.conceptLink {

.conceptCount {

}

/* Definition badge/dot (NO tooltip) */
a.conceptLink.hasDef::before{

#defPanel .topRow{
  display:flex;

  gap:10px;
  margin-bottom:8px;
}

#defPanel .title {

}

#defPanel .hint {

}

#defPanel .closeBtn {
  background: none;

}
#defPanel .closeBtn:hover { opacity: 1; }

#defBox {
  width: 100%;
  min-height: 44px;
  height: auto;

  overflow: hidden;        /* ✅ no scrollbars inside the box */
  overflow-x: hidden;      /* ✅ kills horizontal bar */

  white-space: pre-wrap;
  word-break: break-word;
  overflow-wrap: anywhere; /* ✅ breaks long strings */

  padding: 10px;
  border-radius: 12px;

  border: 1px solid rgba(255,255,255,0.55);
  background: rgba(255,255,255,0.35);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);

  outline: none;
  font-size: 12px;
  
}
#defBox,
#whyBox {
  box-sizing: border-box;
  caret-color: rgba(255,255,255,0.95);
}

#defPanel { overflow-x: hidden; }

#defBox:empty:before{
  content: "Write a definition… (saved locally)";
  color: rgba(0,0,0,0.35);
}

#defPanel .btnRow{
  display:flex;
  gap:10px;
  justify-content:flex-end;
  margin-top:10px;
}

#defPanel .miniBtn{
  background: none;
  border: none;
  cursor: pointer;
  font-size: 14px;
  opacity: 0.8;
  padding: 6px 8px;
  border-radius: 10px;

function normalizeText(str) {
  return (str || '')
    .toLowerCase()
    .replace(/\s+/g, ' ')
    .trim();
}

function normalizeTag(str) {
  return normalizeText(str).replace(/^#/, '').replace(/[^a-z0-9_-]/g, '');
}

function htmlToText(html) {
  const div = document.createElement('div');
  div.innerHTML = html || '';
  return div.textContent || div.innerText || '';
}

function escapeHtml(str) {
  return (str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function extractTagsFromHtml(html) {
  const text = htmlToText(html);
  const matches = text.match(/(^|\s)#([a-zA-Z0-9_-]+)/g) || [];
  const tags = new Set();

  matches.forEach(m => {
    const cleaned = normalizeTag(m.replace(/^\s*#?/, ''));
    if (cleaned) tags.add(cleaned);
  });

  return [...tags];
}

function stripLegacyTableControls(html) {
  if (!html) return '';
  return html
    .replace(/<button[^>]*class="table-control-toggle"[\s\S]*?<\/button>/gi, '')
    .replace(/<div[^>]*class="table-control-panel"[\s\S]*?<\/div>/gi, '')
    .replace(/<button[^>]*class="table-btn"[\s\S]*?<\/button>/gi, '');
}

function linkify(html) {
  const div = document.createElement('div');
  div.innerHTML = html || '';

  const walker = document.createTreeWalker(div, NodeFilter.SHOW_TEXT, null);
  const urlRegex = /\bhttps?:\/\/[^\s<]+/gi;

  const textNodes = [];
  while (walker.nextNode()) textNodes.push(walker.currentNode);

  textNodes.forEach(node => {
    const text = node.nodeValue || '';
    urlRegex.lastIndex = 0;
    if (!urlRegex.test(text)) return;

    urlRegex.lastIndex = 0;
    const frag = document.createDocumentFragment();
    let lastIndex = 0;

    text.replace(urlRegex, (match, offset) => {
      frag.appendChild(document.createTextNode(text.slice(lastIndex, offset)));

      const a = document.createElement('a');
      a.href = match;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.textContent = match;
      frag.appendChild(a);

      lastIndex = offset + match.length;
      return match;
    });

    frag.appendChild(document.createTextNode(text.slice(lastIndex)));
    if (node.parentNode) node.parentNode.replaceChild(frag, node);
  });

  return div.innerHTML;
}

function deLinkifyConceptAnchors(html) {
  const div = document.createElement('div');
  div.innerHTML = html || '';

  div.querySelectorAll('a.conceptLink').forEach(a => {
    const concept = (a.getAttribute('data-concept') || a.textContent || '').trim();
    a.replaceWith(document.createTextNode(`[[${concept}]]`));
  });

  return div.innerHTML;
}

function buildConceptHtmlFromText(text) {
  return escapeHtml(text).replace(/\[\[([^[\]]+?)\]\]/g, (_, concept) => {
    const clean = concept.trim();
    const norm = normalizeText(clean);
    const count = conceptCountMap.get(norm) || 0;
    const hasDef = !!defsCache[norm];
    const hasKbImage = !!conceptMediaCache[norm]?.imageUrl;

    return `<a href="#" class="conceptLink${hasDef ? ' hasDef' : ''}${hasKbImage ? ' hasKbImage' : ''}" data-concept="${escapeHtml(clean)}">[[${escapeHtml(clean)}]]${count ? `<span class="conceptCount">${count}</span>` : ''}</a>`;
  });
}

function refreshConceptDefBadges(root = document) {
  root.querySelectorAll?.('a.conceptLink').forEach(a => {
    const concept = normalizeText(a.getAttribute('data-concept') || a.textContent || '');

  });
}

}

function buildDerivedCachesFromNotes() {
  notesDerived.clear();
  conceptCountMap = new Map();

  const tagMap = new Map();

  for (const n of notesCache) {
    const cleanedHtml = stripLegacyTableControls(n.content || '');
    const plainText = htmlToText(cleanedHtml);
    const textNorm = normalizeText(plainText);

    const tags = extractTagsFromHtml(cleanedHtml);
    for (const t of tags) {
      tagMap.set(t, (tagMap.get(t) || 0) + 1);
    }

    const conceptsSet = new Set();
    const re = /\[\[([^\]\[]+?)\]\]/g;
    let m;

    while ((m = re.exec(plainText)) !== null) {
      const concept = (m[1] || '').trim();
      if (!concept) continue;
      conceptsSet.add(normalizeText(concept));
    }

    for (const c of conceptsSet) {
      conceptCountMap.set(c, (conceptCountMap.get(c) || 0) + 1);
    }

    notesDerived.set(n.id, { cleanedHtml, textNorm, tags });
  }

  tagIndexSorted = [...tagMap.entries()]
    .sort((a, b) => (b[1] - a[1]) || a[0].localeCompare(b[0]))
    .map(([tag, count]) => ({ tag, count }));
}

function queryNotesSync(rawQuery) {
  const q = (rawQuery || '').replace(/^\/find\s*/i, '').trim();
  const qNorm = normalizeText(q);

  if (!qNorm) return notesCache.slice(0, 50);

  if (q.startsWith('#')) {
    const wanted = normalizeTag(q);
    return notesCache.filter(n => {
      const d = notesDerived.get(n.id);
      return d?.tags?.includes(wanted);
    });
  }

  if (/^".+"$/.test(q)) {
    const exact = normalizeText(q.slice(1, -1));
    return notesCache.filter(n => {
      const d = notesDerived.get(n.id);
      return d?.textNorm?.includes(exact);
    });
  }

  return notesCache.filter(n => {
    const d = notesDerived.get(n.id);
    return d?.textNorm?.includes(qNorm);
  });
}

  if (user) {
    authStatusText.textContent = `Signed in: ${user.email || user.displayName || 'User'}`;
    googleLoginBtn.style.display = 'none';
    googleLogoutBtn.style.display = 'inline-block';

    startNotesListener();
    startDefsListener();
    startConceptMediaListener();

    const q = userInput.value.trim();
    if (q) runLiveSearch(q, true);
    else renderLiveResults(notesCache.slice(0, 30), 'Latest notes');
  } else {
    authStatusText.textContent = 'Not signed in';
    googleLoginBtn.style.display = 'inline-block';
    googleLogoutBtn.style.display = 'none';

    stopNotesListener();
    stopDefsListener();
    stopConceptMediaListener();

    renderWelcome();
  }
});

async function ensureSignedIn() {
  if (auth.currentUser) return auth.currentUser;
  throw new Error('Please sign in with Google first.');
}

/* =========================
   Firestore listeners
========================= */
function startNotesListener() {
  if (!auth.currentUser) return;

  if (unsubscribeNotes) unsubscribeNotes();

  unsubscribeNotes = db.collection('notes').onSnapshot((snap) => {
    notesCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));

    notesCache.sort((a, b) => {
      const ta = a.createdAt?.toMillis?.() || 0;
      const tb = b.createdAt?.toMillis?.() || 0;
      return tb - ta;
    });

    buildDerivedCachesFromNotes();

    if (isEditingNote) return;

    const q = userInput.value.trim();
    if (q) runLiveSearch(q, true);
    else renderWelcome();
  }, (err) => {
    console.error('Notes listener error:', err);
    showFatal('Firestore: ' + (err?.message || err));
  });
}

function stopNotesListener() {
  if (unsubscribeNotes) {
    unsubscribeNotes();
    unsubscribeNotes = null;
  }
  notesCache = [];
  clearLiveResults();
}

function startDefsListener() {
  if (!auth.currentUser) return;

  if (unsubscribeDefs) unsubscribeDefs();

  unsubscribeDefs = db.collection('concept_defs').onSnapshot((snap) => {
    const next = {};

    snap.forEach(doc => {
      const d = doc.data() || {};
      const key = normalizeText(d.concept || doc.id);

      next[key] = {
        value: typeof d.value === 'string' ? d.value : '',
        why: typeof d.why === 'string' ? d.why : '',
        concept: typeof d.concept === 'string' ? d.concept : doc.id
      };
    });

    defsCache = next;
    refreshConceptDefBadges(liveResults);
  }, (err) => {
    console.error('Defs listener error:', err);
  });
}

function stopDefsListener() {
  if (unsubscribeDefs) {
    unsubscribeDefs();
    unsubscribeDefs = null;
  }
  defsCache = {};
}

function startConceptMediaListener() {
  if (!auth.currentUser) return;

  if (unsubscribeConceptMedia) unsubscribeConceptMedia();

  unsubscribeConceptMedia = db.collection('concept_media').onSnapshot((snap) => {
    const next = {};

    snap.forEach(doc => {
      const d = doc.data() || {};
      const key = normalizeText(d.concept || doc.id);

      next[key] = {
        concept: typeof d.concept === 'string' ? d.concept : doc.id,
        imageUrl: typeof d.imageUrl === 'string' ? d.imageUrl : '',
        caption: typeof d.caption === 'string' ? d.caption : '',
        storagePath: typeof d.storagePath === 'string' ? d.storagePath : ''
      };
    });

    conceptMediaCache = next;
    refreshConceptMediaBadges(liveResults);
  }, (err) => {
    console.error('Concept media listener error:', err);
  });
}

function stopConceptMediaListener() {
  if (unsubscribeConceptMedia) {
    unsubscribeConceptMedia();
    unsubscribeConceptMedia = null;
  }
  conceptMediaCache = {};
}

/* =========================
   Notes add
========================= */
noteInput.addEventListener('focus', () => {
  activeEditable = noteInput;
});

addNoteBtn.onclick = async () => {
  if (!auth.currentUser) {
    alert('Please sign in with Google first.');
    return;
  }

  const raw = noteInput.innerHTML.trim();
  const noteContent = deLinkifyConceptAnchors(linkify(raw));

  if (!noteContent || noteContent === '<br>') {
    alert('Note is required.');
    return;
  }

  addNoteBtn.disabled = true;
  addNoteBtn.textContent = 'Adding...';

  try {
    await ensureSignedIn();

    await db.collection('notes').add({
      content: noteContent,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    noteInput.innerHTML = '';
    if (imageUpload) imageUpload.value = '';
    if (notePanel) notePanel.style.display = 'none';

    const q = userInput.value.trim();
    if (q) runLiveSearch(q, true);
    else renderLiveResults(notesCache.slice(0, 30), 'Latest notes');
  } catch (e) {
    console.error('Add note failed:', e);
    alert('Error: ' + (e?.message || e));
  } finally {
    addNoteBtn.disabled = false;
    addNoteBtn.textContent = 'Add Note';
  }
};

/* =========================
   Hashtag suggestions
========================= */
function buildTagIndexFromCache() {
  const map = new Map();

  for (const n of notesCache) {
    const cleaned = stripLegacyTableControls(n.content || '');
    const tags = extractTagsFromHtml(cleaned);

    for (const t of tags) {
      map.set(t, (map.get(t) || 0) + 1);
    }
  }

  return [...map.entries()]
    .sort((a, b) => (b[1] - a[1]) || a[0].localeCompare(b[0]))
    .map(([tag, count]) => ({ tag, count }));
}

function getCurrentHashToken(inputValue, caretPos) {
  const left = inputValue.slice(0, caretPos);
  const m = left.match(/(^|\s)#([a-zA-Z0-9_-]*)$/);
  if (!m) return null;

  return {
    prefix: m[1] || '',
    typed: m[2] || '',
    start: left.length - (m[2] || '').length
  };
}

function positionSuggestUnderInput() {
  const r = userInput.getBoundingClientRect();
  const pad = 10;

  const w = Math.max(220, Math.min(r.width, window.innerWidth - 20));
  tagSuggest.style.width = w + 'px';

  let left = r.left + (r.width - w) / 2;
  left = Math.max(10, Math.min(left, window.innerWidth - w - 10));
  tagSuggest.style.left = left + 'px';

  const h = tagSuggest.getBoundingClientRect().height || 180;

  let top = r.top - h - pad;
  if (top < 10) top = r.bottom + pad;
  top = Math.max(10, Math.min(top, window.innerHeight - h - 10));
  tagSuggest.style.top = top + 'px';
}

function closeSuggest() {
  suggestOpen = false;
  suggestItems = [];
  suggestIndex = -1;
  tagSuggest.style.display = 'none';
  tagSuggest.setAttribute('aria-hidden', 'true');
  tagSuggest.innerHTML = '';
}

function openSuggest(items) {
  suggestOpen = true;
  suggestItems = items;
  suggestIndex = 0;

  tagSuggest.innerHTML = '';

  items.forEach((it, idx) => {
    const row = document.createElement('div');
    row.className = 'item' + (idx === suggestIndex ? ' active' : '');
    row.innerHTML = `<span>#${it.tag}</span><span class="count">${it.count}</span>`;

    row.addEventListener('mousedown', (e) => {
      e.preventDefault();
      applySuggestion(it.tag);
    });

    tagSuggest.appendChild(row);
  });

  tagSuggest.style.display = 'block';
  tagSuggest.setAttribute('aria-hidden', 'false');
  requestAnimationFrame(positionSuggestUnderInput);
}

function renderSuggestActive() {
  const rows = tagSuggest.querySelectorAll('.item');
  rows.forEach((r, i) => r.classList.toggle('active', i === suggestIndex));
}

function applySuggestion(tag) {
  const caret = userInput.selectionStart ?? (userInput.value || '').length;
  const token = getCurrentHashToken(userInput.value, caret);
  if (!token) return closeSuggest();

  const before = userInput.value
    .slice(0, caret)
    .replace(/(^|\s)#([a-zA-Z0-9_-]*)$/, `$1#${tag} `);

  const after = userInput.value.slice(caret);

  userInput.value = before + after;

  const newCaret = before.length;
  userInput.setSelectionRange(newCaret, newCaret);

  closeSuggest();
  runLiveSearch(userInput.value.trim(), true);
}

function updateTagSuggestions() {
  if (!isUnlocked) return closeSuggest();

  const val = userInput.value || '';
  const caret = userInput.selectionStart ?? val.length;
  const token = getCurrentHashToken(val, caret);

  if (!token) return closeSuggest();

  const typed = normalizeTag(token.typed);
  const index = tagIndexSorted.length ? tagIndexSorted : buildTagIndexFromCache();

  const filtered = typed
    ? index.filter(x => x.tag.startsWith(typed)).slice(0, 12)
    : index.slice(0, 12);

  if (!filtered.length) return closeSuggest();
  openSuggest(filtered);
}

/* =========================
   Caret
========================= */
function saveCaret() {
  const sel = window.getSelection();
  if (!sel || !sel.rangeCount || !activeEditable) return;

  const r = sel.getRangeAt(0);
  if (activeEditable.contains(r.startContainer)) {
    caretMap.set(activeEditable, r.cloneRange());
  }
}

function restoreCaret() {
  if (!activeEditable) return false;

  const r = caretMap.get(activeEditable);
  if (!r) return false;

  const sel = window.getSelection();
  if (!sel) return false;

  sel.removeAllRanges();
  sel.addRange(r);
  return true;
}

function placeCaretAtEnd(el) {
  if (!el) return;

  el.focus();

  const range = document.createRange();
  range.selectNodeContents(el);
  range.collapse(false);

  const sel = window.getSelection();
  if (!sel) return;

  sel.removeAllRanges();
  sel.addRange(range);
  caretMap.set(el, range.cloneRange());
}

/* =========================
   Note panel
========================= */
addNoteToggle.onclick = () => {
  notePanel.style.display = notePanel.style.display === 'flex' ? 'none' : 'flex';
  activeEditable = noteInput;
  noteInput.focus();
  saveCaret();
};

/* =========================
   Emoji picker
========================= */
function hideEmojiPanel() {
  floatingEmojiPanel.style.display = 'none';
  floatingEmojiPanel.setAttribute('aria-hidden', 'true');
  floatingEmojiPanel.innerHTML = '';
  if (floatingEmojiBtn) floatingEmojiBtn.style.display = 'none';
}

function showPickerNearButton(btnEl, items, onPick) {
  if (!btnEl) return;

  floatingEmojiPanel.innerHTML = '';

  items.forEach(sym => {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'pick';
    b.textContent = sym;
    b.addEventListener('click', (ev) => {
      ev.preventDefault();
      ev.stopPropagation();
      onPick(sym);
      hideEmojiPanel();
    });
    floatingEmojiPanel.appendChild(b);
  });

  const r = btnEl.getBoundingClientRect();
  const pad = 8;

  floatingEmojiPanel.style.display = 'block';
  floatingEmojiPanel.setAttribute('aria-hidden', 'false');
  floatingEmojiPanel.style.left = Math.min(window.innerWidth - 10, r.right + pad) + 'px';
  floatingEmojiPanel.style.top = Math.min(window.innerHeight - 10, r.top) + 'px';
}

function insertEmojiAtCaret(emoji) {
  if (!activeEditable) return;

  activeEditable.focus();
  restoreCaret();

  const sel = window.getSelection();
  if (sel && sel.rangeCount && activeEditable.contains(sel.anchorNode)) {
    const range = sel.getRangeAt(0);
    range.deleteContents();

    const span = document.createElement('span');
    span.className = 'resizableEmoji';
    span.textContent = emoji;
    range.insertNode(span);

    const spacer = document.createTextNode('\u200B');
    span.after(spacer);

    range.setStartAfter(spacer);
    range.collapse(true);

    sel.removeAllRanges();
    sel.addRange(range);
    saveCaret();
  } else {
    activeEditable.appendChild(document.createTextNode(emoji));
    placeCaretAtEnd(activeEditable);
  }
}

function insertInlineSymbolAtCaret(symbol) {
  if (!activeEditable) return;

  activeEditable.focus();
  restoreCaret();

  const sel = window.getSelection();
  if (sel && sel.rangeCount && activeEditable.contains(sel.anchorNode)) {
    const range = sel.getRangeAt(0);
    range.deleteContents();

    const span = document.createElement('span');
    span.className = 'inlineSymbol';
    span.textContent = symbol;
    range.insertNode(span);

    const spacer = document.createTextNode('\u200B');
    span.after(spacer);

    range.setStartAfter(spacer);
    range.collapse(true);

    sel.removeAllRanges();
    sel.addRange(range);
    saveCaret();
  } else {
    activeEditable.appendChild(document.createTextNode(symbol));
    placeCaretAtEnd(activeEditable);
  }
}

/* =========================
   Concept panel
========================= */
function openDefPanel(topic) {
  currentConcept = topic;
  defTitle.textContent = topic;

  const key = normalizeText(topic);
  const def = defsCache[key] || {};
  const media = conceptMediaCache[key] || {};

  defBox.textContent = def.value || '';
  whyBox.textContent = def.why || '';
  kbCaptionInput.value = media.caption || '';

  if (media.imageUrl) {
    kbPreviewImg.src = media.imageUrl;
    kbPreviewImg.alt = media.caption || topic;
    kbPreviewWrap.style.display = 'block';
  } else {
    kbPreviewImg.removeAttribute('src');
    kbPreviewWrap.style.display = 'none';
  }

  defPanel.style.display = 'block';
  defPanel.setAttribute('aria-hidden', 'false');
}

function closeDefPanel() {
  defPanel.style.display = 'none';
  defPanel.setAttribute('aria-hidden', 'true');
  currentConcept = '';
}

async function saveDefinition() {
  if (!currentConcept) return;
  const concept = currentConcept.trim();
  const key = normalizeText(concept);

  await ensureSignedIn();

  await db.collection('concept_defs').doc(key).set({
    concept,
    value: defBox.textContent || '',
    why: whyBox.textContent || ''
  }, { merge: true });
}

async function deleteDefinition() {
  if (!currentConcept) return;

  const key = normalizeText(currentConcept);
  await ensureSignedIn();
  await db.collection('concept_defs').doc(key).delete();
  closeDefPanel();
}

async function removeConceptImage() {
  if (!currentConcept) return;

  const key = normalizeText(currentConcept);
  const media = conceptMediaCache[key];

  await ensureSignedIn();

  if (media?.storagePath) {
    try {
      await storage.ref(media.storagePath).delete();
    } catch (e) {
      console.warn('Storage delete skipped/failed:', e);
    }
  }

  await db.collection('concept_media').doc(key).delete();
  kbPreviewWrap.style.display = 'none';
  kbPreviewImg.removeAttribute('src');
}

async function uploadConceptImage(file) {
  if (!currentConcept || !file) return;

  const concept = currentConcept.trim();
  const key = normalizeText(concept);
  await ensureSignedIn();

  const ext = (file.name.split('.').pop() || 'png').toLowerCase();
  const storagePath = `concept_media/${key}.${ext}`;

  const ref = storage.ref(storagePath);
  await ref.put(file);
  const imageUrl = await ref.getDownloadURL();

  await db.collection('concept_media').doc(key).set({
    concept,
    imageUrl,
    caption: kbCaptionInput.value.trim(),
    storagePath
  }, { merge: true });

  kbPreviewImg.src = imageUrl;
  kbPreviewImg.alt = kbCaptionInput.value.trim() || concept;
  kbPreviewWrap.style.display = 'block';
}

/* =========================
   Search
========================= */
function runLiveSearch(q, immediate = false) {
  if (!isUnlocked) return;

  const doIt = () => {
    lastLiveQuery = q;

    try {
      const notes = queryNotesSync('/find ' + q);
      renderLiveResults(notes, q);
    } catch (e) {
      console.error(e);
      showFatal('Search/render error: ' + (e?.message || e));
    }
  };

  if (immediate) return doIt();

  clearTimeout(liveTimer);
  liveTimer = setTimeout(doIt, 220);
}

/* =========================
   Toolbar
========================= */
function runCmd(cmd, value = null) {
  if (!activeEditable) activeEditable = noteInput;

  activeEditable.focus({ preventScroll: true });
  restoreCaret();

  if (value === null) document.execCommand(cmd);
  else document.execCommand(cmd, false, value);

  saveCaret();
}

function bindToolbarBtn(id, cmd, value = null) {
  const btn = document.getElementById(id);
  if (!btn) return;

  btn.addEventListener('mousedown', (e) => {
    e.preventDefault();
    e.stopPropagation();
    runCmd(cmd, value);
  });
}

bindToolbarBtn('boldBtn', 'bold');
bindToolbarBtn('italicBtn', 'italic');
bindToolbarBtn('underlineBtn', 'underline');
bindToolbarBtn('highlightBtn', 'hiliteColor', '#e8dcff');
bindToolbarBtn('redFontBtn', 'foreColor', 'red');
bindToolbarBtn('blueFontBtn', 'foreColor', 'blue');

document.getElementById('formatToggle')?.addEventListener('click', () => {
  document.getElementById('formatToolbar')?.classList.toggle('visible');
});

/* =========================
   Events
========================= */
document.addEventListener('mousedown', (e) => {
  if (floatingEmojiPanel.style.display === 'block' && !floatingEmojiPanel.contains(e.target)) {
    hideEmojiPanel();
  }

  if (suggestOpen) {
    if (!tagSuggest.contains(e.target) && e.target !== userInput) {
      closeSuggest();
    }
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    hideEmojiPanel();
    closeSuggest();
    closeDefPanel();
  }
});

document.addEventListener('click', (e) => {
  const a = e.target.closest('a.conceptLink');
  if (!a) return;

  e.preventDefault();
  e.stopPropagation();

  let topic = (a.getAttribute('data-concept') || a.textContent || '').trim();
  topic = topic.replace(/^\[\[\s*/, '').replace(/\s*\]\]$/, '').trim();
  if (!topic) return;

  if (e.shiftKey) {
    openDefPanel(topic);
    return;
  }

  userInput.value = `"${topic}"`;
  userInput.focus();
  runLiveSearch(userInput.value.trim(), true);
}, true);

function getActiveEditor() {
  const el = activeEditable;
  if (!el) return null;
  if (el === userInput) return null;
  if (!el.isContentEditable) return null;
  return el;
}

function wrapSelectionWithBrackets(mode = 'wrap') {
  const editor = getActiveEditor();
  if (!editor) return;

  editor.focus({ preventScroll: true });
  restoreCaret();

  const sel = window.getSelection();
  if (!sel || sel.rangeCount === 0) return;

  const range = sel.getRangeAt(0);
  if (!editor.contains(range.commonAncestorContainer)) return;

  const selectedText = sel.toString();
  if (!selectedText || !selectedText.trim()) return;

  const trimmed = selectedText.trim();
  const hasBrackets = /^\s*\[\[[\s\S]*\]\]\s*$/.test(selectedText);

  let replacement = '';
  if (mode === 'unwrap' || hasBrackets) {
    replacement = trimmed.replace(/^\[\[\s*/, '').replace(/\s*\]\]$/, '');
  } else {
    replacement = `[[${trimmed}]]`;
  }

  range.deleteContents();
  range.insertNode(document.createTextNode(replacement));

  range.collapse(false);
  sel.removeAllRanges();
  sel.addRange(range);

  saveCaret();
  refreshConceptDefBadges(document.getElementById('chat'));
}

document.addEventListener('keydown', (e) => {
  const t = e.target;
  if (t === userInput || t === accessCodeInput) return;

  const key = (e.key || '').toLowerCase();
  if (key !== 'l') return;

  if (e.ctrlKey || e.metaKey) {
    e.preventDefault();
    wrapSelectionWithBrackets('wrap');
    return;
  }

  if (e.shiftKey && !e.ctrlKey && !e.metaKey && !e.altKey) {
    e.preventDefault();
    wrapSelectionWithBrackets('unwrap');
  }
}, true);

userInput.addEventListener('keydown', (e) => {
  if (!suggestOpen) return;

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    suggestIndex = Math.min(suggestItems.length - 1, suggestIndex + 1);
    renderSuggestActive();
    return;
  }

  if (e.key === 'ArrowUp') {
    e.preventDefault();
    suggestIndex = Math.max(0, suggestIndex - 1);
    renderSuggestActive();
    return;
  }

  if (e.key === 'Enter') {
    e.preventDefault();
    const it = suggestItems[suggestIndex];
    if (it) applySuggestion(it.tag);
    return;
  }

  if (e.key === 'Escape') {
    closeSuggest();
  }
});

userInput.addEventListener('input', () => {
  updateTagSuggestions();

  const q = userInput.value.trim();
  if (!q) {
    lastLiveQuery = '';
    renderWelcome();
    return;
  }

  runLiveSearch(q, false);
});

window.addEventListener('resize', () => {
  if (suggestOpen) positionSuggestUnderInput();
});

inputArea.addEventListener('submit', async (e) => {
  e.preventDefault();

  const raw = userInput.value.trim();
  if (!raw) return;

  if (/^\/ask\b/i.test(raw)) {
    const q = raw.replace(/^\/ask\s*/i, '').trim();
    if (!q) return;

    clearLiveResults();
    renderHeaderLine('Thinking…');

    try {
      const answer = await askAI(q);
      clearLiveResults();
      renderHeaderLine(answer);
    } catch (err) {
      clearLiveResults();
      renderHeaderLine('⚠️ Error getting response');
      console.error(err);
    }
    return;
  }

  runLiveSearch(raw, true);
});

noteInput.addEventListener('mouseup', saveCaret);
noteInput.addEventListener('keyup', saveCaret);
noteInput.addEventListener('input', saveCaret);

floatingEmojiBtn?.addEventListener('click', (e) => {
  e.preventDefault();
  showPickerNearButton(floatingEmojiBtn, EMOJIS, insertEmojiAtCaret);
});

defCloseBtn?.addEventListener('click', closeDefPanel);

defSaveBtn?.addEventListener('click', async () => {
  try {
    await saveDefinition();
    closeDefPanel();
  } catch (e) {
    console.error(e);
    alert('Failed to save definition: ' + (e?.message || e));
  }
});

defDeleteBtn?.addEventListener('click', async () => {
  try {
    await deleteDefinition();
  } catch (e) {
    console.error(e);
    alert('Failed to delete definition: ' + (e?.message || e));
  }
});

defSearchBtn?.addEventListener('click', () => {
  if (!currentConcept) return;
  userInput.value = `"${currentConcept}"`;
  closeDefPanel();
  runLiveSearch(userInput.value.trim(), true);
});

defMergeBtn?.addEventListener('click', () => {
  alert('Merge button not wired yet.');
});

kbUploadBtn?.addEventListener('click', () => kbUploadInput?.click());

kbUploadInput?.addEventListener('change', async () => {
  const file = kbUploadInput.files?.[0];
  if (!file) return;

  try {
    await uploadConceptImage(file);
    kbUploadInput.value = '';
  } catch (e) {
    console.error(e);
    alert('Failed to upload image: ' + (e?.message || e));
  }
});

kbRemoveBtn?.addEventListener('click', async () => {
  try {
    await removeConceptImage();
  } catch (e) {
    console.error(e);
    alert('Failed to remove image: ' + (e?.message || e));
  }
});

kbCaptionInput?.addEventListener('input', async () => {
  if (!currentConcept) return;
  const key = normalizeText(currentConcept);
  if (!conceptMediaCache[key]) return;

  try {
    await db.collection('concept_media').doc(key).set({
      caption: kbCaptionInput.value.trim()
    }, { merge: true });
  } catch (e) {
    console.warn('Caption autosave failed:', e);
  }
});

renderWelcome();
updateUIForLockState();
