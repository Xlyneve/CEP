<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://xlyneve.github.io/CEP/calculator.css?v=2">
  <title>Prescribable Medications</title>
 
 <style>
  @font-face {
    font-family: 'Adelicia';
    src: url('AdeliciaRegular.ttf');
  }

  @font-face {
    font-family: 'Simplicity';
    src: url('Simplicity.ttf');
  }

  :root {
    --text: #333;
    --text-soft: rgba(60, 60, 60, 0.72);
    --text-faint: rgba(70, 70, 70, 0.66);

    --glass: rgba(255, 255, 255, 0.14);
    --glass-strong: rgba(255, 255, 255, 0.2);
    --glass-border: rgba(255, 255, 255, 0.28);

    --shadow-soft: 0 8px 24px rgba(0, 0, 0, 0.05);
    --shadow-hover: 0 12px 28px rgba(0, 0, 0, 0.06);

    --radius-lg: 22px;
    --radius-md: 16px;
    --radius-sm: 12px;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    padding: 30px;
    font-family: 'Tahoma', sans-serif;
    font-size: 12px;
    color: var(--text);
    background: linear-gradient(to bottom right, #fefefe, #f8f8f8);
  }

  h1 {
    margin: 0 0 20px;
    text-align: center;
    font-family: 'Adelicia', serif;
    font-size: 2.6em;
    font-weight: 600;
    color: #d94f71;
    background-image: linear-gradient(90deg, #d94f71, #f8718f, #fbc1cc);
    background-size: 300% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: roseGlow 4s ease-in-out infinite;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
  }

  .controls {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 12px;
    background: transparent;
    border: none;
    padding: 0;
    box-shadow: none;
  }

  .controls input,
  .controls button {
    margin: 0;
    padding: 8px 14px;
    font-size: 1em;
    color: var(--text);
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transition: background-color 0.25s ease, border-color 0.25s ease, transform 0.2s ease;
  }

  .controls input::placeholder {
    color: rgba(51, 51, 51, 0.5);
  }

  .controls button {
    cursor: pointer;
  }

  .controls button:hover,
  .controls input:hover {
    background-color: var(--glass-strong);
    border-color: rgba(255, 255, 255, 0.42);
  }

  .controls button:active {
    transform: translateY(1px);
  }

  .hidden,
  .hidden-card {
    display: none !important;
  }

  .card-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    gap: 16px;
    margin-top: 18px;
  }

 .med-card {
  padding: 12px 12px 10px;
  background: rgba(255, 255, 255, 0.14);
  border: 1px solid rgba(255, 255, 255, 0.28);
  border-radius: var(--radius-lg);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  box-shadow: var(--shadow-soft);
  transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
}

.med-card:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow-hover);
}

.med-card.selected {
  border-color: rgba(170, 170, 170, 0.24);
  box-shadow: 0 0 0 2px rgba(170, 170, 170, 0.07);
}

.med-name {
  margin-bottom: 1px;
  font-size: 1.32rem;
  font-weight: 700;
  line-height: 1.18;
  color: #111;
}

.med-subtitle {
  margin-bottom: 1px;
  font-size: 0.8rem;
  line-height: 1.28;
  font-style: italic;
  color: var(--text-soft);
}

.med-mechanism {
  margin-bottom: 6px;
  font-size: 0.78rem;
  line-height: 1.35;
  color: var(--text-faint);
}

.med-section {
  margin-bottom: 7px;
  padding: 5px 6px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: var(--radius-md);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  background: rgba(255, 255, 255, 0.09);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
}

.notes-section {
  background: rgba(255, 255, 255, 0.09);
}


.med-section-content {
  min-height: 16px;
  padding: 1px 0;
  font-size: 0.88rem;
  line-height: 1.3;
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
}

.med-name[contenteditable="true"],
.med-subtitle[contenteditable="true"],
.med-mechanism[contenteditable="true"],
.med-section-content[contenteditable="true"] {
  padding: 4px 6px;
  background: rgba(255, 255, 255, 0.13);
  border-radius: 9px;
  outline: none;
}

.med-name[contenteditable="true"]:focus,
.med-subtitle[contenteditable="true"]:focus,
.med-mechanism[contenteditable="true"]:focus,
.med-section-content[contenteditable="true"]:focus {
  background: rgba(255, 255, 255, 0.2);
}


.mini-treatment-table {
  width: 100%;
  margin-top: 2px;
  font-size: 0.86rem;
  color: #000;
  border-collapse: separate;
  border-spacing: 0;
  background: rgba(255, 255, 255, 0.16);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 11px;
  overflow: hidden;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.16),
    0 2px 8px rgba(0, 0, 0, 0.025);
}

.mini-treatment-table th,
.mini-treatment-table td {
  padding: 6px 8px;
  text-align: left;
  vertical-align: top;
  color: #000;
  border-right: 1px solid rgba(255, 255, 255, 0.12);
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  white-space: pre-wrap;
  word-break: normal;
  overflow-wrap: break-word;
}

.mini-treatment-table th:last-child,
.mini-treatment-table td:last-child {
  border-right: none;
}

.mini-treatment-table tr:last-child td {
  border-bottom: none;
}

.mini-treatment-table td {
  background: rgba(255, 255, 255, 0.10);
  color: #000;
}

.mini-treatment-table th {
  font-weight: 700;
  color: #000;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

.table-section-title-row th {
  font-size: 0.85rem;
  letter-spacing: 0.01em;
  text-align: left;
}

.table-column-headings th {
  background: rgba(255, 255, 255, 0.16);
  font-weight: 400;
}

/* neutral body for all tables */
.first-line-section .mini-treatment-table,
.second-line-section .mini-treatment-table,
.allergy-first-section .mini-treatment-table,
.allergy-second-section .mini-treatment-table {
  background: rgba(255, 255, 255, 0.16);
}

.first-line-section .mini-treatment-table td,
.second-line-section .mini-treatment-table td,
.allergy-first-section .mini-treatment-table td,
.allergy-second-section .mini-treatment-table td {
  background: rgba(255, 255, 255, 0.10);
}

/* only the top title row carries the section color */
.first-line-section .table-section-title-row th {
  background: rgba(94, 11, 21, 0.80);
  color: #fff !important;
}

.second-line-section .table-section-title-row th {
  background: rgba(144, 50, 61, 0.42);
}

.allergy-first-section .table-section-title-row th {
  background: rgba(188, 128, 52, 0.80);
}

.allergy-second-section .table-section-title-row th {
  background: rgba(217, 202, 179, 0.46);
}

.mini-treatment-table td[contenteditable="true"] {
  outline: none;
}

.mini-treatment-table td[contenteditable="true"]:focus {
  background: rgba(255, 255, 255, 0.16);
  color: #000;
}

.med-section-header {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 4px;
  margin-bottom: 2px;
  min-height: 0;
}

#addCardBtn {
  position: relative;
  left: 24px;
  width: 42px;
  height: 42px;
  padding: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  line-height: 1;
  color: var(--text);
  background: rgba(255, 255, 255, 0.14);
  border: 1px solid rgba(255, 255, 255, 0.28);
  border-radius: 12px;
  cursor: pointer;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
  transition: background-color 0.25s ease, border-color 0.25s ease, transform 0.2s ease;
}

#addCardBtn:hover {
  background: rgba(255, 255, 255, 0.22);
  border-color: rgba(255, 255, 255, 0.42);
}

#addCardBtn:active {
  transform: translateY(1px);
}

.icon-btn {
  width: 24px;
  height: 24px;
  padding: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  line-height: 1;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.18);
  color: rgba(40, 40, 40, 0.8);
}

.icon-btn:hover {
  background: rgba(255, 255, 255, 0.18);
  color: #000;
}

.delete-table-btn {
  background: rgba(255, 255, 255, 0.08);
}

.delete-table-btn:hover {
  background: rgba(255, 255, 255, 0.18);
}

.med-card-bottom-actions {
  display: flex;
  justify-content: flex-end;
  gap: 6px;
  margin-top: 8px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.18s ease;
}

.med-card.selected .med-card-bottom-actions,
.med-card:focus-within .med-card-bottom-actions {
  opacity: 1;
  pointer-events: auto;
}

.med-card-bottom-actions button {
  width: 28px;
  height: 28px;
  padding: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  line-height: 1;
  color: rgba(40, 40, 40, 0.82);
  background: rgba(255, 255, 255, 0.14);
  border: 1px solid rgba(255, 255, 255, 0.22);
  border-radius: 999px;
  cursor: pointer;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04);
  transition: background 0.18s ease, transform 0.18s ease, border-color 0.18s ease;
}

.med-card-bottom-actions button:hover {
  background: rgba(255, 255, 255, 0.22);
  border-color: rgba(255, 255, 255, 0.3);
  color: #111;
}

.med-card-bottom-actions button:active {
  transform: translateY(1px);
}

.card-bold-btn {
  font-weight: 700;
  font-size: 12px;
}
.med-card,
.med-card * {
  -webkit-user-select: text;
  user-select: text;
}

.med-card button {
  -webkit-user-select: none;
  user-select: none;
}
  #emojiCopyMenu {
    position: fixed;
    top: 6px;
    right: -4px;
    z-index: 999;
    display: flex;
    flex-direction: column;
    gap: 0;
    font-size: 10px;
    font-family: 'Tahoma', sans-serif;
    line-height: 1;
  }

  .emojiLine {
    display: flex;
    align-items: center;
    gap: 2px;
    margin: 1px;
    padding: 1px;
  }

  #emojiCopyMenu button {
    margin: 0;
    padding: 0;
    font-size: 12px;
    line-height: 1;
    color: var(--text);
    background: none;
    border: none;
    cursor: pointer;
  }

  #emojiCopyMenu button:hover {
    background: rgba(0, 0, 0, 0.05);
  }

  #emojiCopyMenu span {
    margin: 0;
    padding: 0;
    font-size: 10px;
    line-height: 1;
    color: #555;
  }

  .copiedMsg {
    font-size: 10px;
    color: green;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .copiedMsg.show {
    opacity: 1;
  }



  @keyframes roseGlow {
    0% {
      background-position: 0% center;
    }
    50% {
      background-position: 100% center;
    }
    100% {
      background-position: 0% center;
    }
  }

  @media (max-width: 768px) {
    body {
      padding: 16px;
    }

    h1 {
      font-size: 2.1em;
    }

    .controls {
      flex-direction: column;
      align-items: stretch;
    }

    .controls input,
    .controls button {
      width: 100%;
    }

    .icon-buttons {
      justify-content: flex-start;
    }

    .card-container {
      grid-template-columns: 1fr;
    }

    #emojiCopyMenu {
      position: static;
      flex-direction: row;
      flex-wrap: wrap;
      margin-top: 8px;
    }
  }
</style>
  
</head>
<body>

  <h1>Medications Lists</h1>

  <div class="controls">
    <input type="text" id="searchInput" placeholder="Search medications..." />
<button id="addCardBtn" onclick="addRow()" title="Add Card">＋</button>

<div id="emojiCopyMenu">
 <div class="emojiLine">
  <button title="First-line treatment" onclick="copyEmoji(this, '🔴')">🔴</button>
  <span>1st</span>
  <span class="copiedMsg">✅</span>
</div>

<div class="emojiLine">
  <button title="Second-line treatment" onclick="copyEmoji(this, '🟡')">🟡</button>
  <span>2nd</span>
  <span class="copiedMsg">✅</span>
</div>

<div class="emojiLine">
  <button title="1st line if allergic to first-line group" onclick="copyEmoji(this, '🔵')">🔵</button>
  <span>1stX</span>
  <span class="copiedMsg">✅</span>
</div>

<div class="emojiLine">
  <button title="2nd in line/ or no improvement to first line group " onclick="copyEmoji(this, '🟢')">🟢</button>
  <span>2ndX</span>
  <span class="copiedMsg">✅</span>
</div>

</div>



  </div>


<div id="cardContainer" class="card-container"></div>


 <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, getDocs, setDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC1a4YDhJ3LAlqxIs9u5LrZ64Dp--jbIYM",
    authDomain: "nurse-prescribing-notes.firebaseapp.com",
    projectId: "nurse-prescribing-notes",
    storageBucket: "nurse-prescribing-notes.firebasestorage.app",
    messagingSenderId: "12133511320",
    appId: "1:12133511320:web:114f6eb1c28ea2813b20ed",
    measurementId: "G-540TZ8HK1G"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const medicationsCollection = collection(db, "medications");

  window.firebaseDB = db;
  window.firebaseCollection = medicationsCollection;
  window.firebaseDoc = doc;
  window.firebaseSetDoc = setDoc;
  window.firebaseGetDocs = getDocs;

  let medicationRows = [];
  let selectedCardIndex = null;
  let longPressTimer = null;
  const LONG_PRESS_MS = 500;

  let currentSearchTerm = "";
  let searchDebounceTimer = null;

  function addRow() {
    medicationRows.unshift({
      medication: "New Medication",
      subtitle: "",
      mechanism: "",
      firstLine: "",
      secondLine: "",
      allergyFirstLine: "",
      allergySecondLine: "",
      notes: "",
      isEditing: true
    });

    selectedCardIndex = 0;
    renderCards(medicationRows);
  }

 async function saveTableToFirebase() {
  try {
    await setDoc(doc(db, "medications", "medTable"), { rows: medicationRows });
  } catch (error) {
    console.error("Save failed:", error);
    alert("Save failed! See console.");
  }
}

  function buildSearchBlob(row) {
    const subtitle = row.subtitle || row.typeCategory || "";
    const mechanism = row.mechanism || row.restrictions || "";
    const firstLine = row.firstLine || row.dosage || "";
    const secondLine = row.secondLine || "";
    const allergyFirstLine = row.allergyFirstLine || "";
    const allergySecondLine = row.allergySecondLine || "";
    const extraNotes = row.notes || "";

    return [
      row.medication || "",
      subtitle,
      mechanism,
      firstLine,
      secondLine,
      allergyFirstLine,
      allergySecondLine,
      extraNotes
    ].join(" ").toLowerCase();
  }

  function renderCards(rowsData) {
    const container = document.getElementById("cardContainer");
    container.innerHTML = "";

    rowsData.forEach((rowData, index) => {
      const card = document.createElement("div");
      card.className = "med-card";
      card.dataset.index = index;

      const subtitle = rowData.subtitle || rowData.typeCategory || "";
      const mechanism = rowData.mechanism || rowData.restrictions || "";
      const firstLine = rowData.firstLine || rowData.dosage || "";
      const secondLine = rowData.secondLine || "";
      const allergyFirstLine = rowData.allergyFirstLine || "";
      const allergySecondLine = rowData.allergySecondLine || "";
      const extraNotes = rowData.notes || "";
      const cardEditable = !!rowData.isEditing;

      card.dataset.search = buildSearchBlob(rowData);

      const tableControls = (fieldName) => cardEditable ? `
        <button
          class="mini-table-btn icon-btn"
          type="button"
          title="Add table"
          onclick="insertTreatmentTable(${index}, '${fieldName}')"
        >＋</button>
        <button
          class="mini-table-btn icon-btn delete-table-btn"
          type="button"
          title="Remove table"
          onclick="deleteTreatmentTable(${index}, '${fieldName}')"
        >－</button>
      ` : "";

     card.innerHTML = `
  <div class="med-card-main">
    <div class="med-name" contenteditable="${cardEditable}" data-field="medication">${rowData.medication || "Untitled Medication"}</div>

    <div class="med-subtitle" contenteditable="${cardEditable}" data-field="subtitle">${subtitle}</div>

    <div class="med-mechanism" contenteditable="${cardEditable}" data-field="mechanism">${mechanism}</div>

    <div class="med-section first-line-section">
      <div class="med-section-header">
        ${tableControls("firstLine")}
      </div>
      <div class="med-section-content" contenteditable="${cardEditable}" data-field="firstLine">${firstLine}</div>
    </div>

    <div class="med-section second-line-section">
      <div class="med-section-header">
        ${tableControls("secondLine")}
      </div>
      <div class="med-section-content" contenteditable="${cardEditable}" data-field="secondLine">${secondLine}</div>
    </div>

    <div class="med-section allergy-first-section">
      <div class="med-section-header">
        ${tableControls("allergyFirstLine")}
      </div>
      <div class="med-section-content" contenteditable="${cardEditable}" data-field="allergyFirstLine">${allergyFirstLine}</div>
    </div>

    <div class="med-section allergy-second-section">
      <div class="med-section-header">
        ${tableControls("allergySecondLine")}
      </div>
      <div class="med-section-content" contenteditable="${cardEditable}" data-field="allergySecondLine">${allergySecondLine}</div>
    </div>

    <div class="med-section notes-section">
      <div class="med-section-content" contenteditable="${cardEditable}" data-field="notes">${extraNotes}</div>
    </div>
	
	<div class="med-card-bottom-actions">
  ${!rowData.isEditing ? `<button class="card-edit-btn" title="Edit" onclick="editSingleCard(${index})">✎</button>` : ""}
  ${rowData.isEditing ? `<button class="card-save-btn" title="Save" onclick="saveSingleCard(${index})">✓</button>` : ""}
  ${rowData.isEditing ? `<button class="card-bold-btn" title="Bold" onmousedown="event.preventDefault()" onclick="toggleCardBold(${index})">B</button>` : ""}
  ${rowData.isEditing ? `<button class="card-cancel-btn" title="Close" onclick="cancelSingleCardEdit(${index})">×</button>` : ""}
  <button class="card-cancel-btn" title="Delete" onclick="deleteCard(${index})">⌫</button>
</div>
  </div>
`;

      if (selectedCardIndex === index) {
        card.classList.add("selected");
      }

      setupCardLongPress(card, index);
      container.appendChild(card);
    });

    attachCardEditors();
    applySearchFilter();
  }

  function setupCardLongPress(card, index) {
    const start = (e) => {
      if (e.target.closest("button")) return;

      longPressTimer = setTimeout(() => {
        const sel = window.getSelection();
        const hasSelection = sel && sel.toString().trim().length > 0;
        if (!hasSelection) {
          editSingleCard(index);
        }
      }, LONG_PRESS_MS);
    };

    const cancel = () => {
      clearTimeout(longPressTimer);
    };

    card.addEventListener("mousedown", start);
    card.addEventListener("touchstart", start, { passive: true });

    card.addEventListener("mouseup", cancel);
    card.addEventListener("mouseleave", cancel);
    card.addEventListener("touchend", cancel);
    card.addEventListener("touchcancel", cancel);

    card.addEventListener("click", () => {
      const sel = window.getSelection();
      const hasSelection = sel && sel.toString().trim().length > 0;
      if (!hasSelection) {
        selectCard(index);
      }
    });
  }
  
function deleteCard(index) {
  const medName = medicationRows[index]?.medication || "this card";
  const confirmed = confirm(`Delete ${medName}?`);

  if (!confirmed) return;

  medicationRows.splice(index, 1);

  if (selectedCardIndex === index) {
    selectedCardIndex = null;
  } else if (selectedCardIndex !== null && selectedCardIndex > index) {
    selectedCardIndex -= 1;
  }

  renderCards(medicationRows);
}

  function editSingleCard(index) {
    medicationRows[index].isEditing = true;
    selectedCardIndex = index;
    renderCards(medicationRows);
  }

  function saveSingleCard(index) {
    medicationRows[index].isEditing = false;
    saveTableToFirebase();
    renderCards(medicationRows);
  }

  function cancelSingleCardEdit(index) {
    medicationRows[index].isEditing = false;
    renderCards(medicationRows);
  }

 function attachCardEditors() {
  const editableFields = document.querySelectorAll('.med-card [contenteditable="true"]');

  editableFields.forEach(field => {
    field.addEventListener("mousedown", function (e) {
      e.stopPropagation();
    });

    field.addEventListener("click", function (e) {
      e.stopPropagation();
    });

    field.addEventListener("input", function () {
      const card = this.closest(".med-card");
      if (!card) return;

      const index = parseInt(card.dataset.index, 10);
      const key = this.dataset.field;

      if (!medicationRows[index] || !key) return;
      medicationRows[index][key] = this.innerHTML.trim();

      card.dataset.search = buildSearchBlob(medicationRows[index]);

      if (currentSearchTerm.trim()) {
        applySearchFilter();
      }
    });

    field.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        e.preventDefault();
        insertLineBreakAtCursor();
      }
    });
  });

  const tableCells = document.querySelectorAll(".mini-treatment-table td");

  tableCells.forEach(cell => {
    cell.setAttribute("contenteditable", "true");

    cell.addEventListener("mousedown", function (e) {
      e.stopPropagation();
    });

    cell.addEventListener("click", function (e) {
      e.stopPropagation();
    });

    cell.addEventListener("input", function () {
      const card = this.closest(".med-card");
      if (!card) return;

      const index = parseInt(card.dataset.index, 10);
      const sectionContent = this.closest(".med-section")?.querySelector(".med-section-content");
      const key = sectionContent?.dataset.field;

      if (!medicationRows[index] || !sectionContent || !key) return;
      medicationRows[index][key] = sectionContent.innerHTML.trim();

      card.dataset.search = buildSearchBlob(medicationRows[index]);

      if (currentSearchTerm.trim()) {
        applySearchFilter();
      }
    });

    cell.addEventListener("keydown", function (e) {
      if (e.key === "Tab") return;

      if (e.key === "Enter") {
        e.preventDefault();
        insertLineBreakAtCursor();
      }
    });
  });
}

  async function loadTableFromFirebase() {
    try {
      const snapshot = await getDocs(medicationsCollection);
      medicationRows = [];

      let found = false;

      snapshot.forEach(docSnap => {
        if (docSnap.id === "medTable") {
          found = true;
          const data = docSnap.data();

          if (data.rows && Array.isArray(data.rows)) {
            medicationRows = data.rows.map(row => ({
              medication: row.medication || "",
              subtitle: row.subtitle || row.typeCategory || "",
              mechanism: row.mechanism || row.restrictions || "",
              firstLine: row.firstLine || row.dosage || "",
              secondLine: row.secondLine || "",
              allergyFirstLine: row.allergyFirstLine || "",
              allergySecondLine: row.allergySecondLine || "",
              notes: row.notes || "",
              isEditing: false
            }));
          }
        }
      });

      if (!found) {
        console.log("No saved data found");
      }

      renderCards(medicationRows);
    } catch (error) {
      console.error("Load failed:", error);
    }
  }

  function applySearchFilter() {
    const cards = document.querySelectorAll(".med-card");
    const term = currentSearchTerm.trim().toLowerCase();

    cards.forEach(card => {
      const searchable = card.dataset.search || "";
      const match = !term || searchable.includes(term);
      card.classList.toggle("hidden-card", !match);
    });
  }

  function filterTable() {
    const inputEl = document.getElementById("searchInput");
    currentSearchTerm = inputEl ? inputEl.value : "";
    applySearchFilter();
  }

  function selectCard(index) {
    selectedCardIndex = index;

    document.querySelectorAll(".med-card").forEach(card => {
      card.classList.remove("selected");
    });

    const selected = document.querySelector(`.med-card[data-index="${index}"]`);
    if (selected) selected.classList.add("selected");
  }


 function toggleCardBold(index) {
  const card = document.querySelector(`.med-card[data-index="${index}"]`);
  if (!card) return;

  const sel = window.getSelection();
  if (!sel || sel.rangeCount === 0 || sel.isCollapsed) return;

  const range = sel.getRangeAt(0);
  const selectedNode = range.commonAncestorContainer;

  if (!card.contains(selectedNode)) return;

  document.execCommand("bold", false, null);

  const editableFields = card.querySelectorAll('[data-field]');
  editableFields.forEach(field => {
    const key = field.dataset.field;
    if (key && medicationRows[index]) {
      medicationRows[index][key] = field.innerHTML.trim();
    }
  });

  card.dataset.search = buildSearchBlob(medicationRows[index]);
}

  function insertTreatmentTable(index, fieldName) {
    const labelMap = {
      firstLine: "1st line treatment",
      secondLine: "2nd line treatment",
      allergyFirstLine: "1st line if allergic to 1st line group",
      allergySecondLine: "2nd line if allergic to 1st line group"
    };

    const existing = medicationRows[index][fieldName] || "";
    const sectionLabel = labelMap[fieldName] || "Treatment";

    if (existing.includes("mini-treatment-table")) {
      const wrapper = document.createElement("div");
      wrapper.innerHTML = existing;

      const table = wrapper.querySelector(".mini-treatment-table");
      if (table) {
        const hasTitleRow = table.querySelector(".table-section-title-row");

        if (!hasTitleRow) {
          const titleRow = table.insertRow(0);
          titleRow.className = "table-section-title-row";
          titleRow.innerHTML = `<th colspan="2">${sectionLabel}</th>`;
        }

        const hasColumnHeadings = table.querySelector(".table-column-headings");
        if (!hasColumnHeadings) {
          const headingRow = table.insertRow(1);
          headingRow.className = "table-column-headings";
          headingRow.innerHTML = `
            <th>Used for</th>
            <th>Dose</th>
          `;
        } else {
          const newRow = table.insertRow();
          newRow.innerHTML = `
            <td>&nbsp;</td>
            <td>&nbsp;</td>
          `;
        }

        medicationRows[index][fieldName] = wrapper.innerHTML;
      }
    } else {
      medicationRows[index][fieldName] = `
        <table class="mini-treatment-table">
          <tr class="table-section-title-row">
            <th colspan="2">${sectionLabel}</th>
          </tr>
          <tr class="table-column-headings">
            <th>Used for</th>
            <th>Dose</th>
          </tr>
          <tr>
            <td>&nbsp;</td>
            <td>&nbsp;</td>
          </tr>
        </table>
      `;
    }

    renderCards(medicationRows);
  }

  function deleteTreatmentTable(index, fieldName) {
    if (!medicationRows[index]) return;

    const existing = medicationRows[index][fieldName] || "";
    if (!existing.includes("mini-treatment-table")) return;

    medicationRows[index][fieldName] = "";
    renderCards(medicationRows);
  }

function insertLineBreakAtCursor() {
  const sel = window.getSelection();
  if (!sel || sel.rangeCount === 0) return;

  const range = sel.getRangeAt(0);
  range.deleteContents();

  const br = document.createElement("br");
  range.insertNode(br);

  const nbsp = document.createTextNode("\u00A0");
  br.parentNode.insertBefore(nbsp, br.nextSibling);

  range.setStartAfter(nbsp);
  range.setEndAfter(nbsp);

  sel.removeAllRanges();
  sel.addRange(range);
}
window.onload = function () {
  const searchInput = document.getElementById("searchInput");
  if (searchInput) {
    searchInput.addEventListener("input", () => {
      clearTimeout(searchDebounceTimer);
      searchDebounceTimer = setTimeout(() => {
        currentSearchTerm = searchInput.value || "";
        applySearchFilter();
      }, 120);
    });
  }

  loadTableFromFirebase();
};

  window.selectCard = selectCard;
  window.addRow = addRow;
  window.saveTableToFirebase = saveTableToFirebase;
  window.filterTable = filterTable;
  window.insertTreatmentTable = insertTreatmentTable;
  window.editSingleCard = editSingleCard;
  window.saveSingleCard = saveSingleCard;
  window.cancelSingleCardEdit = cancelSingleCardEdit;
  window.deleteTreatmentTable = deleteTreatmentTable;
  window.toggleCardBold = toggleCardBold;
  window.deleteCard = deleteCard;

  window.copyEmoji = function(button, emoji) {
    navigator.clipboard.writeText(emoji).then(() => {
      const copiedSpan = button.parentElement.querySelector('.copiedMsg');
      if (copiedSpan) {
        copiedSpan.classList.add('show');
        setTimeout(() => {
          copiedSpan.classList.remove('show');
        }, 1000);
      }
    }).catch(err => {
      console.error("Failed to copy emoji:", err);
    });
  };
</script>
