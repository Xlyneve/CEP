  <style>

@keyframes popOpen {

}

.file-grid {

  margin-top: 20px;
}

@media (max-width: 1200px) {

  }
}

@media (max-width: 900px) {

  }
}

@media (max-width: 650px) {

  }
}

.file-item {
  position: relative;
  overflow: hidden;

  display: inline-block;
  width: 100%;
  break-inside: avoid;
  page-break-inside: avoid;
  margin-bottom: 12px;
  vertical-align: top;

  background:
    linear-gradient(
      145deg,
      rgba(255, 255, 255, 0.34),
      rgba(255, 255, 255, 0.10)
    );

  padding: 12px 12px 30px;
  border-radius: 22px;

  border: 1px solid rgba(255, 255, 255, 0.58);

  box-shadow:
    0 18px 45px rgba(70, 88, 110, 0.14),
    0 0 18px rgba(255, 255, 255, 0.22),
    inset 0 1px 0 rgba(255, 255, 255, 0.75),
    inset 0 -1px 0 rgba(255, 255, 255, 0.16);

  backdrop-filter: blur(16px) saturate(185%) contrast(105%);
  -webkit-backdrop-filter: blur(16px) saturate(185%) contrast(105%);

  color: #111;

  transition:
    transform 0.25s ease,
    box-shadow 0.25s ease,
    background 0.25s ease;
}

.file-item::before {
  content: "";
  position: absolute;
  inset: 0;

  background:
    linear-gradient(
      125deg,
      rgba(255, 255, 255, 0.62) 0%,
      rgba(255, 255, 255, 0.20) 26%,
      transparent 48%
    );

  opacity: 0.65;
  pointer-events: none;
}

.file-item::after {
  content: "";
  position: absolute;
  top: 10px;
  left: 14px;
  right: 14px;
  height: 1px;

  background: rgba(255, 255, 255, 0.78);
  border-radius: 999px;
  pointer-events: none;
}

.file-item:hover {
  transform: translateY(-4px);

  background:
    linear-gradient(
      145deg,
      rgba(255, 255, 255, 0.42),
      rgba(255, 255, 255, 0.14)
    );

  box-shadow:
    0 24px 58px rgba(70, 88, 110, 0.20),
    0 0 24px rgba(219, 220, 255, 0.36),
    inset 0 1px 0 rgba(255, 255, 255, 0.86);
}

/* Glassy style for text inputs and textarea */
input[type="text"],
textarea,
#searchInput,
input[type="date"] {
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.4);
  border-radius: 12px;
  padding: 8px 12px;
  font-size: 14px;
  color: #111;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 4px 10px rgba(255, 255, 255, 0.1) inset;
  transition: background-color 0.3s ease, border-color 0.3s ease;
  outline: none;
  width: 300px; /* consistent width for text inputs and textarea */

}
* {
  box-sizing: border-box;
}

.file-item,
.file-item * {
  font-family: Tahoma, Geneva, Verdana, sans-serif;
}

.view-mode,
.edit-mode {
  width: 100%;
  max-width: 100%;
  overflow-wrap: anywhere;

}

.edit-mode input,

}

}

.visit-link-btn {
  width: fit-content;
  padding: 3px 7px;

  font-family: Tahoma, Geneva, Verdana, sans-serif;
  font-size: 11px;
  line-height: 1.1;

  background: rgba(248, 237, 235, 0.72);
  border: 1px solid rgba(255, 255, 255, 0.55);
  border-radius: 7px;

  color: #333;
  cursor: pointer;

  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

input[type="text"]:focus,
textarea:focus,
#searchInput:focus,
input[type="date"]:focus {
  background: rgba(255, 255, 255, 0.4);
  border-color: rgba(255, 255, 255, 0.7);
  box-shadow: 0 4px 16px rgba(255, 255, 255, 0.3) inset;
  color: #000;
}
 
 .file-item strong {
  display: block;
  max-width: 100%;

  font-size: 14px;
  line-height: 1.35;

  color: #1f2430;
  letter-spacing: 0.1px;
  text-shadow: 0 1px 1px rgba(255, 255, 255, 0.65);

  overflow-wrap: anywhere;
  word-break: break-word;
}

.file-item em {
  display: block;
  max-width: 100%;

  font-size: 12px;
  line-height: 1.35;

}

.file-item small {
  display: block;

}

.file-buttons {
  position: absolute;
  right: 8px;
  bottom: 7px;
  z-index: 6;

  display: flex;
  gap: 4px;

  opacity: 0;
  transform: translateY(3px);
  pointer-events: none;

  transition:
    opacity 0.2s ease,
    transform 0.2s ease;
}

.file-item.show-actions .file-buttons {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

.file-buttons button {
  width: 21px;

  display: flex;
  align-items: center;
  justify-content: center;

  padding: 0;

  font-size: 11px;
  line-height: 1;

  border-radius: 50%;

  background: rgba(255, 255, 255, 0.22);
  border: 1px solid rgba(255, 255, 255, 0.45);

  color: rgba(35, 40, 52, 0.78);

  backdrop-filter: blur(12px) saturate(160%);
  -webkit-backdrop-filter: blur(12px) saturate(160%);

  cursor: pointer;
}

.file-buttons button:hover {
  background: rgba(255, 255, 255, 0.48);

}

.file-buttons button {
  width: 21px;

  display: flex;
  align-items: center;
  justify-content: center;

  padding: 0;
  margin: 0;

  font-size: 11px;

}

.file-buttons button:hover {
  background: rgba(255, 255, 255, 0.48);
  color: #111;
  transform: scale(1.08);
}


.edit-mode button {
  padding: 5px 9px;
  font-size: 11px;
  border-radius: 999px;
}

.view-mode,
.edit-mode {
  position: relative;
  z-index: 2;
}

/* Glassy style for buttons */
button {
  background: rgba(233, 203, 203, 0.12);
  border: 1px solid rgba(255, 255, 255, 0.5);
  padding: 8px 14px;
  font-size: 14px;
  color: #333;
  border-radius: 16px;
  cursor: pointer;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 4px 10px rgba(255, 255, 255, 0.15) inset;

}

button:hover {
  background-color: rgba(172, 163, 126, 0.7);
  border-color: rgba(172, 163, 126, 0.8);
  color: white;
}


  </style>
</head>
<body>

<!-- Top Buttons -->
<div class="search-add-row">
  <input type="text" id="searchInput" placeholder="Search" oninput="filterFiles()">
  <button id="addToggleBtn" class="add-plus-btn" onclick="toggleAddForm()">+</button>
</div>

<h1>Informations</h1>


<div id="addForm" class="add-form-panel" style="display:none;">
  <div class="form-group">
    <input type="text" id="urlInput" placeholder="Enter URL (https://...)">
  </div>

  <div class="form-group">
    <input type="text" id="urlTitle" placeholder="Enter title">
  </div>

  <div class="form-group">
    <textarea id="urlNote" rows="3" placeholder="Add a note..."></textarea>
  </div>

  <div class="form-group">
    <button onclick="addURL()">Save URL</button>
    <button onclick="toggleAddForm()">Cancel</button>
  </div>
</div>

<div class="file-grid" id="fileList"></div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
  // Firebase config
  const firebaseConfig = {
     apiKey: "AIzaSyAgYsVQNEOyQa41NkXXT2VuKClqXAxfG1Q",
      authDomain: "cepx-f9d2a.firebaseapp.com",
      projectId: "cepx-f9d2a",
      storageBucket: "cepx-f9d2a.firebasestorage.com",
      messagingSenderId: "840696526325",
      appId: "1:840696526325:web:b9bcb4669fbfad066a1cbc"
  };

  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  firebase.auth();
  const db = firebase.firestore();

  async function addURL() {
    const url = document.getElementById('urlInput').value.trim();
    const title = document.getElementById('urlTitle').value.trim() || 'Untitled';
    const note = document.getElementById('urlNote').value.trim();

    if (!url.startsWith('http')) {
      alert('Please enter a valid URL (https://...)');
      return;
    }

    await db.collection('urlForms').add({
      url, title, note,
      createdAt: new Date()
    });

    document.getElementById('urlInput').value = '';
document.getElementById('urlTitle').value = '';
document.getElementById('urlNote').value = '';

document.getElementById('addForm').style.display = 'none';
document.getElementById('addToggleBtn').textContent = '+';

fetchURLs(document.getElementById('searchInput').value);
  }

  async function fetchURLs(filter = '') {
  const snapshot = await db.collection('urlForms').orderBy('createdAt', 'desc').get();
  const container = document.getElementById('fileList');
  container.innerHTML = '';

  snapshot.forEach(doc => {
    const data = doc.data();

    const search = filter.toLowerCase().trim();
    const titleMatch = (data.title || '').toLowerCase().includes(search);
    const noteMatch = (data.note || '').toLowerCase().includes(search);

    if (!search || titleMatch || noteMatch) {
      const safeTitle = (data.title || '').replace(/'/g, "\\'");
      const safeNote = (data.note || '').replace(/'/g, "\\'");
      const safeUrl = data.url || '';

      const div = document.createElement('div');
      div.className = 'file-item';
      div.innerHTML = `
        <div class="view-mode" id="view-${doc.id}">
          <strong>${data.title || 'Untitled'}</strong><br>
          <em>${data.note || ''}</em><br>
          <small>
            <button class="visit-link-btn" onclick="window.open('${safeUrl}', '_blank')">Visit Link</button>
          </small>
        </div>

        <div class="edit-mode" id="edit-${doc.id}" style="display:none; margin-top:10px;">
  <input 
    type="text" 
    id="edit-title-${doc.id}" 
    value="${escapeHtmlAttr(data.title || '')}" 
    placeholder="Edit title" 
    style="width:100%; margin-bottom:8px;"
  >

  <input 
    type="text" 
    id="edit-url-${doc.id}" 
    value="${escapeHtmlAttr(data.url || '')}" 
    placeholder="Edit URL" 
    style="width:100%; margin-bottom:8px;"
  >

  <textarea 
    id="edit-note-${doc.id}" 
    rows="4" 
    placeholder="Edit note" 
    style="width:100%; margin-bottom:8px;"
  >${escapeHtmlText(data.note || '')}</textarea>

  <div style="display:flex; gap:8px; flex-wrap:wrap;">
    <button onclick="saveInlineEdit('${doc.id}')">Save</button>
    <button onclick="cancelInlineEdit('${doc.id}')">Cancel</button>
  </div>
</div>

        <div class="file-buttons">
  <button onclick="startInlineEdit('${doc.id}')" title="Edit">✎</button>
  <button onclick="deleteURL('${doc.id}')" title="Delete">×</button>
</div>
      `;
      let pressTimer;

div.addEventListener('pointerdown', (e) => {
  if (e.target.closest('button, input, textarea')) return;

  pressTimer = setTimeout(() => {
    document.querySelectorAll('.file-item.show-actions').forEach(card => {
      if (card !== div) card.classList.remove('show-actions');
    });

    div.classList.toggle('show-actions');
  }, 550);
});

div.addEventListener('pointerup', () => {
  clearTimeout(pressTimer);
});

div.addEventListener('pointerleave', () => {
  clearTimeout(pressTimer);
});

div.addEventListener('pointercancel', () => {
  clearTimeout(pressTimer);
});

container.appendChild(div);
    }
  });
}

function escapeHtmlAttr(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function escapeHtmlText(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

  function startInlineEdit(id) {
  const view = document.getElementById(`view-${id}`);
  const edit = document.getElementById(`edit-${id}`);
  if (view) view.style.display = 'none';
  if (edit) edit.style.display = 'block';
}

function cancelInlineEdit(id) {
  const view = document.getElementById(`view-${id}`);
  const edit = document.getElementById(`edit-${id}`);
  if (view) view.style.display = 'block';
  if (edit) edit.style.display = 'none';
}

async function saveInlineEdit(id) {
  const newTitle = document.getElementById(`edit-title-${id}`).value.trim() || 'Untitled';
  const newUrl = document.getElementById(`edit-url-${id}`).value.trim();
  const newNote = document.getElementById(`edit-note-${id}`).value.trim();

  if (!newUrl.startsWith('http')) {
    alert('Please enter a valid URL starting with https:// or http://');
    return;
  }

  await db.collection('urlForms').doc(id).update({
    title: newTitle,
    url: newUrl,
    note: newNote
  });

  fetchURLs(document.getElementById('searchInput').value);
}

  async function deleteURL(id) {
    if (confirm('Delete this URL entry?')) {
      await db.collection('urlForms').doc(id).delete();
      fetchURLs(document.getElementById('searchInput').value);
    }
  }

  // Filter files based on search input
  function filterFiles() {
    const term = document.getElementById('searchInput').value;
    fetchURLs(term);
  }

  // Always show search input
  const searchInput = document.getElementById('searchInput');
  searchInput.style.display = 'block';
  searchInput.addEventListener('input', filterFiles);

function toggleAddForm() {
  const form = document.getElementById('addForm');
  const btn = document.getElementById('addToggleBtn');

  const isHidden = form.style.display === 'none' || form.style.display === '';

  if (isHidden) {
    form.style.display = 'block';
    btn.textContent = '×';
  } else {
    form.style.display = 'none';
    btn.textContent = '+';
  }
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.file-item')) {
    document.querySelectorAll('.file-item.show-actions').forEach(card => {
      card.classList.remove('show-actions');
    });
  }
});

  fetchURLs(); // Initial load
</script>
 <script src="header-rays.js?v=1"></script>

</body>
</html>
