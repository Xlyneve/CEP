<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js">
  <script src="auth-guard.js"></script>
  <script src="security.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Nurse Notes</title>
  <style>
@font-face {
  font-family: 'fors';
  src: url('fors.ttf') format('truetype');
}

html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  font-family: 'Tahoma', sans-serif;
  overflow-x: auto;
  position: relative;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}
/* Background image with full-page blur overlay */
body::before {
  content: "";
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: url('2b.png') no-repeat center center fixed;
  background-size: cover;
  filter: blur(10px) brightness(0.9);
  z-index: -1;
}

.note-content {
  font-family: 'Tahoma', sans-serif;
  font-size: 12px;
}

.header {
  position: fixed;
  top: 0;
  width: 100%;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  box-sizing: border-box;
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255, 255, 255, 0.3);
  box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
  z-index: 50;
  pointer-events: auto;
}

.header-left {
  position: absolute;
  top: 18px;
  left: 10px;
  z-index: 1001;
}

.header-left a.header-link,
.header a.header-link {
  padding: 6px 12px;
  font-size: 14px;
  font-weight: bold;
  background-color: rgba(189, 191, 218, 0.6);
  border-radius: 6px;
  border: 1px solid rgba(204, 186, 181, 0.6);
  color: black;
  text-decoration: none;
  white-space: nowrap;
  transition: background-color 0.3s ease;
  pointer-events: auto;
  position: relative;
  z-index: 1000;
}

.header-left a.header-link {
  padding: 4px 10px;
  font-size: 13px;
  background-color: rgba(189, 191, 218, 0.7);
  border: 1px solid rgba(204, 186, 181, 0.6);
  position: absolute;
  top: 3px;
  left: 10px;
  z-index: 1001;
}

.header a:hover,
.header-left a.header-link:hover {
  background-color: #b88eaa;
  color: #000;
}

.header-title {
  position: absolute;
  top: 10px;
  left: 80px;
  transform: none;
  font-size: 22px;
  font-weight: bold;
  color: #000;
  text-align: left;
  z-index: 60;
  pointer-events: auto;
  opacity: 0;
  animation: fadeIn 1.5s ease forwards;
  margin: 0;
}

/* Add keyframes for fade-in */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-5px); }
  to { opacity: 1; transform: translateY(0); }
}


a.header-link {
  position: relative;
  z-index: 1000;
  pointer-events: auto;
}

.search-box {
  z-index: 50;
  pointer-events: auto;
}

.search-box input {
  padding: 4px 8px;
  font-size: 12px;
  border-radius: 4px;
  border: 1px solid #ccc;
  width: 150px; /* fixed width */
}

.container {
  background: none;
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
  padding: 100px 20px 20px 20px;
  position: relative;
  z-index: 40;
}

h2 {
  text-align: center;
  font-size: 20px;
}

.form-section {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 20px;
  position: relative;
  z-index: 40;
  align-items: flex-start;
  background: none;
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
  border-radius: 0;
  padding: 0;
  box-shadow: none;
}

.form-section input[type="file"],
.form-section textarea {
  background: rgba(255, 255, 255, 0.3);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  border: 1px solid rgba(255, 255, 255, 0.4);
  color: #222;
  padding: 6px 8px;
  font-size: 12px;
  border-radius: 8px;
  box-sizing: border-box;
  font-family: 'Tahoma', sans-serif;
  box-shadow: inset 0 0 5px rgba(255, 255, 255, 0.2);
  transition: all 0.3s ease;
}

#nurseTitle,
#nurseURL {
  background: rgba(255, 255, 255, 0.25);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  border: none;
  box-shadow: inset 0 0 5px rgba(255, 255, 255, 0.15);
  color: #222;
  padding: 6px 10px;
  font-size: 12px;
  border-radius: 8px;
  box-sizing: border-box;
  font-family: 'fors', sans-serif;
  transition: all 0.3s ease;
}

#nurseTitle:focus,
#nurseURL:focus {
  outline: none;
  background: rgba(255, 255, 255, 0.4);
  box-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
}

#nurseTitle {
  flex: 1 1 180px;
  height: 60px;
  min-width: 150px;
}

#nurseNote {
  flex: 2 1 280px;
  min-height: 60px;
  resize: vertical;
}

#nurseURL {
  flex: 1 1 180px;
  height: 60px;
  min-width: 150px;
}

#nurseImage {
  flex: 0 0 auto;
  height: 34px;
  padding: 4px 10px;
  cursor: pointer;
}

.cards-container {
  column-count: 4;
  column-gap: 15px;
  width: 100%;
  padding: 10px 0;
}

.note-card {
  position: relative;
  display: inline-flex;
  flex-direction: column;

  width: 90%;
  margin-bottom: 15px;
  padding: 14px;
  border-radius: 24px;

  break-inside: avoid;
  word-wrap: break-word;
  overflow: hidden;

  background:
  linear-gradient(
    145deg,
    rgba(255, 255, 255, 0.34),
    rgba(255, 255, 255, 0.12)
  );

  backdrop-filter: blur(34px) saturate(190%);
  -webkit-backdrop-filter: blur(34px) saturate(190%);

  border: 1px solid rgba(255, 255, 255, 0.66);

  box-shadow:
    0 18px 42px rgba(20, 70, 110, 0.16),
    inset 0 1px 0 rgba(255, 255, 255, 0.82),
    inset 0 -24px 36px rgba(255, 255, 255, 0.12);

  color: rgba(20, 20, 30, 0.92);

  transition:
    transform 0.18s ease,
    background 0.18s ease,
    box-shadow 0.18s ease;
}

.note-card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;

  background:
    radial-gradient(
      circle at 25% 12%,
      rgba(255, 255, 255, 0.38),
      rgba(255, 255, 255, 0.16) 34%,
      transparent 56%
    ),
    linear-gradient(
      145deg,
      rgba(160, 245, 255, 0.08),
      rgba(255, 255, 255, 0.04),
      rgba(80, 150, 255, 0.05)
    );

  pointer-events: none;
}

.note-card::after {
  content: "";
  position: absolute;
  left: 12%;
  top: 8px;
  width: 58%;
  height: 26%;
  border-radius: 999px;

  background:
    linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.24),
      rgba(255, 255, 255, 0.03)
    );

  filter: blur(8px);
  pointer-events: none;
}

.note-card > * {
  position: relative;
  z-index: 1;
}

.note-card .note-content,
.note-card .note-title {
  color: #000;
}

.note-card:hover {
  transform: translateY(-3px);

  background:
    linear-gradient(
      145deg,
      rgba(255, 255, 255, 0.56),
      rgba(255, 255, 255, 0.26)
    );

  box-shadow:
    0 22px 48px rgba(20, 70, 110, 0.20),
    inset 0 1px 0 rgba(255, 255, 255, 0.90),
    inset 0 -24px 36px rgba(255, 255, 255, 0.16);
}

.note-card.new-note-highlight {
  animation: newNoteGlow 2.4s ease;
  outline: 3px solid rgba(255, 255, 255, 0.95);
  outline-offset: 4px;
}

.note-card.new-note-highlight::after {
  content: "NEW";
  position: absolute;
  top: -12px;
  right: -10px;
  padding: 4px 8px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: bold;
  color: #111;
  background: linear-gradient(
    135deg,
    rgba(255, 239, 166, 0.96),
    rgba(232, 205, 255, 0.94)
  );
  border: 1px solid rgba(255, 255, 255, 0.75);
  box-shadow:
    0 0 10px rgba(255, 239, 166, 0.55),
    0 0 16px rgba(232, 205, 255, 0.45);
}

@keyframes newNoteGlow {
  0% {
    transform: scale(1.04);
    box-shadow:
      0 0 0 4px rgba(255, 255, 255, 0.95),
      0 0 22px rgba(255, 255, 255, 0.75),
      0 0 35px rgba(255, 255, 255, 0.45);
  }

  60% {
    transform: scale(1.02);
    box-shadow:
      0 0 0 3px rgba(255, 255, 255, 0.65),
      0 0 18px rgba(255, 255, 255, 0.45),
      0 0 28px rgba(255, 255, 255, 0.25);
  }

  100% {
    transform: scale(1);
    box-shadow:
      0 8px 32px rgba(100, 100, 150, 0.15),
      0 0 10px rgba(255, 255, 255, 0.2);
  }
}

.note-card.editing-note {
  transform: scale(1.02);

  background:
    linear-gradient(
      145deg,
      rgba(255, 255, 255, 0.46),
      rgba(255, 255, 255, 0.20)
    );

  box-shadow:
    0 22px 48px rgba(20, 70, 110, 0.22),
    0 0 0 3px rgba(255, 255, 255, 0.42),
    inset 0 1px 0 rgba(255, 255, 255, 0.92),
    inset 0 -24px 36px rgba(255, 255, 255, 0.18);

  z-index: 20;
}

.edit-title {
  width: 93%;
  margin-bottom: 6px;
  padding: 6px 10px;
  font-family: Tahoma, sans-serif;
  font-size: 11px;
  border-radius: 8px;
  border: 1px solid rgba(255, 255, 255, 0.4);
  background: rgba(255, 255, 255, 0.3);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  box-shadow: inset 0 0 5px rgba(255, 255, 255, 0.2);
  color: #222;
  transition: all 0.3s ease;
}
.note-title {
  font-weight: 700;
  font-size: 14px;
  margin-bottom: 6px;
  color: rgba(20, 20, 30, 0.94);
  text-shadow: none;
}

.note-actions {
  margin-top: 12px;
  display: flex;
  justify-content: flex-end;
  gap: 6px;
}

.highlight-gradient {
  background: linear-gradient(
    90deg,
    rgba(255, 205, 225, 0.82),
    rgba(255, 244, 170, 0.82),
    rgba(215, 200, 255, 0.82)
  );
  border-radius: 5px;
  padding: 0 2px;
  box-decoration-break: clone;
  -webkit-box-decoration-break: clone;
}

.editor-buttons {
  display: flex;
  gap: 6px;
  margin-top: 6px;
}


.edit-save-btn {
  background: rgba(214, 245, 255, 0.7);
}

.edit-cancel-btn {
  background: rgba(255, 220, 220, 0.55);
}
.edit-main-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 8px;
  align-items: center;
}


.mini-btn,
.table-mini {
  padding: 4px 8px;
  font-size: 10px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.32);
  border: 1px solid rgba(255, 255, 255, 0.55);
  box-shadow: none;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}


.mini-btn:hover,
.table-mini:hover {
  background: rgba(255, 255, 255, 0.55);
  box-shadow: none;
}

.btn-bold {
  font-weight: bold;
}

.btn-highlight {
  background: rgba(255, 246, 204, 0.55);
}

.save-mini {
  background: rgba(214, 245, 255, 0.55);
}

.cancel-mini {
  background: rgba(255, 220, 220, 0.45);
}

.edit-table-tools {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 8px;
  padding-top: 7px;
  border-top: 1px solid rgba(255, 255, 255, 0.45);
}

.table-tools-label {
  width: 100%;
  font-size: 9px;
  color: #555;
  margin-bottom: 1px;
  letter-spacing: 0.3px;
}

#nurseNote.main-note-editor {
  flex: 2 1 280px;
  min-height: 90px;
  max-height: 260px;
  overflow-y: auto;
  width: 95%;
  padding: 6px 8px;
  border-radius: 8px;
  box-sizing: border-box;
  font-family: Tahoma, sans-serif;
  font-size: 12px;
  color: #222;
  background: rgba(255, 255, 255, 0.3);
  border: 1px solid rgba(255, 255, 255, 0.4);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  box-shadow: inset 0 0 5px rgba(255, 255, 255, 0.2);
}

#nurseNote:empty::before {
  content: attr(data-placeholder);
  color: #777;
  pointer-events: none;
}

.main-editor-buttons {
  flex: 1 1 100%;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.note-content,
.edit-note,
#nurseNote {
  max-width: 100%;
  min-width: 0;
  overflow-x: auto;
  overflow-y: visible;
  box-sizing: border-box;
}

.note-content table,
.edit-note table,
#nurseNote table {
  width: max-content;
  min-width: 0;
  max-width: none;
  table-layout: auto;
  border-collapse: collapse;
  margin: 8px 0;
  font-size: 12px;
  font-family: Tahoma, sans-serif;
}

.note-content td,
.note-content th,
.edit-note td,
.edit-note th,
#nurseNote td,
#nurseNote th {
  border: 1px solid rgba(0, 0, 0, 0.25);
  padding: 5px 7px;
  min-width: 24px;
  width: auto;
  vertical-align: top;
  white-space: nowrap;
}

.note-content td,
.edit-note td,
#nurseNote td {
  background: rgba(255, 255, 255, 0.18);
}

.note-content th,
.edit-note th,
#nurseNote th {
  background: rgba(255, 255, 255, 0.35);
  font-weight: bold;
}

/* Frosted white / soft blue glass scrollbars for wide note tables */
.note-content,
.edit-note,
#nurseNote {
  scrollbar-width: thin;
  scrollbar-color: rgba(235, 242, 255, 0.85) rgba(255, 255, 255, 0.08);
}

/* Chrome / Edge / Safari */
.note-content::-webkit-scrollbar,
.edit-note::-webkit-scrollbar,
#nurseNote::-webkit-scrollbar {
  height: 10px !important;
  width: 10px !important;
}

.note-content::-webkit-scrollbar-track,
.edit-note::-webkit-scrollbar-track,
#nurseNote::-webkit-scrollbar-track {
  background: rgba(255, 255, 255, 0.08) !important;
  border-radius: 999px !important;
  margin: 4px !important;
}

.note-content::-webkit-scrollbar-thumb,
.edit-note::-webkit-scrollbar-thumb,
#nurseNote::-webkit-scrollbar-thumb {
  background: rgba(255, 255, 255, 0.72) !important;
  border-radius: 999px !important;
  border: 2px solid rgba(255, 255, 255, 0.38) !important;
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.9),
    inset 0 -1px 0 rgba(255, 255, 255, 0.22),
    0 2px 8px rgba(255, 255, 255, 0.18) !important;
}

.note-content::-webkit-scrollbar-thumb:hover,
.edit-note::-webkit-scrollbar-thumb:hover,
#nurseNote::-webkit-scrollbar-thumb:hover {
  background: rgba(218, 232, 255, 0.92) !important;
  border: 2px solid rgba(245, 250, 255, 0.85) !important;
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.95),
    inset 0 -1px 0 rgba(210, 225, 255, 0.35),
    0 2px 10px rgba(155, 175, 220, 0.28) !important;
}

.note-content::-webkit-scrollbar-corner,
.edit-note::-webkit-scrollbar-corner,
#nurseNote::-webkit-scrollbar-corner {
  background: transparent !important;
}

.note-content table {
  cursor: zoom-in;
}

.table-zoom-overlay table {
  cursor: default;
}

button,
.note-actions button,
.editor-buttons button,
.header a.header-link {
  background: rgba(255, 255, 255, 0.15);
  border: 1px solid rgba(255, 255, 255, 0.4);
  color: #111;
  padding: 6px 12px;
  font-size: 11px;
  border-radius: 8px;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(255, 255, 255, 0.3),
              inset 0 0 10px rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  transition: background-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
  user-select: none;
  text-align: center;
}

button:hover,
.note-actions button:hover,
.editor-buttons button:hover,
.header a.header-link:hover {
  background: rgba(255, 255, 255, 0.35);
  color: #000;
  box-shadow: 0 6px 20px rgba(255, 255, 255, 0.5),
              inset 0 0 12px rgba(255, 255, 255, 0.3);
}

button:active,
.note-actions button:active,
.editor-buttons button:active,
.header a.header-link:active,
button:focus,
.note-actions button:focus,
.editor-buttons button:focus,
.header a.header-link:focus {
  outline: none;
  background: rgba(255, 255, 255, 0.45);
  box-shadow: 0 8px 25px rgba(255, 255, 255, 0.6),
              inset 0 0 14px rgba(255, 255, 255, 0.4);
  color: #000;
}

.note-url {
  margin-top: 10px;
}

.note-url a {
  background-color: #FFF1F5;
  color: #333;
  text-decoration: none;
  padding: 3px 8px;
  border-radius: 5px;
  font-size: 11px;
  display: inline-block;
  transition: background-color 0.3s ease;
}

.note-url a:hover {
  background-color: #ddc6b2;
}

.note-url a .icon {
  margin-right: 6px;
}

.custom-file-btn {
  display: inline-block;
  padding: 6px 14px;
  background: rgba(255, 255, 255, 0.6);
  backdrop-filter: blur(10px);
  border: 1.5px solid rgba(255, 255, 255, 0.8);
  border-radius: 8px;
  cursor: pointer;
  font-family: 'fors', sans-serif;
  font-size: 13px;
  color: #222;
  box-shadow: 0 0 6px rgba(0, 0, 0, 0.15);
  user-select: none;
  transition: all 0.3s ease;
  margin-left: 8px;
  vertical-align: middle;
}

.custom-file-btn:hover {
  background: rgba(255, 255, 255, 0.8);
  color: #000;
  box-shadow: 0 0 8px rgba(0, 0, 0, 0.25);
}

.add-btn {
  height: 34px;
  min-width: 100px;
  align-self: flex-start;
  padding: 6px 16px;
  background: rgba(255, 255, 255, 0.65);
  border: 1.5px solid rgba(255, 255, 255, 0.9);
  color: #111;
  box-shadow: 0 0 6px rgba(0, 0, 0, 0.2);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.3s ease;
  margin-left: 8px;
  vertical-align: middle;
}

.add-btn:hover {
  background: rgba(255, 255, 255, 0.9);
  color: #000;
  box-shadow: 0 0 12px rgba(0, 0, 0, 0.3);
}

.hidden {
  display: none;
}

#toggleFormBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.3);
  backdrop-filter: blur(90px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255, 255, 255, 0.5);
  font-size: 28px;
  font-weight: bold;
  color: #000;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.3s ease, transform 0.2s ease;
  z-index: 1000;
}

#toggleFormBtn:hover {
  background: rgba(255, 255, 255, 0.5);
  transform: scale(1.1);
}

#nurseFormWrapper {
  position: fixed;
  bottom: -100%;
  right: 20px;
  width: 300px;
  padding: 15px;
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.3);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.25);
  transition: bottom 0.4s ease, opacity 0.4s ease;
  opacity: 0;
  z-index: 999;
}

#nurseFormWrapper.show {
  bottom: 80px;
  opacity: 1;
}


@media (max-width: 768px) {
  html, body {
    overflow-x: auto;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  body {
    min-width: 1280px;
  }

  body::before {
    position: absolute;
    top: 0;
    left: 0;
    width: 1280px;
    min-width: 1280px;
    min-height: 100%;
    background: url('2b.png') no-repeat center center;
    background-size: cover;
    background-attachment: scroll;
  }

  .header {
    position: absolute;
    top: 0;
    left: 0;
    width: 1280px;
    min-width: 1280px;
    padding: 0 20px;
  }

  .container {
    width: 1280px;
    min-width: 1280px;
    padding: 100px 20px 20px 20px;
    box-sizing: border-box;
  }

  .cards-container {
    column-count: 4;
    column-gap: 15px;
    width: 100%;
  }

  .note-card {
    width: 90%;
  }



  .center-toggle {
    position: absolute;
    left: 50%;
    top: 35px;
    transform: translate(-50%, -50%);
    z-index: 1004;
  }

<script type="module">
import { initializeApp, getApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

/* ---------------- Firebase ---------------- */

await window.CEP_AUTH_READY;

const firebaseConfig = {

/* ---------------- Global Filter Persistence ---------------- */
let currentSearchQuery = "";

async function addNote() {

/* ---------------- Utilities ---------------- */
function escapeHtml(text) {
  return text.replace(/&/g, "&amp;")
             .replace(/</g, "&lt;")
             .replace(/>/g, "&gt;")
             .replace(/"/g, "&quot;")
             .replace(/'/g, "&#039;");
}

function closestTagWithin(node, className, container) {
  let el = node && node.nodeType === 3 ? node.parentNode : node;

  while (el && el !== container) {
    if (el.nodeType === 1 && el.classList.contains(className)) {
      return el;
    }
    el = el.parentNode;
  }

  return null;
}

function unwrapElement(el) {
  if (!el || !el.parentNode) return;

  const parent = el.parentNode;

  while (el.firstChild) {
    parent.insertBefore(el.firstChild, el);
  }

  parent.removeChild(el);
}

function toggleGradientHighlight(editor) {
  editor.focus();

  const selection = window.getSelection();
  if (!selection.rangeCount) return;

  const range = selection.getRangeAt(0);
  if (!editor.contains(range.commonAncestorContainer)) return;

  const selectedText = selection.toString();
  if (!selectedText.trim()) return;

  const startHighlight = closestTagWithin(selection.anchorNode, 'highlight-gradient', editor);
  const endHighlight = closestTagWithin(selection.focusNode, 'highlight-gradient', editor);

  let removed = false;

  if (startHighlight) {
    unwrapElement(startHighlight);
    removed = true;
  }

  if (endHighlight && endHighlight.isConnected && endHighlight !== startHighlight) {
    unwrapElement(endHighlight);
    removed = true;
  }

  if (removed) {
    selection.removeAllRanges();
    return;
  }

  const span = document.createElement('span');
  span.className = 'highlight-gradient';

  try {
    range.surroundContents(span);
  } catch (_) {
    const selectedHtml = range.cloneContents();
    span.appendChild(selectedHtml);
    range.deleteContents();
    range.insertNode(span);
  }

  selection.removeAllRanges();
}
function resizeImage(file, maxWidth = 900, quality = 0.75) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();

    reader.onload = function (event) {
      const img = new Image();

      img.onload = function () {
        const canvas = document.createElement('canvas');

        let width = img.width;
        let height = img.height;

        if (width > maxWidth) {
          height = Math.round((height * maxWidth) / width);
          width = maxWidth;
        }

        canvas.width = width;
        canvas.height = height;

        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);

        const resizedBase64 = canvas.toDataURL('image/jpeg', quality);
        resolve(resizedBase64);
      };

      img.onerror = reject;
      img.src = event.target.result;
    };

    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function insertTableInEditor(editor, rows = 2, cols = 2) {
  editor.focus();

  let tableHtml = `<table><tbody>`;

  for (let r = 0; r < rows; r++) {
    tableHtml += `<tr>`;

    for (let c = 0; c < cols; c++) {
      tableHtml += `<td><br></td>`;
    }

    tableHtml += `</tr>`;
  }

  tableHtml += `</tbody></table><br>`;

  document.execCommand('insertHTML', false, tableHtml);
}

function getCurrentTableCell(editor) {
  const sel = window.getSelection();
  if (!sel.rangeCount) return null;

  let node = sel.anchorNode;
  if (!editor.contains(node)) return null;

  if (node.nodeType === 3) {
    node = node.parentNode;
  }

  return node.closest ? node.closest('td, th') : null;
}

function addTableRow(editor) {
  const cell = getCurrentTableCell(editor);
  if (!cell) return alert("Click inside a table cell first.");

  const row = cell.parentElement;
  const colCount = row.children.length;
  const newRow = document.createElement('tr');

  for (let i = 0; i < colCount; i++) {
    const td = document.createElement('td');
    td.innerHTML = '<br>';
    newRow.appendChild(td);
  }

  row.after(newRow);
}

function addTableColumn(editor) {
  const cell = getCurrentTableCell(editor);
  if (!cell) return alert("Click inside a table cell first.");

  const cellIndex = Array.from(cell.parentElement.children).indexOf(cell);
  const table = cell.closest('table');

  Array.from(table.rows).forEach(row => {
    const td = document.createElement('td');
    td.innerHTML = '<br>';
    row.children[cellIndex].after(td);
  });
}

function deleteTableRow(editor) {
  const cell = getCurrentTableCell(editor);
  if (!cell) return alert("Click inside a table cell first.");

  const row = cell.parentElement;
  const table = row.closest('table');

  if (table.rows.length <= 1) {
    return alert("You need at least one row.");
  }

  row.remove();
}

function deleteTableColumn(editor) {
  const cell = getCurrentTableCell(editor);
  if (!cell) return alert("Click inside a table cell first.");

  const cellIndex = Array.from(cell.parentElement.children).indexOf(cell);
  const table = cell.closest('table');

  if (table.rows[0].children.length <= 1) {
    return alert("You need at least one column.");
  }

  Array.from(table.rows).forEach(row => {
    row.children[cellIndex].remove();
  });
}

  ${note}
</div>

<input type="text" class="edit-url" value="${escapeHtml(url || "")}" placeholder="Optional URL"
  style="width:93%; margin-top:6px; margin-bottom:6px; padding:6px 10px;

   <div class="edit-main-actions">

</div>

<div class="edit-table-tools">

  <button class="btn-del-row table-mini">- Row</button>
  <button class="btn-del-col table-mini">- Col</button>
</div>
  `;

  const inputTitle = card.querySelector('.edit-title');
  const editableDiv = card.querySelector('.edit-note');
  const inputUrl = card.querySelector('.edit-url');

  const btnSave = card.querySelector('.btn-save');
  const btnCancel = card.querySelector('.btn-cancel');
  const btnBold = card.querySelector('.btn-bold');
  const btnHighlight = card.querySelector('.btn-highlight');
  const btnTable = card.querySelector('.btn-table');
  const btnAddRow = card.querySelector('.btn-add-row');
  const btnAddCol = card.querySelector('.btn-add-col');
  const btnDelRow = card.querySelector('.btn-del-row');
  const btnDelCol = card.querySelector('.btn-del-col');

  btnSave.addEventListener('click', async () => {
  const updatedTitle = inputTitle.value.trim() || "Untitled";
  const updatedNote = editableDiv.innerHTML.trim();
  const updatedUrl = inputUrl.value.trim();

  await saveEdit(id, updatedTitle, updatedNote, updatedUrl);
});

  btnCancel.addEventListener('click', () => {
  renderNotesOnce();
});

  btnBold.addEventListener('mousedown', (e) => {
    e.preventDefault();
    editableDiv.focus();
    document.execCommand('bold');
  });

  btnHighlight.addEventListener('mousedown', (e) => {
  e.preventDefault();
  toggleGradientHighlight(editableDiv);
});

  btnTable.addEventListener('mousedown', (e) => {
    e.preventDefault();
    insertTableInEditor(editableDiv, 2, 2);
  });

  btnAddRow.addEventListener('mousedown', (e) => {
    e.preventDefault();
    addTableRow(editableDiv);
  });

  btnAddCol.addEventListener('mousedown', (e) => {
    e.preventDefault();
    addTableColumn(editableDiv);
  });

  btnDelRow.addEventListener('mousedown', (e) => {
    e.preventDefault();
    deleteTableRow(editableDiv);
  });

  btnDelCol.addEventListener('mousedown', (e) => {
    e.preventDefault();
    deleteTableColumn(editableDiv);
  });
}
/* ---------------- Rendering ---------------- */
function buildNoteCards(snapshot) {
  const list = document.getElementById('nurseNotesList');
  list.innerHTML = '';

  renderInBatches(list, snapshot.docs, docSnap => {
    const { title, note, time, url, image } = docSnap.data();
    const id = docSnap.id;

    const div = document.createElement('div');
    div.className = 'note-card';

    if (
      id === newestNoteId ||
      (pendingNewNoteTime && time === pendingNewNoteTime)
    ) {
      div.classList.add('new-note-highlight');

      setTimeout(() => {
        div.scrollIntoView({
          behavior: 'smooth',
          block: 'center',
          inline: 'nearest'
        });
      }, 300);

      setTimeout(() => {
        div.classList.remove('new-note-highlight');
        newestNoteId = null;
        pendingNewNoteTime = null;
      }, 2600);
    }

    div.innerHTML = `
      <div class="note-title">${title}</div>
      <div class="note-content">${note}</div>
      ${image ? `<img src="${image}" loading="lazy" decoding="async" class="note-image" style="width:65%; max-width:220px; margin-top:10px; border-radius:6px; cursor:pointer; display:block;" />` : ""}
      <div style="font-size:12px; margin-top:10px; color:#555;">${new Date(time).toLocaleString()}</div>
      ${url ? `<div class="note-url"><a href="${url}" target="_blank"><span class="icon">🔗</span>Open URL</a></div>` : ""}
      <div class="note-actions">
        <button class="edit-btn">Edit</button>
        <button class="delete-btn">Delete</button>
      </div>
    `;

    div.querySelector('.edit-btn').addEventListener('click', () => {
      enableEditing(div, id, title, note, url);
    });

    div.querySelector('.delete-btn').addEventListener('click', () => {
      deleteNote(id);
    });

    const img = div.querySelector('.note-image');
if (img) {
  img.addEventListener('click', () => openImageZoom(img.src));
}

div.querySelectorAll('.note-content table').forEach(table => {
  table.addEventListener('click', (e) => {
    e.stopPropagation();
    openTableZoom(table.outerHTML);
  });
});

return div;
  }, {
    initialBatchSize: 12,
    batchSize: 8,
    onBatch: () => {
      if (currentSearchQuery.trim() !== "") applySearchFilter(currentSearchQuery);
    }
  });
}

function renderNotes() {
  if (unsubscribeNotes) return;

  unsubscribeNotes = onSnapshot(notesCol, snapshot => {
    buildNoteCards(snapshot);
  });
}

async function renderNotesOnce() {
  if (unsubscribeNotes) {
    unsubscribeNotes();
    unsubscribeNotes = null;
  }

  renderNotes();
}
/* ---------------- Image Zoom ---------------- */
function openImageZoom(src) {
  // Create overlay
  const overlay = document.createElement('div');
  overlay.style.position = 'fixed';
  overlay.style.top = '0';
  overlay.style.left = '0';
  overlay.style.width = '100%';
  overlay.style.height = '100%';
  overlay.style.background = 'rgba(0, 0, 0, 0.8)';
  overlay.style.display = 'flex';
  overlay.style.alignItems = 'center';
  overlay.style.justifyContent = 'center';
  overlay.style.zIndex = '9999';
  overlay.style.cursor = 'zoom-out';
  overlay.addEventListener('click', () => document.body.removeChild(overlay));

  // Image
  const zoomedImg = document.createElement('img');
  zoomedImg.src = src;
  zoomedImg.style.maxWidth = '90%';
  zoomedImg.style.maxHeight = '90%';
  zoomedImg.style.borderRadius = '10px';
  zoomedImg.style.boxShadow = '0 0 20px rgba(255,255,255,0.2)';
  zoomedImg.style.transition = 'transform 0.3s ease';
  zoomedImg.addEventListener('click', e => e.stopPropagation());

  overlay.appendChild(zoomedImg);
  document.body.appendChild(overlay);
}

function openTableZoom(tableHtml) {
  const overlay = document.createElement('div');
  overlay.className = 'table-zoom-overlay';

  overlay.style.position = 'fixed';
  overlay.style.top = '0';
  overlay.style.left = '0';
  overlay.style.width = '100%';
  overlay.style.height = '100%';
  overlay.style.background = 'rgba(255, 255, 255, 0.18)';
  overlay.style.backdropFilter = 'blur(18px)';
  overlay.style.webkitBackdropFilter = 'blur(18px)';
  overlay.style.display = 'flex';
  overlay.style.alignItems = 'center';
  overlay.style.justifyContent = 'center';
  overlay.style.zIndex = '9999';
  overlay.style.cursor = 'zoom-out';
  overlay.style.padding = '24px';
  overlay.style.boxSizing = 'border-box';

  const box = document.createElement('div');

  box.style.maxWidth = '92vw';
  box.style.maxHeight = '86vh';
  box.style.overflow = 'auto';
  box.style.padding = '18px';
  box.style.borderRadius = '22px';
  box.style.background = 'rgba(255, 255, 255, 0.42)';
  box.style.backdropFilter = 'blur(26px) saturate(180%)';
  box.style.webkitBackdropFilter = 'blur(26px) saturate(180%)';
  box.style.border = '1px solid rgba(255, 255, 255, 0.65)';
  box.style.boxShadow = '0 20px 60px rgba(0, 0, 0, 0.18)';
  box.style.cursor = 'default';

  box.innerHTML = tableHtml;

  const table = box.querySelector('table');
  if (table) {
  table.style.width = 'max-content';
  table.style.minWidth = '0';
  table.style.borderCollapse = 'collapse';
  table.style.fontFamily = 'Tahoma, sans-serif';
  table.style.fontSize = '14px';
  table.style.tableLayout = 'auto';
}

  box.querySelectorAll('td, th').forEach(cell => {
    cell.style.border = '1px solid rgba(0, 0, 0, 0.25)';
    cell.style.padding = '8px 10px';
    cell.style.minWidth = '28px';
    cell.style.whiteSpace = 'nowrap';
    cell.style.background = 'rgba(255, 255, 255, 0.32)';
  });

  overlay.addEventListener('click', () => {
    document.body.removeChild(overlay);
  });

  box.addEventListener('click', e => {
    e.stopPropagation();
  });

  overlay.appendChild(box);
  document.body.appendChild(overlay);
}

/* ---------------- Search / Filter ---------------- */
function applySearchFilter(query) {
  const cards = document.querySelectorAll('.note-card');
  query = query.toLowerCase();
  cards.forEach(card => {
    const title = card.querySelector('.note-title')?.textContent.toLowerCase() || '';
    const content = card.querySelector('.note-content')?.textContent.toLowerCase() || '';
    card.style.display = (title.includes(query) || content.includes(query)) ? 'block' : 'none';
  });
}

function searchNotes(event) {
  currentSearchQuery = event.target.value; // remember filter text
  applySearchFilter(currentSearchQuery);
}

document.addEventListener('DOMContentLoaded', () => {

});

document.getElementById('mainDelRowBtn').addEventListener('mousedown', (e) => {

});

document.getElementById('mainDelColBtn').addEventListener('mousedown', (e) => {
  e.preventDefault();

  const editor = document.getElementById('nurseNote');
  deleteTableColumn(editor);
});

window.addNote = addNote;
window.deleteNote = deleteNote;
window.saveEdit = saveEdit;
window.enableEditing = enableEditing;
window.renderNotes = renderNotes;
window.openImageZoom = openImageZoom;
window.openTableZoom = openTableZoom;

// Initial load
renderNotes();

 // Toggle form
