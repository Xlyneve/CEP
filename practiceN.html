<html lang="en">

  <title>Practice Nurse</title>
  <style>
@font-face {
  font-family: 'fors';
  src: url('fors.ttf') format('truetype'); /* Adjust the path */
}

*,
*::before,
*::after {
  font-family: Tahoma, sans-serif !important;
}

html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  font-family: 'Tahoma', sans-serif;
  overflow-x: auto;
  position: relative;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

body::before {
  content: "";
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: url('site-background.webp') no-repeat center center fixed;
  background-size: cover;
  filter: blur(10px) brightness(0.9);
  z-index: -1;
  pointer-events: none;
}

.header-title {
  position: absolute;
  top: 10px;
  left: 80px;
  transform: none;
  font-size: 22px;
  font-weight: bold;
  color: #000;
  text-align: left;
  z-index: 60;
  pointer-events: auto;
  opacity: 0; /* Start hidden */
  animation: fadeIn 1.5s ease forwards; /* Trigger fade-in */
}

/* Add keyframes for fade-in */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-5px); }
  to { opacity: 1; transform: translateY(0); }
}

a.header-link {
  position: relative;
  z-index: 1000;
  pointer-events: auto;
}

.header a:hover {
  background-color: #b88eaa;
}

.home-btn {
  position: fixed;
  top: 20px;
  left: 20px;
  background: rgba(255, 255, 255, 0.15);
  border: 1px solid rgba(255, 255, 255, 0.3);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  box-shadow: 0 4px 10px rgba(255, 255, 255, 0.25);
  color: black;
  text-decoration: none;
  font-weight: bold;
  padding: 8px 12px;
  border-radius: 50px;
  font-size: 14px;
  cursor: pointer;
  transition: background-color 0.3s ease, box-shadow 0.3s ease;
  z-index: 1000;
}

.home-btn:hover {
  background: rgba(255, 255, 255, 0.3);
  box-shadow: 0 6px 14px rgba(255, 255, 255, 0.45);
}

.search-bar {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 1000;
  display: flex;
  align-items: center;
  gap: 6px;
}

.search-input {
  width: 150px;
  padding: 4px 8px;
  border-radius: 6px;
  border: 1px solid rgba(255, 255, 255, 0.3);
  font-size: 13px;
  background: rgba(255, 255, 255, 0.15);
  color: black;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  box-shadow: 0 4px 10px rgba(255, 255, 255, 0.25);
  transition: background-color 0.3s ease;
}

.search-input:focus {
  background: rgba(255, 255, 255, 0.3);
  outline: none;
}

.container {
  width: 100%;
  padding: 100px 20px 20px; /* top padding increased for header space */
  box-sizing: border-box;
  max-width: 100vw;
}



input[type="text"],
textarea {
  display: block;
  margin: 0.2rem auto;
  padding: 0.5rem;
  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, 0.4);
  font-size: 13px;
  width: 90%;
  max-width: 500px;
  background: rgba(255, 255, 255, 0.25);
  font-family: Tahoma, sans-serif;
  color: #222;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  box-shadow: 0 4px 10px rgba(255, 255, 255, 0.25);
  transition: background-color 0.3s ease;
  z-index: 1;
}

input[type="text"]:focus,
textarea:focus {
  background: rgba(255, 255, 255, 0.35);
  outline: none;
}

.format-buttons,
.action-buttons {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 6px 0 10px 0;
  flex-wrap: wrap;
  align-items: center;
}

.format-buttons button,
.add-btn,
.btn-group button,
.editor-buttons button {
  background: rgba(255, 255, 255, 0.15);
  border: 1px solid rgba(255, 255, 255, 0.3);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: black;
  box-shadow: 0 4px 10px rgba(255, 255, 255, 0.25);
  border-radius: 6px;
  padding: 4px 8px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 400;
  transition: background-color 0.3s ease, box-shadow 0.3s ease;
}

.mini-toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 8px;
  align-items: center;
}
.mini-btn,
.table-mini {
  padding: 4px 8px !important;
  font-size: 10px !important;
  border-radius: 999px !important;
  background: rgba(255, 255, 255, 0.28) !important;
  border: 1px solid rgba(255, 255, 255, 0.55) !important;
  box-shadow: none !important;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  font-weight: 400 !important;
  cursor: pointer;
}

.save-mini {
  background: rgba(214, 245, 255, 0.5) !important;
}

.cancel-mini {
  background: rgba(255, 220, 220, 0.42) !important;
}

.delete-mini {
  background: rgba(255, 210, 210, 0.5) !important;
}

.highlight-mini {
  background: rgba(255, 246, 204, 0.55) !important;
}

.bold-mini {
  font-weight: 700 !important;
}

.mini-btn:hover,
.table-mini:hover {
  background: rgba(255, 255, 255, 0.5) !important;
  box-shadow: none !important;
}

.edit-table-tools {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 8px;
  padding-top: 7px;
  border-top: 1px solid rgba(255, 255, 255, 0.45);
}

.table-tools-label {
  width: 100%;
  font-size: 9px;
  color: #555;
  margin-bottom: 1px;
  letter-spacing: 0.3px;
}

.edit-toolbar {
  display: none;
  flex-direction: column;
  gap: 6px;
  margin-top: 8px;
  width: 100%;
}

.edit-main-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  align-items: center;
}

.edit-table-tools {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 4px;
  padding-top: 6px;
  border-top: 1px solid rgba(255, 255, 255, 0.45);
}

.table-tools-label {
  width: 100%;
  font-size: 9px;
  color: #555;
  margin-bottom: 1px;
  letter-spacing: 0.3px;
}
.format-buttons button:hover,
.add-btn:hover,
.btn-group button:hover,
.editor-buttons button:hover {
  background: rgba(255, 255, 255, 0.3);
  box-shadow: 0 6px 14px rgba(255, 255, 255, 0.45);
  color: black;
}

.add-btn {
  font-weight: 600;
  z-index: 10;
}

.custom-file-btn {
  display: inline-block;
  width: fit-content;
  align-self: center;
  padding: 6px 14px;

  background: rgba(255, 255, 255, 0.35);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);

  border: 1px solid rgba(255, 255, 255, 0.65);
  border-radius: 8px;

  font-family: Tahoma, sans-serif;
  font-size: 12px;
  color: #111;

  cursor: pointer;
  box-shadow:
    0 4px 12px rgba(255, 255, 255, 0.25),
    inset 0 0 8px rgba(255, 255, 255, 0.18);

  transition: all 0.25s ease;
}

.custom-file-btn:hover {
  background: rgba(255, 255, 255, 0.55);
  transform: scale(1.04);
  box-shadow:
    0 6px 16px rgba(255, 255, 255, 0.35),
    inset 0 0 10px rgba(255, 255, 255, 0.22);
}

/* ---------------- Masonry / Pinterest Style ---------------- */
.cards-container {
  column-count: 4;        /* Desktop columns */
  column-gap: 16px;       /* Space between columns */
  width: 100%;
  padding: 10px 0;
  box-sizing: border-box;
}

.note-card {
  display: inline-block;  /* Required for masonry */
  width: 90%;            /* Fill column width */
  margin-bottom: 16px;
  break-inside: avoid;    /* Prevent splitting across columns */

  padding: 15px;
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.25);
  border: 1px solid rgba(255, 255, 255, 0.4);
  box-shadow: 0 8px 32px rgba(100, 100, 150, 0.15),
              0 0 10px rgba(255, 255, 255, 0.2);
  transition: transform 0.2s ease-in-out;
}

@media (hover: hover) {
  .note-card:not(.is-editing):not(.actions-visible):hover {
    transform: scale(1.04);
    box-shadow: 
      inset 0 3px 8px rgba(220, 240, 255, 0.6),
      0 0 15px 6px rgba(220, 240, 255, 0.45),
      0 10px 30px rgba(190, 210, 240, 0.15);
  }
}

@media (hover: none) {
  .note-card:hover {
    transform: none;
  }
}

.note-card.show-copied {
  animation: copiedGlassShine 1500ms ease;
  overflow: hidden;
}

.note-card.show-copied::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 12px;
  pointer-events: none;
  z-index: 20;

  background: linear-gradient(
  120deg,
  transparent 0%,
  rgba(255, 255, 255, 0.16) 25%,
  rgba(255, 255, 255, 0.95) 45%,
  rgba(232, 205, 255, 0.35) 58%,
  transparent 100%
);

  transform: translateX(-130%);
  animation: copiedShimmerSweep 1500ms ease forwards;
}

@keyframes copiedGlassShine {
  0% {
    background: rgba(255, 255, 255, 0.25);
    box-shadow:
      0 8px 32px rgba(100, 100, 150, 0.15),
      0 0 10px rgba(255, 255, 255, 0.2);
  }

  40% {
  background: rgba(255, 255, 255, 0.56);
  border-color: rgba(255, 255, 255, 0.92);
  box-shadow:
    inset 0 0 24px rgba(255, 255, 255, 0.68),
    0 0 22px rgba(255, 255, 255, 0.82),
    0 0 38px rgba(232, 205, 255, 0.55),
    0 0 52px rgba(214, 245, 255, 0.35);
}

  100% {
    background: rgba(255, 255, 255, 0.25);
    box-shadow:
      0 8px 32px rgba(100, 100, 150, 0.15),
      0 0 10px rgba(255, 255, 255, 0.2);
  }
}

@keyframes copiedShimmerSweep {
  0% {
    transform: translateX(-130%);
    opacity: 0;
  }

  20% {
    opacity: 1;
  }

  100% {
    transform: translateX(130%);
    opacity: 0;
  }
}

/* Note contents */
.note-title {
  font-weight: bold;
  font-size: 15px;
  color: black;
  margin-bottom: 6px;
}

.note-text {
  color: black;
  font-size: 12px;
  white-space: pre-wrap;
  font-family: Tahoma, sans-serif;
}

.note-text strong {
  font-weight: bold;
}

.note-text mark,
.edit-note mark,
mark.highlight-hue {
  background: linear-gradient(
    90deg,
    #ffbfd0,
    #b8ccff,
    #c7efb4,
    #ffe99a
  ) !important;
  border-radius: 4px;
  padding: 0 3px;
  box-decoration-break: clone;
  -webkit-box-decoration-break: clone;
  color: inherit;
}
.note-url a {
  font-size: 12px;
  color: brown;
  word-break: break-word;
  margin-top: 8px;
  display: inline-block;
  text-decoration: none;
}

/* --- TABLE INSIDE NOTE CARD: SAFE PREVIEW --- */
.note-card {
  overflow: hidden;
}

.note-text {
  max-width: 100%;
  overflow: hidden;
}

.note-text table {
  width: 100%;
  max-width: 100%;
  table-layout: fixed;
  border-collapse: collapse;
  margin: 8px 0;
  font-size: 10px;
  font-family: Tahoma, sans-serif;
  cursor: zoom-in;
}

.note-text td,
.note-text th {
  border: 1px solid rgba(0, 0, 0, 0.25);
  padding: 4px;
  min-width: 0;
  max-width: 1px;
  vertical-align: top;

  white-space: normal;
  word-break: break-word;
  overflow-wrap: anywhere;

  line-height: 1.25;
}

.note-text th {
  background: rgba(255, 255, 255, 0.35);
  font-weight: bold;
}

.note-text td {
  background: rgba(255, 255, 255, 0.18);
}

/* --- TABLE WHILE EDITING --- */
.edit-note {
  max-width: 100%;
  overflow-x: auto;
}

.edit-note table {
  width: max-content;
  min-width: 100%;
  border-collapse: collapse;
  margin: 8px 0;
  font-size: 12px;
  font-family: Tahoma, sans-serif;
}

.edit-note td,
.edit-note th {
  border: 1px solid rgba(0, 0, 0, 0.25);
  padding: 6px;
  min-width: 80px;
  vertical-align: top;
  white-space: normal;
  word-break: break-word;
  overflow-wrap: anywhere;
}

.edit-note th {
  background: rgba(255, 255, 255, 0.35);
  font-weight: bold;
}

.edit-note td {
  background: rgba(255, 255, 255, 0.18);
}

.timestamp {
  font-size: 11px;
  color: #777;
  margin-top: 10px;
}

.edit-title,
.edit-url,
.edit-note {
  width: 100%;
  max-width: none;
  box-sizing: border-box;
  margin: 6px 0;

  padding: 6px 10px;
  font-family: Tahoma, sans-serif;
  font-size: 12px;

  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, 0.45);
  background: rgba(255, 255, 255, 0.28);

  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);

  box-shadow: inset 0 0 5px rgba(255, 255, 255, 0.22);
  color: #222;

  transition: background-color 0.3s ease;
}

.edit-note {
  min-height: 80px;
  max-height: 180px;
  overflow-y: auto;
  resize: vertical;
}

.edit-title:focus,
.edit-url:focus,
.edit-note:focus {
  background: rgba(255, 255, 255, 0.4);
  outline: none;
}

.edit-note {
  width: 90%;
  min-height: 60px;
  padding: 6px 8px;
  font-family: Tahoma, sans-serif;
  font-size: 12px;
  border-radius: 8px;
  border: 1px solid rgba(255, 255, 255, 0.4);
  background: rgba(255, 255, 255, 0.3);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  box-shadow: inset 0 0 5px rgba(255, 255, 255, 0.2);
  color: #222;
  resize: vertical;
  transition: background-color 0.3s ease;
}

.edit-title:focus,
.edit-url:focus,
.edit-note:focus {
  background: rgba(255, 255, 255, 0.4);
  outline: none;
}

.btn-group {
  position: absolute;
  right: 10px;
  bottom: 10px;
  z-index: 30;

  display: flex;
  gap: 6px;
  margin: 0;
  padding: 0;

  opacity: 0;
  visibility: hidden;
  pointer-events: none;

  transform: translateY(4px);
  transition:
    opacity 160ms ease,
    transform 160ms ease,
    visibility 160ms ease;
}

.note-card.actions-visible .btn-group,
.note-card.is-editing .btn-group {
  opacity: 1;
  visibility: visible;
  pointer-events: auto;
  transform: translateY(0);
}

.note-card.actions-visible {
  transform: none !important;
}

.btn-group button {
  width: 24px !important;
  height: 24px !important;
  padding: 0 !important;

  display: inline-flex;
  align-items: center;
  justify-content: center;

  border-radius: 999px !important;
  font-size: 12px !important;
  line-height: 1;

  background: rgba(255, 255, 255, 0.34) !important;
  border: 1px solid rgba(255, 255, 255, 0.65) !important;

  color: #333;
  box-shadow:
    0 2px 6px rgba(0, 0, 0, 0.04),
    inset 0 0 6px rgba(255, 255, 255, 0.25) !important;

  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.btn-group button:hover {
  background: rgba(255, 255, 255, 0.55) !important;
  transform: translateY(-1px);
}

.note-card.is-editing {
  transform: none !important;
}
.note-card.new-note-highlight {
  animation: newNoteGlow 2.4s ease;
  outline: 3px solid rgba(255, 255, 255, 0.95);
  outline-offset: 4px;
  z-index: 1200;
}

.note-card.new-note-highlight::after {
  content: "NEW";
  position: absolute;
  top: -12px;
  right: -10px;
  padding: 4px 8px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: bold;
  color: #111;
  background: linear-gradient(
    135deg,
    rgba(255, 239, 166, 0.96),
    rgba(232, 205, 255, 0.94)
  );
  border: 1px solid rgba(255, 255, 255, 0.75);
  box-shadow:
    0 0 10px rgba(255, 239, 166, 0.55),
    0 0 16px rgba(232, 205, 255, 0.45);
}

@keyframes newNoteGlow {
  0% {
    transform: scale(1.04);
    box-shadow:
      0 0 0 4px rgba(255, 255, 255, 0.95),
      0 0 22px rgba(255, 255, 255, 0.75),
      0 0 35px rgba(255, 255, 255, 0.45);
  }

  60% {
    transform: scale(1.02);
    box-shadow:
      0 0 0 3px rgba(255, 255, 255, 0.65),
      0 0 18px rgba(255, 255, 255, 0.45),
      0 0 28px rgba(255, 255, 255, 0.25);
  }

  100% {
    transform: scale(1);
    box-shadow:
      0 8px 32px rgba(100, 100, 150, 0.15),
      0 0 10px rgba(255, 255, 255, 0.2);
  }
}

.note-card.is-editing {
  transform: none !important;
  outline: none;
  box-shadow:
    inset 0 0 0 2px rgba(255, 255, 255, 0.55),
    inset 0 0 18px rgba(255, 239, 166, 0.22),
    0 0 18px rgba(232, 205, 255, 0.30),
    0 10px 28px rgba(100, 100, 150, 0.18) !important;
  background: rgba(255, 255, 255, 0.34);
  z-index: 999;
}

.edit-note:empty:before {
  content: attr(data-placeholder);
  color: #888;
  pointer-events: none;
  display: block;
}

/* 🧊 Clear Glass Scrollbar (cool purple-blue tint) */
::-webkit-scrollbar{
  width: 12px;
  height: 12px;
}

::-webkit-scrollbar-track{
  background: rgba(180, 190, 255, 0.10);
  border-radius: 999px;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18);
}

::-webkit-scrollbar-thumb{
  background: linear-gradient(
    180deg,
    rgba(255,255,255,0.55),
    rgba(210,220,255,0.35)
  );
  border-radius: 999px;
  border: 2px solid rgba(255,255,255,0.20);
  background-clip: padding-box;
  box-shadow:
    0 0 12px rgba(160,170,255,0.25),
    inset 0 0 0 1px rgba(255,255,255,0.35);
}

::-webkit-scrollbar-thumb:hover{
  background: linear-gradient(
    180deg,
    rgba(255,255,255,0.75),
    rgba(200,210,255,0.45)
  );
  box-shadow:
    0 0 16px rgba(170,180,255,0.35),
    inset 0 0 0 1px rgba(255,255,255,0.45);
}

/* Firefox */
*{
  scrollbar-width: thin;
  scrollbar-color: rgba(220,230,255,0.55) rgba(180,190,255,0.12);
}

.styled-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;

  margin: 7px 0 8px 0;
  padding: 4px 10px;

  background: rgba(255, 255, 255, 0.34);
  border: 1px solid rgba(255, 255, 255, 0.65);
  border-radius: 999px;

  font-size: 10.5px;
  font-weight: 600;
  color: #333 !important;
  text-decoration: none;
  letter-spacing: 0.2px;

  box-shadow:
    0 0 7px rgba(255, 255, 255, 0.45),
    0 2px 6px rgba(0, 0, 0, 0.05),
    inset 0 0 6px rgba(255, 255, 255, 0.28);

  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);

  transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
}

.styled-link:hover {
  background: rgba(255, 255, 255, 0.5);
  border-color: rgba(255, 255, 255, 0.9);
  box-shadow:
    0 0 11px rgba(255, 255, 255, 0.65),
    0 3px 8px rgba(0, 0, 0, 0.06),
    inset 0 0 8px rgba(255, 255, 255, 0.35);
  transform: translateY(-1px);
}

.note-card.is-editing {
  transform: none !important;
  max-height: 520px;
  overflow-y: auto;
}

.input-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 20px;

  position: fixed;
  bottom: -100%;
  right: 20px;

  width: 300px;
  max-width: calc(100vw - 40px);

  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  padding: 15px;
  border-radius: 12px;

  box-shadow:
    0 8px 20px rgba(0, 0, 0, 0.15),
    0 0 15px rgba(184, 142, 170, 0.2);

  transition: bottom 0.4s ease, opacity 0.4s ease, box-shadow 0.4s ease;
  opacity: 0;
  z-index: 999;
}

.input-group.show {
  bottom: 80px;
  opacity: 1;
  box-shadow:
    0 8px 20px rgba(0, 0, 0, 0.15),
    0 0 20px rgba(184, 142, 170, 0.25);
}

#toggleInputBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  font-size: 28px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: none;

function escapeHtml(text) {
  return text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function normalizeUrl(url) {
  const v = String(url || '').trim();
  if (!v) return '';

  if (/^(https?:\/\/|mailto:|tel:)/i.test(v)) {
    return v;
  }

  return `https://${v}`;
}

// Render old plain-text notes that used **bold** / ==highlight==
// If text already contains HTML tags, leave it as-is.
function maybeParseLegacy(text) {
  if (text.indexOf('<') === -1) {
    let s = escapeHtml(text);
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/==(.+?)==/g, '<mark>$1</mark>');
    s = s.replace(/\n/g, '<br>');
    return s;
  }
  return text;
}

function closestTagWithin(node, tagName, container) {
  tagName = tagName.toUpperCase();
  let el = (node && node.nodeType === 3) ? node.parentNode : node; // text node -> parent
  while (el && el !== container) {
    if (el.nodeType === 1 && el.tagName === tagName) return el;
    el = el.parentNode;
  }
  return null;
}

function unwrapElement(el) {
  if (!el || !el.parentNode) return;
  const parent = el.parentNode;
  while (el.firstChild) parent.insertBefore(el.firstChild, el);
  parent.removeChild(el);
}

function toggleHighlightInEditor(editor) {
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  if (!editor.contains(range.commonAncestorContainer)) return;

  // If caret/selection sits inside a <mark>, unwrap it (toggle OFF)
  const m1 = closestTagWithin(sel.anchorNode, 'MARK', editor);
  const m2 = closestTagWithin(sel.focusNode, 'MARK', editor);
  let toggledOff = false;
  if (m1) { unwrapElement(m1); toggledOff = true; }
  if (m2 && m2.isConnected) { unwrapElement(m2); toggledOff = true; }
  if (toggledOff) return;

  // Otherwise, apply highlight (toggle ON)
  if (range.collapsed) return; // nothing selected
  const mark = document.createElement('mark');
  mark.className = 'highlight-hue';
  try {
    range.surroundContents(mark);
    // keep selection on the new mark
    sel.removeAllRanges();
    const r = document.createRange();
    r.selectNodeContents(mark);
    sel.addRange(r);
  } catch (_) {
    // Fallback when surroundContents fails (selection spans multiple nodes)
    const frag = range.cloneContents();
    const temp = document.createElement('div');
    temp.appendChild(frag);
    const html = temp.innerHTML;
    document.execCommand('insertHTML', false, `<mark class="highlight-hue">${html}</mark>`);
  }
}

async function copyPlainText(text, onDone) {
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text);
    } else {
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    if (onDone) onDone();
  } catch (e) {
    console.error('Copy failed', e);
  }
}
function applyHueHighlightToSelection(editor) {
  editor.focus();

  const sel = window.getSelection();
  if (!sel.rangeCount) return;

  const range = sel.getRangeAt(0);

  if (!editor.contains(range.commonAncestorContainer)) return;
  if (range.collapsed) return;

  // If selected text/caret is already inside a highlight, remove it
  const m1 = closestTagWithin(sel.anchorNode, 'MARK', editor);
  const m2 = closestTagWithin(sel.focusNode, 'MARK', editor);

  let toggledOff = false;

  if (m1) {
    unwrapElement(m1);
    toggledOff = true;
  }

  if (m2 && m2.isConnected && m2 !== m1) {
    unwrapElement(m2);
    toggledOff = true;
  }

  if (toggledOff) {
    sel.removeAllRanges();
    return;
  }

  // Otherwise apply highlight
  const mark = document.createElement('mark');
  mark.className = 'highlight-hue';

  try {
    range.surroundContents(mark);

    sel.removeAllRanges();
    const r = document.createRange();
    r.selectNodeContents(mark);
    sel.addRange(r);
  } catch (_) {
    const frag = range.cloneContents();
    const temp = document.createElement('div');
    temp.appendChild(frag);

    document.execCommand(
      'insertHTML',
      false,
      `<mark class="highlight-hue">${temp.innerHTML}</mark>`
    );
  }
}

function insertTableInEditor(editor, rows = 3, cols = 3) {
  editor.focus();

  let tableHtml = `
    <table>
      <tbody>
  `;

    tableHtml += `<tr>`;

    for (let c = 0; c < cols; c++) {
      tableHtml += `<td><br></td>`;
    }

    tableHtml += `</tr>`;
  }

  tableHtml += `
      </tbody>
    </table>
    <br>
  `;

  document.execCommand('insertHTML', false, tableHtml);
}

function getCurrentTableCell(editor) {
  const sel = window.getSelection();
  if (!sel.rangeCount) return null;

  let node = sel.anchorNode;

  if (!editor.contains(node)) return null;

  if (node.nodeType === 3) {
    node = node.parentNode;
  }

  return node.closest ? node.closest('td, th') : null;
}

function addTableRow(editor) {
  const cell = getCurrentTableCell(editor);
  if (!cell) return alert("Click inside a table cell first.");

  const row = cell.parentElement;
  const table = row.closest('table');
  const colCount = row.children.length;

  const newRow = document.createElement('tr');

  for (let i = 0; i < colCount; i++) {
    const td = document.createElement('td');
    td.innerHTML = '<br>';
    newRow.appendChild(td);
  }

  row.after(newRow);
}

function addTableColumn(editor) {
  const cell = getCurrentTableCell(editor);
  if (!cell) return alert("Click inside a table cell first.");

  const cellIndex = Array.from(cell.parentElement.children).indexOf(cell);
  const table = cell.closest('table');

  Array.from(table.rows).forEach(row => {
    const td = document.createElement('td');
    td.innerHTML = '<br>';
    row.children[cellIndex].after(td);
  });
}

function deleteTableRow(editor) {
  const cell = getCurrentTableCell(editor);
  if (!cell) return alert("Click inside a table cell first.");

  const row = cell.parentElement;
  const table = row.closest('table');

  if (table.rows.length <= 1) {
    return alert("You need at least one row.");
  }

  row.remove();
}

function deleteTableColumn(editor) {
  const cell = getCurrentTableCell(editor);
  if (!cell) return alert("Click inside a table cell first.");

  const cellIndex = Array.from(cell.parentElement.children).indexOf(cell);
  const table = cell.closest('table');

  if (table.rows[0].children.length <= 1) {
    return alert("You need at least one column.");
  }

  Array.from(table.rows).forEach(row => {
    row.children[cellIndex].remove();
  });
}

const isInteractiveTarget = (target) => {
  return target.closest(
    'button, a, input, textarea, [contenteditable="true"], .btn-group, .edit-toolbar, .note-url'
  );
};

const startPress = (e) => {
  if (isInteractiveTarget(e.target)) return;
  if (textEditor.style.display === 'block') return;

  longPressed = false;

  pressTimer = setTimeout(() => {
    card.classList.add('actions-visible');
    longPressed = true;
  }, LONG_PRESS_MS);
};

const endPress = () => {
  if (pressTimer) {
    clearTimeout(pressTimer);
    pressTimer = null;
  }

  setTimeout(() => {
    longPressed = false;
  }, 80);
};

card.addEventListener('mousedown', startPress);
card.addEventListener('mouseup', endPress);
card.addEventListener('mouseleave', endPress);

card.addEventListener('touchstart', startPress, { passive: true });
card.addEventListener('touchend', endPress);
card.addEventListener('touchcancel', endPress);

    card.addEventListener('click', (e) => {

      if (e.target.closest('.btn-group')) return;                  // clicked a button

    });

function renderFilteredNotes() {
  const filtered = notes.filter(n =>
    (n.title || '').toLowerCase().includes(currentSearch) ||
    (String(n.text || '')).toLowerCase().includes(currentSearch) ||
    (n.url || '').toLowerCase().includes(currentSearch)
  );

  renderNotes(filtered);
}

/* ---------------- Edit / Save / Delete ---------------- */
function toggleEdit(card, editing) {
  const titleEl = card.querySelector('.note-title');
  const titleInput = card.querySelector('.edit-title');
  const urlEl = card.querySelector('.note-url');
  const urlInput = card.querySelector('.edit-url');
  const textDisplay = card.querySelector('.note-text');
  const textEditor = card.querySelector('.edit-note');
  const btnGroup = card.querySelector('.btn-group');
  const editorBtns = card.querySelector('.edit-toolbar');

  const [editBtn, saveBtn, cancelBtn] = btnGroup.querySelectorAll('button');

  if (editing) {
    card.classList.add('is-editing', 'actions-visible');

    titleEl.style.display = 'none';
    titleInput.style.display = 'block';

    urlEl.style.display = 'none';
    urlInput.style.display = 'block';

    textDisplay.style.display = 'none';
    textEditor.style.display = 'block';

    btnGroup.style.display = 'flex';
    editBtn.style.display = 'none';
    saveBtn.style.display = 'none';
    cancelBtn.style.display = 'none';

    editorBtns.style.display = 'flex';
    textEditor.focus();
  } else {
    card.classList.remove('is-editing', 'actions-visible');

    titleEl.style.display = 'block';
    titleInput.style.display = 'none';

    urlEl.style.display = 'block';
    urlInput.style.display = 'none';

    textDisplay.style.display = 'block';
    textEditor.style.display = 'none';

    editBtn.style.display = '';
    saveBtn.style.display = 'none';
    cancelBtn.style.display = 'none';
    editorBtns.style.display = 'none';
  }
}

async function saveEdit(card) {
  const id = card.dataset.id;
  const textEditor = card.querySelector('.edit-note');
  const titleInput = card.querySelector('.edit-title');
  const urlInput = card.querySelector('.edit-url');

  const newText = textEditor.innerHTML.trim();
  const newTitle = titleInput.value.trim();
  const newUrl = normalizeUrl(urlInput.value.trim());

  if (!newTitle || !newText) {
    return alert("Title and explanation cannot be empty.");
  }

  await updateDoc(doc(db, "practiceNNotes", id), {
    title: newTitle,
    text: newText,
    url: newUrl
  });

  toggleEdit(card, false);
}

async function deleteNote(id) {
  if (!confirm("Are you sure you want to delete this note?")) return;
  const existing = notes.find(note => note.id === id);
  await deleteDoc(doc(db, "practiceNNotes", id));
  try {
    await deleteReferenceImagesFromHTML(app, existing?.text);
  } catch (error) {
    console.warn("The note was deleted, but its image cleanup failed.", error);
  }
}

    inputGroup.classList.contains('show') &&
    !inputGroup.contains(e.target) &&
    !toggleBtn.contains(e.target)
  ) {
    closeAddPanel();
  }
});

<script>
// Click the hidden file input
document.getElementById("uploadPhotoBtn").addEventListener("click", () => {
    document.getElementById("photoInput").click();
});

// Convert uploaded image to Base64 and insert into #noteText
document.getElementById("photoInput").addEventListener("change", async function () {
    const file = this.files[0];
    if (!file) return;

    try {
      const imageUrl = await window.uploadPracticeNReferenceImage(file);
      insertImageAtCursor(imageUrl);
    } catch (error) {
      alert(error.message || "The image could not be uploaded.");
    } finally {
      this.value = "";
    }
});

function insertImageAtCursor(base64) {
    const img = document.createElement("img");
    img.src = base64;
    img.style.maxWidth = "100%";
    img.style.borderRadius = "8px";
    img.style.marginTop = "6px";

    const selection = window.getSelection();
    if (!selection.rangeCount) {
        document.getElementById("noteText").appendChild(img);
        return;
    }

    const range = selection.getRangeAt(0);
    range.insertNode(img);

    // Move cursor after the image
    range.setStartAfter(img);
    selection.removeAllRanges();
    selection.addRange(range);
}

// Make any image inside notes zoomable
document.addEventListener("click", function (e) {
  if (e.target.tagName === "IMG") {
    const overlay = document.getElementById("imageZoomOverlay");
    const zoomed = document.getElementById("zoomedImage");

    zoomed.src = e.target.src; // show clicked image
    overlay.classList.add("active");
  }
});

<script>
document.addEventListener("DOMContentLoaded", () => {
  
  const overlay = document.getElementById("imageZoomOverlay");
  const zoomedImage = document.getElementById("zoomedImage");
  const closeBtn = document.getElementById("closeZoomBtn");

  // Click any image inside notes → zoom
  document.body.addEventListener("click", e => {
    if (e.target.classList.contains("note-image")) {
      zoomedImage.src = e.target.src;
      overlay.classList.add("active");
    }
  });

  // Close button works
  closeBtn.addEventListener("click", () => {
    overlay.classList.remove("active");
    zoomedImage.src = "";
  });

  // Clicking outside the image also closes
  overlay.addEventListener("click", e => {
    if (e.target === overlay) {
      overlay.classList.remove("active");
      zoomedImage.src = "";
    }
  });

});

<script>
document.addEventListener("DOMContentLoaded", () => {
  const tableOverlay = document.getElementById("tableZoomOverlay");
  const zoomedTableContent = document.getElementById("zoomedTableContent");
  const closeTableZoomBtn = document.getElementById("closeTableZoomBtn");

  document.body.addEventListener("click", (e) => {
    const table = e.target.closest(".note-text table");

    if (!table) return;

    e.preventDefault();
    e.stopPropagation();

    zoomedTableContent.innerHTML = "";
    const clonedTable = table.cloneNode(true);

    zoomedTableContent.appendChild(clonedTable);
    tableOverlay.classList.add("active");
  });

  closeTableZoomBtn.addEventListener("click", () => {
    tableOverlay.classList.remove("active");
    zoomedTableContent.innerHTML = "";
  });

  tableOverlay.addEventListener("click", (e) => {
    if (e.target === tableOverlay) {
      tableOverlay.classList.remove("active");
      zoomedTableContent.innerHTML = "";
    }
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && tableOverlay.classList.contains("active")) {
      tableOverlay.classList.remove("active");
      zoomedTableContent.innerHTML = "";
    }
  });
});
</script>
