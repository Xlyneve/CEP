}

.note-content {

}

.header {
  position: fixed;
  top: 0;

  height: 70px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  box-sizing: border-box;

  background: rgba(255, 255, 255, 0.28);
backdrop-filter: blur(18px) saturate(160%);
-webkit-backdrop-filter: blur(18px) saturate(160%);
border-bottom: 1px solid rgba(255, 255, 255, 0.55);
box-shadow:
  0 8px 28px rgba(80, 80, 120, 0.12),

.header-left a.header-link {

}
.header-title {

 background: none;

.cards-container {
  column-count: 4;        /* Number of columns */
  column-gap: 15px;       /* Space between columns */
  width: 100%;
  padding: 10px 0;
}

.note-card {
  position: relative;
  display: inline-flex;
  flex-direction: column;

  width: 90%;
  margin-bottom: 15px;
  padding: 15px 15px 45px 15px;
  border-radius: 24px;

  break-inside: avoid;
  word-wrap: break-word;
  overflow: hidden;

  background:
    linear-gradient(
      145deg,
      rgba(255, 255, 255, 0.46),
      rgba(255, 255, 255, 0.18)
    );

  backdrop-filter: blur(34px) saturate(190%);
  -webkit-backdrop-filter: blur(34px) saturate(190%);

  border: 1px solid rgba(255, 255, 255, 0.66);

  box-shadow:
    0 18px 42px rgba(20, 70, 110, 0.16),
    inset 0 1px 0 rgba(255, 255, 255, 0.82),
    inset 0 -24px 36px rgba(255, 255, 255, 0.12);

  color: rgba(20, 20, 30, 0.92);

  transition:
    transform 0.18s ease,
    background 0.18s ease,
    box-shadow 0.18s ease;
}

.note-card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;

  background:
    radial-gradient(
      circle at 25% 12%,
      rgba(255, 255, 255, 0.68),
      rgba(255, 255, 255, 0.16) 34%,
      transparent 56%
    ),
    linear-gradient(
      145deg,
      rgba(160, 245, 255, 0.14),
      rgba(255, 255, 255, 0.08),
      rgba(80, 150, 255, 0.08)
    );

  pointer-events: none;
}

.note-card::after {
  content: "";
  position: absolute;
  left: 12%;
  top: 8px;
  width: 58%;
  height: 26%;
  border-radius: 999px;

  background:
    linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.42),
      rgba(255, 255, 255, 0.05)
    );

  filter: blur(8px);
  pointer-events: none;
}

.note-card > * {
  position: relative;
  z-index: 1;
}

.note-card .note-content,
.note-card .note-title {
  color: #000; /* Keep black text */
}
.note-card:hover {
  transform: translateY(-3px);

  background:
    linear-gradient(
      145deg,
      rgba(255, 255, 255, 0.56),
      rgba(255, 255, 255, 0.26)
    );

  box-shadow:
    0 22px 48px rgba(20, 70, 110, 0.20),
    inset 0 1px 0 rgba(255, 255, 255, 0.90),
    inset 0 -24px 36px rgba(255, 255, 255, 0.16);
}

.note-card.new-note-highlight {
  animation: newNoteGlow 2.4s ease;
  outline: 3px solid rgba(255, 255, 255, 0.95);
  outline-offset: 4px;
  z-index: 1200;
}

.note-card.new-note-highlight::after {
  content: "NEW";
  position: absolute;
  top: -12px;
  right: -10px;
  padding: 4px 8px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: bold;
  color: #111;
  background: linear-gradient(
    135deg,
    rgba(255, 239, 166, 0.96),
    rgba(232, 205, 255, 0.94)
  );
  border: 1px solid rgba(255, 255, 255, 0.75);
  box-shadow:
    0 0 10px rgba(255, 239, 166, 0.55),
    0 0 16px rgba(232, 205, 255, 0.45);
}

@keyframes newNoteGlow {
  0% {
    transform: scale(1.04);
    box-shadow:
      0 0 0 4px rgba(255, 255, 255, 0.95),
      0 0 22px rgba(255, 255, 255, 0.75),
      0 0 35px rgba(255, 255, 255, 0.45);
  }

  60% {
    transform: scale(1.02);
    box-shadow:
      0 0 0 3px rgba(255, 255, 255, 0.65),
      0 0 18px rgba(255, 255, 255, 0.45),
      0 0 28px rgba(255, 255, 255, 0.25);
  }

  100% {
    transform: scale(1);
    box-shadow:
      0 8px 32px rgba(100, 100, 150, 0.15),
      0 0 10px rgba(255, 255, 255, 0.2);
  }
}

.note-card.editing-note {
  transform: scale(1.02);

  background:
    linear-gradient(
      145deg,
      rgba(255, 255, 255, 0.62),
      rgba(255, 255, 255, 0.30)
    );

  box-shadow:
    0 22px 48px rgba(20, 70, 110, 0.22),
    0 0 0 3px rgba(255, 255, 255, 0.42),
    inset 0 1px 0 rgba(255, 255, 255, 0.92),
    inset 0 -24px 36px rgba(255, 255, 255, 0.18);

  z-index: 999;
}

.edit-title {
  width: 93%;
  margin-bottom: 6px;
  padding: 6px 10px;

  font-size: 11px;
  border-radius: 8px;

.note-card.actions-visible .note-actions {

.highlight-gradient {

/* Glassy button base style */
button,

/* URL link in notes */
.note-url {

}

.note-url a {

/* Custom file button */
.custom-file-btn {

/* 🧊 Clear Glass Scrollbar (cool purple-blue tint) */

  width: 12px;
  height: 12px;
}

::-webkit-scrollbar-track{
  background: rgba(180, 190, 255, 0.10);
  border-radius: 999px;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18);
}

::-webkit-scrollbar-thumb{
  background: linear-gradient(
    180deg,
    rgba(255,255,255,0.55),
    rgba(210,220,255,0.35)
  );
  border-radius: 999px;
  border: 2px solid rgba(255,255,255,0.20);
  background-clip: padding-box;
  box-shadow:
    0 0 12px rgba(160,170,255,0.25),
    inset 0 0 0 1px rgba(255,255,255,0.35);
}

::-webkit-scrollbar-thumb:hover{

    180deg,
    rgba(255,255,255,0.75),
    rgba(200,210,255,0.45)
  );
  box-shadow:
    0 0 16px rgba(170,180,255,0.35),
    inset 0 0 0 1px rgba(255,255,255,0.45);
}

/* Firefox */
*{
  scrollbar-width: thin;

}

@media (max-width: 768px) {
  html,
  body {
    overflow-x: auto;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  body {
    min-width: 1280px;
  }

  body::before {
    position: absolute;
    top: 0;
    left: 0;
    width: 1280px;
    min-width: 1280px;
    min-height: 100%;
    background: url('2b.png') no-repeat center center;
    background-size: cover;
    filter: blur(12px) brightness(1.08) saturate(1.12);
    z-index: -1;
    pointer-events: none;
  }

  .header {
    position: absolute;
    top: 0;
    left: 0;
    width: 1280px;
    min-width: 1280px;
    height: 70px;
    padding: 0 20px;
    box-sizing: border-box;
  }

  .header-title {
    position: absolute;
    top: 10px;
    left: 80px;
    transform: none;
    font-size: 22px;
    margin: 0;
  }

  .search-box {
    position: absolute;
    top: 20px;
    right: 20px;

  .search-box input {
    width: 150px;
    font-size: 12px;
  }

  .container {
    width: 1280px;
    min-width: 1280px;
    padding: 100px 20px 20px 20px;
    box-sizing: border-box;
    max-width: none;
  }

  .cards-container {
    column-count: 4;
    column-gap: 15px;
    width: 100%;
    padding: 10px 0;
  }

  .note-card {
    display: inline-block;
    width: 90%;
    margin-bottom: 15px;
    break-inside: avoid;
  }
.header-left {
  position: static;
}

  #toggleFormBtn {
  right: 20px;
  bottom: 20px;
  z-index: 5001;
}

  #nurseFormWrapper {
  right: 20px;
  width: 300px;
  max-width: 300px;
  z-index: 5000;
}

#nurseFormWrapper.show {
  transform: translateY(0);
}
}

</style>
</head>
<body>

<div class="header">
  <div class="header-bg"></div>

<div class="header-left">
   <!-- Shared header menu -->
<div class="center-toggle">
  <div class="toggle-icon" id="menuToggle">☐</div>
  <div class="rays">
    <!-- Rays will be generated dynamically by 
	JS -->
  </div>
</div>
</div>

<h1 class="header-title">Recalls</h1>

  <div class="header-right">
    <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search...">  
    </div>
  </div>
</div>

<div class="container">
  <!-- Notes container -->
  <div class="cards-container" id="nurseNotesList"></div>
</div>

<!-- Hidden glassy form -->
<div id="nurseFormWrapper" class="form-section">
  <input id="nurseTitle" placeholder="Title">
  <textarea id="nurseNote" placeholder="Note..."></textarea>
  <input id="nurseURL" placeholder="Optional URL (if any)">
  <input type="file" id="nurseImage" accept="image/*" style="display:none;" />
  <label for="nurseImage" class="custom-file-btn">Choose File</label>
  <button class="add-btn" onclick="addNote()">Add</button>
</div>

<!-- Floating glassy + button -->
<button id="toggleFormBtn">+</button>

<!-- Image Zoom Modal -->
<div id="imgModal" class="image-modal">
  <img id="modalImg" src="" alt="Zoomed Image" />
</div>

<script type="module">
  import { initializeApp, getApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // Avoid an unauthenticated Firestore request and retry on page load.
await window.CEP_AUTH_READY;

const firebaseConfig = {
    apiKey: "AIzaSyAgYsVQNEOyQa41NkXXT2VuKClqXAxfG1Q",
    authDomain: "cepx-f9d2a.firebaseapp.com",
    projectId: "cepx-f9d2a",
    storageBucket: "cepx-f9d2a.firebasestorage.app",
    messagingSenderId: "840696526325",
    appId: "1:840696526325:web:b9bcb4669fbfad066a1cbc"
  };

  const app = getApps().length ? getApp() : initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const notesCol = collection(db, "recallNotes");

	let currentSearch = "";
	let newestNoteId = null;
	let pendingNewNoteTime = null;
	let unsubscribeNotes = null;

  async function addNote() {
  const title = nurseTitle.value.trim();
const note = textToSafeHtml(nurseNote.value.trim());
const url = nurseURL.value.trim();
  const fileInput = document.getElementById('nurseImage');
  const file = fileInput.files[0];

  const createdAt = new Date().toISOString();
  pendingNewNoteTime = createdAt;

  let imageBase64 = "";

  if (file) {
    imageBase64 = await readFileAsDataURL(file);
  }

  const newDoc = await addDoc(notesCol, {
    title: title || "Untitled",
    note,
    url: url || "",
    image: imageBase64 || "",
    time: createdAt
  });

  newestNoteId = newDoc.id;
  resetAddForm();
}

function readFileAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onloadend = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function resetAddForm() {
  nurseTitle.value = '';
  nurseNote.value = '';
  nurseURL.value = '';

  const fileInput = document.getElementById('nurseImage');
  if (fileInput) fileInput.value = '';

  closeAddPanel();
}
  async function deleteNote(id) {
    if (confirm("Delete this note?")) {
      await deleteDoc(doc(db, "recallNotes", id));
    }
  }

  async function saveEdit(id, updatedTitle, updatedNote) {
  await updateDoc(doc(db, "recallNotes", id), {
    title: updatedTitle || "Untitled",
    note: updatedNote,
    time: new Date().toISOString()
  });
}



  function escapeHtml(text) {
    return text.replace(/&/g, "&amp;")
               .replace(/</g, "&lt;")
               .replace(/>/g, "&gt;")
               .replace(/"/g, "&quot;")
               .replace(/'/g, "&#039;");
  }
  
  function textToSafeHtml(text) {
  return escapeHtml(String(text || ""))
    .replace(/\r\n/g, "\n")
    .replace(/\n/g, "<br>");
}

function sanitizeNoteHtml(html) {
  const template = document.createElement('template');
  template.innerHTML = html;

  const allowedTags = ['B', 'STRONG', 'I', 'EM', 'U', 'BR', 'SPAN'];

  template.content.querySelectorAll('*').forEach(el => {
    if (!allowedTags.includes(el.tagName)) {
      el.replaceWith(...el.childNodes);
      return;
    }

    [...el.attributes].forEach(attr => {
      const isAllowedHighlight =
        el.tagName === 'SPAN' &&
        attr.name === 'class' &&
        attr.value === 'highlight-gradient';

      if (!isAllowedHighlight) {
        el.removeAttribute(attr.name);
      }
    });
  });

  return template.innerHTML;
}

 function closestClassWithin(node, className, container) {
  let el = node && node.nodeType === 3 ? node.parentNode : node;

  while (el && el !== container) {
    if (el.nodeType === 1 && el.classList.contains(className)) {
      return el;
    }
    el = el.parentNode;
  }

  return null;
}

function unwrapElement(el) {
  if (!el || !el.parentNode) return;

  const parent = el.parentNode;

  while (el.firstChild) {
    parent.insertBefore(el.firstChild, el);
  }

  parent.removeChild(el);
}

function toggleGradientHighlight(editor) {
  editor.focus();

  const selection = window.getSelection();
  if (!selection.rangeCount) return;

  const range = selection.getRangeAt(0);
  if (!editor.contains(range.commonAncestorContainer)) return;

  const selectedText = selection.toString();
  if (!selectedText.trim()) return;

  const startHighlight = closestClassWithin(selection.anchorNode, 'highlight-gradient', editor);
  const endHighlight = closestClassWithin(selection.focusNode, 'highlight-gradient', editor);

  let removed = false;

  if (startHighlight) {
    unwrapElement(startHighlight);
    removed = true;
  }

  if (endHighlight && endHighlight.isConnected && endHighlight !== startHighlight) {
    unwrapElement(endHighlight);
    removed = true;
  }

  if (removed) {
    selection.removeAllRanges();
    return;
  }

  const span = document.createElement('span');
  span.className = 'highlight-gradient';

  try {
    range.surroundContents(span);
  } catch (_) {
    const selectedHtml = range.cloneContents();
    span.appendChild(selectedHtml);
    range.deleteContents();
    range.insertNode(span);
  }

  selection.removeAllRanges();
}
  function enableEditing(card, id, title, note) {
  card.classList.add('editing-note');

  card.innerHTML = `
    <input type="text" class="edit-title" value="${escapeHtml(title)}" />

    <div class="edit-note" contenteditable="true"
      style="width:95%; min-height:80px; padding:8px; border:1px solid rgba(255, 255, 255, 0.55);
      border-radius:10px; background:rgba(255,255,255,0.5); backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px); font-family:Tahoma,sans-serif; font-size:12px;">
      ${sanitizeNoteHtml(String(note || "")).replace(/\n/g, "<br>")}
    </div>

    <div class="editor-buttons" style="margin-top:8px; display:flex; flex-wrap:wrap; gap:6px;">
      <button type="button" class="btn-bold">Bold</button>
      <button type="button" class="btn-highlight">Highlight</button>
      <button type="button" class="btn-save">Save</button>
      <button type="button" class="btn-cancel">Cancel</button>
    </div>
  `;

  const inputTitle = card.querySelector('.edit-title');
  const editableDiv = card.querySelector('.edit-note');
  const btnSave = card.querySelector('.btn-save');
  const btnCancel = card.querySelector('.btn-cancel');
  const btnBold = card.querySelector('.btn-bold');
  const btnHighlight = card.querySelector('.btn-highlight');

  btnSave.addEventListener('click', async (e) => {
    e.preventDefault();
    e.stopPropagation();

    const updatedTitle = inputTitle.value.trim() || "Untitled";
    const updatedNote = editableDiv.innerHTML
  .replace(/<div><br><\/div>/gi, "<br>")
  .replace(/<div>/gi, "<br>")
  .replace(/<\/div>/gi, "")
  .trim();

    await saveEdit(id, updatedTitle, updatedNote);
    renderNotesOnce();
  });

  btnCancel.addEventListener('click', (e) => {
    e.preventDefault();
    e.stopPropagation();
    renderNotesOnce();
  });

  btnBold.addEventListener('mousedown', (e) => {
    e.preventDefault();
    e.stopPropagation();
    editableDiv.focus();
    document.execCommand('bold');
  });

  btnHighlight.addEventListener('mousedown', (e) => {
    e.preventDefault();
    e.stopPropagation();
    toggleGradientHighlight(editableDiv);
  });
}


  function buildNoteCards(snapshot) {
  const list = document.getElementById('nurseNotesList');
  list.innerHTML = '';

  snapshot.forEach(docSnap => {
    const { title = '', note = '', time, url, image } = docSnap.data();
    const id = docSnap.id;

    const titleLower = title.toLowerCase();
    const noteLower = String(note).toLowerCase();

    if (
      currentSearch &&
      !titleLower.includes(currentSearch) &&
      !noteLower.includes(currentSearch)
    ) {
      return;
    }

    const div = document.createElement('div');
    div.className = 'note-card';
    div.style.position = 'relative';

    if (
      id === newestNoteId ||
      (pendingNewNoteTime && time === pendingNewNoteTime)
    ) {
      div.classList.add('new-note-highlight');

      setTimeout(() => {
        div.scrollIntoView({
          behavior: 'smooth',
          block: 'center',
          inline: 'nearest'
        });
      }, 300);

      setTimeout(() => {
        div.classList.remove('new-note-highlight');
        newestNoteId = null;
        pendingNewNoteTime = null;
      }, 2600);
    }

    const safeTitle = escapeHtml(title);
const displayNote = sanitizeNoteHtml(String(note || ""));
div.innerHTML = `
  <div class="note-title">${safeTitle}</div>
  <div class="note-content">${displayNote}</div>
      ${image ? `<img class="zoomable" src="${image}" style="max-width:100%; margin-top:10px; border-radius:6px; cursor:zoom-in;" />` : ""}
      <div style="font-size:12px; margin-top:10px; color:#555;">${time ? new Date(time).toLocaleString() : ""}</div>
      ${url ? `<div class="note-url"><a href="${url}" target="_blank"><span class="icon">🔗</span>Open URL</a></div>` : ""}
      <div class="note-actions">
        <button type="button" class="edit-btn">Edit</button>
        <button type="button" class="delete-btn">Delete</button>
      </div>
    `;

    const editBtn = div.querySelector('.edit-btn');
    const deleteBtn = div.querySelector('.delete-btn');

    editBtn.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      enableEditing(div, id, title, note);
    });

    deleteBtn.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      deleteNote(id);
    });

    let pressTimer;
let didLongPress = false;

div.addEventListener('pointerdown', (e) => {
  if (e.target.closest('button, a, input, textarea, [contenteditable="true"], .zoomable')) return;

  didLongPress = false;

  pressTimer = setTimeout(() => {
    didLongPress = true;
    div.classList.add('actions-visible');
  }, 600);
});

div.addEventListener('pointerup', () => {
  clearTimeout(pressTimer);
});

div.addEventListener('pointerleave', () => {
  clearTimeout(pressTimer);
});

    div.addEventListener('click', (e) => {
	if (didLongPress) {
  didLongPress = false;
  return;
}

      if (
        e.target.closest('button, a, input, textarea, [contenteditable="true"], .zoomable')
      ) {
        return;
      }

      const copiedText = div.querySelector('.note-content').innerText
        .replace(/\r\n/g, '\n')
        .replace(/\n{3,}/g, '\n\n')
        .trim();

      navigator.clipboard.writeText(copiedText).then(() => {
        const tick = document.createElement('div');
        tick.textContent = '✔';
        tick.style.position = 'absolute';
        tick.style.top = '10px';
        tick.style.right = '10px';
        tick.style.color = '#d291bc';
        tick.style.fontSize = '20px';
        tick.style.opacity = '0';
        tick.style.pointerEvents = 'none';
        tick.style.transition = 'all 0.6s ease-out';
        div.appendChild(tick);

        requestAnimationFrame(() => {
          tick.style.opacity = '1';
          tick.style.transform = 'scale(1.5)';
        });

        setTimeout(() => {
          tick.style.opacity = '0';
          tick.style.transform = 'scale(0.8)';
        }, 600);

        setTimeout(() => {
          tick.remove();
        }, 1200);
      });
    });

    list.appendChild(div);
  });

  setupImageZoom();
}

function renderNotes() {
  if (unsubscribeNotes) return;

  unsubscribeNotes = onSnapshot(notesCol, snapshot => {
    buildNoteCards(snapshot);
  });
}

function renderNotesOnce() {
  if (unsubscribeNotes) {
    unsubscribeNotes();
    unsubscribeNotes = null;
  }

  renderNotes();
}

function setupImageZoom() {
  const modal = document.getElementById("imgModal");
  const modalImg = document.getElementById("modalImg");

  document.querySelectorAll(".zoomable").forEach(img => {
    img.addEventListener("click", (e) => {
      e.stopPropagation();
      modal.style.display = "flex";
      modalImg.src = img.src;
    });
  });

  modal.onclick = () => {
    modal.style.display = "none";
  };
}
  function searchNotes(event) {
  currentSearch = event.target.value.toLowerCase();
  renderNotesOnce();
}

  document.addEventListener('DOMContentLoaded', () => {
    const searchInput = document.getElementById('searchInput');
    if (searchInput) {
      searchInput.addEventListener('keyup', searchNotes);
    }
  });

  window.addNote = addNote;
  window.deleteNote = deleteNote;
  window.saveEdit = saveEdit;
  window.enableEditing = enableEditing;
  window.renderNotes = renderNotes;

  renderNotes();

  
 // Toggle form
const toggleBtn = document.getElementById('toggleFormBtn');
const nurseForm = document.getElementById('nurseFormWrapper');

function openAddPanel() {
  nurseForm.classList.add('show');
  toggleBtn.textContent = '×';
}

function closeAddPanel() {
  nurseForm.classList.remove('show');
  toggleBtn.textContent = '+';
}

toggleBtn.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  e.stopPropagation();

  if (nurseForm.classList.contains('show')) {
    closeAddPanel();
  } else {
    openAddPanel();
  }
});

nurseForm.addEventListener('pointerdown', (e) => {
  e.stopPropagation();
});

document.addEventListener('pointerdown', (e) => {
  if (
    nurseForm.classList.contains('show') &&
    !nurseForm.contains(e.target) &&
    !toggleBtn.contains(e.target)
  ) {
    closeAddPanel();
  }
});

document.addEventListener('pointerdown', (e) => {
  if (!e.target.closest('.note-card')) {
    document.querySelectorAll('.note-card.actions-visible').forEach(card => {
      card.classList.remove('actions-visible');
    });
  }
});

</script>
