<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js">
  <script src="auth-guard.js"></script>
  <script src="security.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="header-rays.css?v=1">
  <title>Inteleviewer Access</title>
  <style>
    @font-face {
      font-family: 'fors';
      src: url('fors.ttf') format('truetype');
    }

   body {
  font-family: 'fors', sans-serif;
  margin: 0;
  padding: 22px;
  min-height: 100vh;

  background:
    radial-gradient(circle at 16% 14%, rgba(176, 212, 225, 0.72), transparent 34%),
    radial-gradient(circle at 6% 84%, rgba(216, 196, 220, 0.46), transparent 36%),
    radial-gradient(circle at 42% 76%, rgba(180, 211, 220, 0.62), transparent 42%),
    radial-gradient(circle at 86% 18%, rgba(235, 229, 246, 0.50), transparent 34%),
    linear-gradient(135deg, #f8f8f6, #edf3f5, #f7f4f8);

  color: #222;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.page-center {
  min-height: calc(100vh - 44px);
  display: flex;
  flex-direction: column;
  justify-content: center;
}

h1 {
  text-align: center;
  margin: 0 0 42px;
  color: #2a2a2a;
  font-weight: 700;
  letter-spacing: 0.02em;
  text-shadow: none;
}

    /* Glassy frosted panels for fixed top buttons */
    .top-right {
  position: fixed;
  top: 10px;
  right: 10px;
  z-index: 1000;

  display: flex;
  align-items: center;
  gap: 10px;

  background: rgba(255 255 255 / 0.25);
  border-radius: 12px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 8px 32px rgba(100, 100, 150, 0.15), 0 0 10px rgba(255 255 255 / 0.2);
  padding: 8px 12px;
  user-select: none;
}

    /* Buttons styled with subtle glass look */
    .icon-btn {
      background: rgba(255 255 255 / 0.35);
      border: 1px solid rgba(255 255 255 / 0.6);
      padding: 8px 12px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      transition: background-color 0.3s ease, box-shadow 0.3s ease;
      color: #444;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: inset 0 1px 0 rgba(255 255 255 / 0.7);
    }
    .icon-btn:hover {
      background: rgba(255 255 255 / 0.55);
      box-shadow: 0 4px 15px rgba(120 120 160 / 0.25);
      color: #222;
    }

    /* Search box with glass effect */
    .search-box {
      display: none;
      padding: 6px 10px;
      border: 1px solid rgba(255 255 255 / 0.6);
      border-radius: 12px;
      font-family: 'fors', sans-serif;
      font-size: 14px;
      color: #222;
      background: rgba(255 255 255 / 0.25);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: inset 0 1px 0 rgba(255 255 255 / 0.7);
      transition: opacity 0.3s ease;
      width: 180px;
    }

   .table-shell {
  width: min(620px, calc(100vw - 28px));
  margin: 0 auto;
  padding: 0;
  background: transparent;
  border: none;
  box-shadow: none;
  overflow-x: visible;
}


table {
  width: 100%;
  table-layout: fixed;
  border-collapse: separate;
  border-spacing: 0 8px;
  background: transparent;
  box-shadow: none;
}

td:nth-child(1) {
  width: 30%;
}

td:nth-child(2) {
  width: 25%;
}

td:nth-child(3) {
  width: 30%;
}

td:nth-child(4) {
  width: 150px;
}

thead {
  display: none;
}

tbody tr {
  transition: 0.18s ease;
}

td {
  padding: 12px 14px;
  border: none;
  vertical-align: middle;
}

tbody tr td:nth-child(1),
tbody tr td:nth-child(2),
tbody tr td:nth-child(3) {
  background: rgba(255, 255, 255, 0.34);
  backdrop-filter: blur(24px) saturate(190%);
  -webkit-backdrop-filter: blur(24px) saturate(190%);
  border-top: 1px solid rgba(255, 255, 255, 0.82);
  border-bottom: 1px solid rgba(255, 255, 255, 0.38);
  box-shadow:
    0 14px 34px rgba(70, 76, 90, 0.13),
    inset 0 1px 0 rgba(255, 255, 255, 0.82),
    inset 0 -1px 0 rgba(255, 255, 255, 0.22);
}

tbody tr:hover td:nth-child(1),
tbody tr:hover td:nth-child(2),
tbody tr:hover td:nth-child(3) {
  background: rgba(255, 255, 255, 0.46);
}

/* Rounded info container only */
tbody tr td:first-child {
  border-radius: 15px 0 0 15px;
}

tbody tr td:nth-child(3) {
  border-radius: 0 15px 15px 0;
}

/* Icons live outside the info container */
tbody tr td:nth-child(4) {
  background: transparent;
  box-shadow: none;
  padding-left: 12px;
  width: 150px;
}



.toast {
  position: fixed;
  left: 50%;
  bottom: 24px;
  transform: translateX(-50%) translateY(20px);
  opacity: 0;
  pointer-events: none;
  z-index: 3000;

  padding: 10px 18px;
  border-radius: 999px;
  color: #313247;
  font-size: 13px;
  font-weight: 600;

  background: rgba(255, 255, 255, 0.65);
  border: 1px solid rgba(255, 255, 255, 0.82);
  backdrop-filter: blur(18px) saturate(180%);
  -webkit-backdrop-filter: blur(18px) saturate(180%);
  box-shadow: 0 14px 34px rgba(70, 80, 130, 0.20);

  transition: 0.25s ease;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}


@media (max-width: 720px) {
  body {
    padding: 16px 10px;
  }

  h1 {
    margin-top: 72px;
    font-size: 25px;
  }

  .table-shell {
    width: calc(100vw - 20px);
  }

  table {
    min-width: 690px;
  }
}

.password-click {
  cursor: pointer;
}

.password-click:hover {
  background: rgba(255, 255, 255, 0.42);
}

input[type="text"],
input[type="password"] {
  border: none;
  border-radius: 10px;
  background: transparent;
  padding: 8px 6px;
  font-family: 'fors', sans-serif;
  font-size: 14px;
  color: #222;
  outline: none;
  width: 100%;
  box-sizing: border-box;
}

input[type="text"]:disabled,
input[type="password"]:disabled {
  color: #242424;
  opacity: 1;
  -webkit-text-fill-color: #242424;
}

input[type="text"]:focus,
input[type="password"]:focus {
  background: rgba(255, 255, 255, 0.55);
  box-shadow: 0 0 0 1px rgba(120, 125, 145, 0.18);
}

td:first-child input {
  font-weight: 700;
  letter-spacing: 0.01em;
}


.btn {
  background: rgba(255, 255, 255, 0.62);
  border: 1px solid rgba(210, 214, 220, 0.8);
  padding: 5px 8px;
  border-radius: 9px;
  font-size: 12px;
  cursor: pointer;
  color: #444;
  transition: 0.18s ease;
  min-width: 30px;
}

.btn:hover {
  background: white;
  box-shadow: 0 6px 14px rgba(80, 85, 100, 0.12);
}

.row-tools {
  display: none;
  gap: 6px;
}

body.edit-mode .row-tools {
  display: flex;
}

td:nth-child(4) {
  display: none;
}

body.edit-mode td:nth-child(4) {
  display: table-cell;
}

.add-toggle-wrap {
  width: min(620px, calc(100vw - 28px));
  margin: 18px auto 0;
  display: flex;
  justify-content: flex-end;
}

.add-toggle {
  border: none;
  cursor: pointer;
  border-radius: 999px;
  padding: 8px 13px;
  font-size: 15px;
  background: rgba(255, 255, 255, 0.68);
  box-shadow: 0 8px 20px rgba(70, 76, 90, 0.08);
}

.add-section {
  display: none;
  width: min(520px, calc(100vw - 36px));
  margin: 16px auto 0;
  padding: 18px;
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.68);
  box-shadow: 0 12px 30px rgba(70, 76, 90, 0.10);
  box-sizing: border-box;
}

.add-section.show {
  display: block;
}

.add-section h3 {
  margin: 0 0 14px;
  font-weight: 600;
  color: #2a2a2a;
  text-shadow: none;
}

.add-section input {
  display: block;
  width: 100%;
  margin-bottom: 10px;
  border-radius: 12px;
  background: rgba(245, 245, 245, 0.9);
  padding: 10px 12px;
}

@media print {
  @page {
    margin: 18mm 12mm;
  }

  body * {
    visibility: hidden;
  }

  h1 {
    visibility: visible !important;
    display: block !important;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;

    text-align: center;
    font-size: 32px !important;
    font-weight: 700;
    margin: 0;
    padding: 0;
    color: #000;
  }

  table,
  table * {
    visibility: visible;
  }

  table {
    position: absolute;
    top: 95px;
    left: 0;
    width: 100%;
  }

  .top-right,
.add-section,
.add-toggle-wrap {
  display: none !important;
}

  .row-tools,
  .password-tools {
    display: none !important;
  }

  th:nth-child(4),
  td:nth-child(4) {
    display: none !important;
  }

  input[type="text"],
  input[type="password"] {
    border: none;
    background: transparent;
    color: #000;
    font-size: 13px;
  }
}
 
  </style>
</head>
<body>


  <div class="top-right">
  <button class="icon-btn" onclick="toggleSearch()">🔍</button>
  <input type="text" id="searchInput" class="search-box" placeholder="Search..." oninput="filterTable()">
  <button class="icon-btn" onclick="toggleEditMode()" title="Edit mode">✏️</button>
  <button class="icon-btn" onclick="window.print()">🖨️</button>
</div>

<div class="page-center">

<h1>Inteleviewer Access</h1>
<div id="toast" class="toast">Copied</div>

<div class="table-shell">

  <table>
    <thead>
      <tr>
        <th>Radiology</th>
        <th>Username</th>
        <th>Password</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  </div>
  
<div class="add-toggle-wrap">
  <button class="add-toggle" onclick="toggleAddSection()">＋ Add access</button>
</div>

  <div class="add-section">
    <h3>Add New Access</h3>
    <input type="text" id="newRadiology" placeholder="Radiology">
    <input type="text" id="newUsername" placeholder="Username">
    <input type="text" id="newPassword" placeholder="Password">
    <button class="btn" onclick="addEntry()">Add</button>
</div>
</div>

<script type="module">
    import { initializeApp, getApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import {
      getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyAgYsVQNEOyQa41NkXXT2VuKClqXAxfG1Q",
      authDomain: "cepx-f9d2a.firebaseapp.com",
      projectId: "cepx-f9d2a",
      storageBucket: "cepx-f9d2a.appspot.com",
      messagingSenderId: "840696526325",
      appId: "1:840696526325:web:b9bcb4669fbfad066a1cbc"
    };

    const app = getApps().length ? getApp() : initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const collectionRef = collection(db, 'inteleviewerData');
    const tableBody = document.getElementById('tableBody');
    let allDocs = [];

    function createRow(docSnap) {
      const data = docSnap.data();
      const id = docSnap.id;

      const tr = document.createElement('tr');

      tr.innerHTML = `
  <td>
    <input type="text" value="${data.radiology || ''}" id="rad-${id}" disabled>
  </td>

  <td>
    <input type="text" value="${data.username || ''}" id="user-${id}" disabled>
  </td>

  <td>
  <input
    type="text"
    value="${data.password || ''}"
    id="pass-${id}"
    class="password-click"
    onclick="if (this.readOnly) copyToClipboard(this.value)"
    title="Click to copy password"
    readonly
  >
</td>

  <td>
  <div class="row-tools">
  <button class="btn" onclick="enableEdit('${id}')" title="Edit">✏️</button>
  <button class="btn" onclick="saveEntry('${id}')" style="display: none;" id="save-${id}" title="Save">💾</button>
  <button class="btn" onclick="deleteEntry('${id}')" title="Delete">🗑️</button>
</div>
</td>
`;
      return tr;
    }

    onSnapshot(collectionRef, (snapshot) => {
      allDocs = [];
      snapshot.forEach(doc => allDocs.push(doc));
      displayTable(allDocs);
    });

    function displayTable(docs) {
      tableBody.innerHTML = '';
      docs.forEach(docSnap => {
        tableBody.appendChild(createRow(docSnap));
      });
    }

    function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');

  setTimeout(() => {
    toast.classList.remove('show');
  }, 1400);
}

window.copyToClipboard = (text) => {
  navigator.clipboard.writeText(text).then(() => {
    showToast("Copied");
  });
};



    window.enableEdit = (id) => {
      document.getElementById(`rad-${id}`).disabled = false;
      document.getElementById(`user-${id}`).disabled = false;
      document.getElementById(`pass-${id}`).readOnly = false;
      document.getElementById(`save-${id}`).style.display = 'inline-block';
    };
	
	window.toggleEditMode = () => {
  document.body.classList.toggle('edit-mode');
};
	
	window.toggleAddSection = () => {
  document.querySelector('.add-section').classList.toggle('show');
};

    window.saveEntry = async (id) => {
      const radiology = document.getElementById(`rad-${id}`).value.trim();
      const username = document.getElementById(`user-${id}`).value.trim();
      const password = document.getElementById(`pass-${id}`).value.trim();

      if (!radiology || !username || !password) return alert("All fields are required");

      await updateDoc(doc(db, 'inteleviewerData', id), { radiology, username, password });

      document.getElementById(`rad-${id}`).disabled = true;
      document.getElementById(`user-${id}`).disabled = true;
      document.getElementById(`pass-${id}`).readOnly = true;
      document.getElementById(`save-${id}`).style.display = 'none';
    };

    window.addEntry = async () => {
      const radiology = document.getElementById('newRadiology').value.trim();
      const username = document.getElementById('newUsername').value.trim();
      const password = document.getElementById('newPassword').value.trim();

      if (!radiology || !username || !password) return alert("All fields required");

      await addDoc(collectionRef, { radiology, username, password });

      document.getElementById('newRadiology').value = '';
document.getElementById('newUsername').value = '';
document.getElementById('newPassword').value = '';

document.querySelector('.add-section').classList.remove('show');
showToast("Added");
};

window.deleteEntry = async (id) => {
      if (confirm("Delete this entry?")) {
        await deleteDoc(doc(db, 'inteleviewerData', id));
      }
    };

    window.toggleSearch = () => {
      const searchBox = document.getElementById('searchInput');
      searchBox.style.display = searchBox.style.display === 'inline-block' ? 'none' : 'inline-block';
      if (searchBox.style.display === 'inline-block') searchBox.focus();
    };

    window.filterTable = () => {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const filteredDocs = allDocs.filter(doc => {
        const data = doc.data();
        return (
          data.radiology.toLowerCase().includes(searchTerm) ||
          data.username.toLowerCase().includes(searchTerm) ||
          data.password.toLowerCase().includes(searchTerm)
        );
      });
      displayTable(filteredDocs);
    };
  </script>
  <script src="header-rays.js?v=1"></script>
</body>
</html>
