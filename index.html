<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Secure sign in</title>
  <style>
  
  @font-face {
  font-family: 'hellohon';
  src: url('hellohon.otf') format('opentype');
  font-weight: normal;
  font-style: normal;
}

    html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  font-family: 'Tahoma', sans-serif;
  overflow-x: hidden;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* Background image with full-page blur overlay */
body::before {
  content: "";
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: url('site-background.webp') no-repeat center center fixed;
  background-size: cover;
  filter: blur(10px) brightness(0.9);
  z-index: -1;
}

/* Date and time box */
#datetime {
  text-align: center;
  font-size: 180px;
  color: black
  margin-bottom: 25px;
  line-height: 1.3;
  user-select: none;
  text-shadow: 0 1px 3px rgba(150, 150, 200, 0.5);
}

#date-part {
  font-family: 'hellohon', sans-serif;
  font-weight: bold;
  font-size: 100px;
}

#time-part {
  font-size: 30px;
  margin-top: 6px;
}

.password-container {
  background: rgba(255, 255, 255, 0.15); /* more transparent */
  border-radius: 16px;
  padding: 30px 25px;
  width: 320px;
  box-shadow:
    0 8px 32px rgba(100, 100, 180, 0.2),
    inset 0 0 0 1px rgba(255, 255, 255, 0.3);
  backdrop-filter: blur(12px) saturate(180%);
  -webkit-backdrop-filter: blur(12px) saturate(180%);
  border: 1px solid rgba(255, 255, 255, 0.3);
  text-align: center;
  color: #38386f;
  user-select: none;
  position: relative;
  z-index: 2;
}



/* Title in container */
.password-container h2 {
  margin-top: 0;
  margin-bottom: 20px;
  font-weight: 500;
  font-size: 26px;
  color: #3e3e7a;
  text-shadow: 0 1px 2px rgba(200, 200, 255, 0.5);
}

/* Inputs */
input[type="password"] {
  width: 90%;
  padding: 12px 14px;
  border-radius: 10px;
  border: 1px solid rgba(150, 160, 255, 0.5);
  background: rgba(255, 255, 255, 0.25);
  color: #2f2f6d;
  font-size: 16px;
  box-shadow: inset 0 2px 5px rgba(255 255 255 / 0.8);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  transition: border-color 0.3s ease;
  user-select: text;
}

input[type="password"]:focus {
  outline: none;
  border-color: #7a85ff;
  background: rgba(255, 255, 255, 0.4);
}

/* Button */
button {
  margin-top: 15px;
  padding: 12px 24px;
  background: rgba(130, 140, 255, 0.6);
  border: none;
  border-radius: 10px;
  color: white;
  font-weight: 700;
  font-size: 16px;
  cursor: pointer;
  box-shadow:
    0 4px 14px rgba(110, 120, 255, 0.5);
  transition: background-color 0.3s ease;
  user-select: none;
}

button:hover {
  background: rgba(90, 95, 220, 0.8);
}

/* Responsive tweaks */
@media (max-width: 600px) {
  .password-container {
    width: 90%;
    padding: 20px 15px;
  }

  #datetime {
    font-size: 24px;
  }

  #date-part {
    font-size: 20px;
  }

  #time-part {
    font-size: 18px;
  }
}

  </style>
  <link rel="stylesheet" href="site-background.css">
</head>
<body>

  <!-- Live date and time above the container -->
  <div id="datetime">
  <div id="date-part"></div>
  <div id="time-part"></div>
</div>

  <div class="password-container">
    <h2 style="color: black;">Secure sign in</h2>
    <p id="signInStatus" style="font-size: 14px; color: #2f2f6d;">Use the approved Google account to continue.</p>
    <button id="googleSignIn" type="button">Sign in with Google</button>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>

  <script>
    // Live date & time display
    function updateDateTime() {
  const now = new Date();
  const dateStr = now.toLocaleDateString(undefined, {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });
  const timeStr = now.toLocaleTimeString();

  document.getElementById('date-part').textContent = dateStr;
  document.getElementById('time-part').textContent = timeStr;
}
setInterval(updateDateTime, 1000);
updateDateTime();


    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyAgYsVQNEOyQa41NkXXT2VuKClqXAxfG1Q",
      authDomain: "cepx-f9d2a.firebaseapp.com",
      projectId: "cepx-f9d2a",
      storageBucket: "cepx-f9d2a.firebasestorage.com",
      messagingSenderId: "840696526325",
      appId: "1:840696526325:web:b9bcb4669fbfad066a1cbc"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const allowedEmail = "xeve06@gmail.com";
    const params = new URLSearchParams(location.search);
    const requestedPage = params.get("returnTo") || "home.html";
    const safeReturnTo = /^[A-Za-z0-9 _.-]+\.html$/.test(requestedPage)
      ? requestedPage
      : "home.html";
    const status = document.getElementById("signInStatus");
    const signInButton = document.getElementById("googleSignIn");

    async function finishSignIn(user) {
      if (!user) return;

      if (user.emailVerified && String(user.email || "").toLowerCase() === allowedEmail) {
        location.replace(safeReturnTo);
        return;
      }

      await auth.signOut();
      status.textContent = `Access is restricted to ${allowedEmail}.`;
      signInButton.disabled = false;
    }

    auth.onAuthStateChanged(finishSignIn);

    signInButton.addEventListener("click", async () => {
      signInButton.disabled = true;
      status.textContent = "Opening Google sign in…";

      try {
        const provider = new firebase.auth.GoogleAuthProvider();
        provider.setCustomParameters({ login_hint: allowedEmail });
        const result = await auth.signInWithPopup(provider);
        await finishSignIn(result.user);
      } catch (error) {
        console.error("Google sign in failed.", error);
        status.textContent = "Sign in failed. Please try again.";
        signInButton.disabled = false;
      }
    });
  </script>
</body>
</html>
