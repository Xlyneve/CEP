  <style>

    .notes-cell {

.vaccine-card-grid {

<body>

  <h1 class="page-title">Vaccines</h1>

  <input type="text" id="searchBox" placeholder="Search..." />

  <div class="w-full page-content">

  <div id="vaccineFormWrapper">
    <form id="vaccineForm" class="grid grid-cols-12 gap-x-1 gap-y-2 items-start">
  <!-- Input fields -->
  <input id="inj" type="text" placeholder="Inj" class="border p-2 col-span-1 w-full h-16" required />
  <input id="name" type="text" placeholder="Vaccine Name" class="border p-2 text-sm col-span-2 w-full h-16" required />
  <input id="price" type="text" placeholder="Price" class="border p-2 col-span-1 w-full h-16" />
  <input id="url" type="text" placeholder="Medsafe URL" class="border p-2 text-sm col-span-2 w-full h-16" />

  <!-- Notes + Add -->
<div class="col-span-6 flex items-start space-x-2">
  <div id="notes" contenteditable="true" class="vaccine-notes-input"></div>

  <button type="submit" class="add-vaccine-btn">Add Vaccine</button>
</div>
        </form>
  </div>

  <button id="toggleVaccineFormBtn" type="button">+</button>
  <div id="vaccineCards" class="vaccine-card-grid"></div>
  <div id="cardZoomOverlay" class="card-zoom-overlay">
  <div class="card-zoom-modal">
    <button id="closeCardZoom" class="card-zoom-close">×</button>
    <div id="cardZoomContent"></div>
  </div>
</div>
  
  </div>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
  import {
    getFirestore, collection, addDoc, onSnapshot,
    updateDoc, deleteDoc, doc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAgYsVQNEOyQa41NkXXT2VuKClqXAxfG1Q",
    authDomain: "cepx-f9d2a.firebaseapp.com",
    projectId: "cepx-f9d2a",
    storageBucket: "cepx-f9d2a.appspot.com",
    messagingSenderId: "840696526325",
    appId: "1:840696526325:web:b9bcb4669fbfad066a1cbc"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const vaccineRef = collection(db, "vaccines");

  const form = document.getElementById("vaccineForm");
  const vaccineCards = document.getElementById("vaccineCards");
  const searchBox = document.getElementById("searchBox");
  
  const cardZoomOverlay = document.getElementById("cardZoomOverlay");
const cardZoomContent = document.getElementById("cardZoomContent");
const closeCardZoom = document.getElementById("closeCardZoom");

  let fullData = [];
  let latestData = [];
  let editId = null;
  let currentSearch = ""; // <-- persist filter

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const inj = document.getElementById("inj").value.trim();
    const name = document.getElementById("name").value.trim();
    const price = document.getElementById("price").value.trim();
    const url = document.getElementById("url").value.trim();
    const notes = document.getElementById("notes").innerHTML.trim();

    if (inj && name) {
      await addDoc(vaccineRef, {
        inj, name, price, url, notes,
        timestamp: serverTimestamp()
      });
      form.reset();
document.getElementById("notes").innerHTML = '';
closeVaccineForm();
    }
  });
 
function stripHtml(html) {
  const div = document.createElement("div");
  div.innerHTML = html || "";
  return div.textContent || div.innerText || "";
}

  function applyFilter() {
  const query = currentSearch.toLowerCase();

  vaccineCards.classList.toggle("searching", !!query);

  if (!query) {
    latestData = [...fullData];
  } else {
      latestData = fullData.filter(({ data }) => {
        const v = data;
        return (
          (v.inj || '').toLowerCase().includes(query) ||
          (v.name || '').toLowerCase().includes(query) ||
          (v.price || '').toLowerCase().includes(query) ||
          stripHtml(v.notes || '').toLowerCase().includes(query)
        );
      });
    }
  }
  
  function escapeAttr(value) {
  return String(value || "")
    .replaceAll("&", "&amp;")
    .replaceAll('"', "&quot;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}

function applyGradientHighlight() {
  const selection = window.getSelection();
  if (!selection || selection.rangeCount === 0 || selection.isCollapsed) return;

  const range = selection.getRangeAt(0);
  const span = document.createElement("span");
  span.className = "note-gradient-highlight";

  try {
    range.surroundContents(span);
  } catch (err) {
    const selectedText = range.extractContents();
    span.appendChild(selectedText);
    range.insertNode(span);
  }

  selection.removeAllRanges();
}

function convertOldHighlights(html) {
  return String(html || "")
    .replaceAll('background-color: rgb(255, 246, 204);', '')
    .replaceAll('background-color: rgb(255, 246, 204)', '')
    .replaceAll('background-color: #fff6cc;', '')
    .replaceAll('background-color: #fff6cc', '')
    .replaceAll('background-color: rgb(234, 248, 255);', '')
    .replaceAll('background-color: rgb(234, 248, 255)', '')
    .replaceAll('background-color: #eaf8ff;', '')
    .replaceAll('background-color: #eaf8ff', '')
    .replaceAll('<span style="">', '<span class="note-gradient-highlight">');
}

function openCardZoom(v) {
  cardZoomContent.innerHTML = `
    <div class="zoom-card-title">💉 ${v.name || "Untitled vaccine"}</div>

    <div class="zoom-card-meta">
      ${v.inj ? `<span class="vaccine-pill">${v.inj}</span>` : ""}
      ${v.price ? `<span class="vaccine-pill">${v.price}</span>` : ""}
      ${v.url ? `<a class="vaccine-link" href="${v.url}" target="_blank">Medsafe</a>` : ""}
    </div>

    <div class="zoom-card-notes">${convertOldHighlights ? convertOldHighlights(v.notes || "") : (v.notes || "")}</div>
  `;

  cardZoomOverlay.classList.add("show");
}
closeCardZoom.addEventListener("click", () => {
  cardZoomOverlay.classList.remove("show");
});

cardZoomOverlay.addEventListener("click", (e) => {
  if (e.target === cardZoomOverlay) {
    cardZoomOverlay.classList.remove("show");
  }
});

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    cardZoomOverlay.classList.remove("show");
  }
});

  function renderCards() {
  vaccineCards.innerHTML = "";

  latestData.forEach(docSnap => {
    const v = docSnap.data;
    const id = docSnap.id;

    const card = document.createElement("div");
    card.className = "vaccine-card";
    card.dataset.id = id;

    if (editId === id) {
      card.classList.add("editing-card");
    }

    let pressTimer;

    card.addEventListener("pointerdown", (e) => {
      if (e.target.closest("button, a, input, textarea, [contenteditable='true']")) return;

      pressTimer = setTimeout(() => {
        card.classList.add("actions-visible");
      }, 600);
    });

    card.addEventListener("pointerup", () => {
      clearTimeout(pressTimer);
    });

    card.addEventListener("pointerleave", () => {
      clearTimeout(pressTimer);
    });

    if (editId === id) {
      card.innerHTML = `
        <input class="edit-input" id="edit-inj" value="${escapeAttr(v.inj)}" placeholder="Type">
		<input class="edit-input" id="edit-name" value="${escapeAttr(v.name)}" placeholder="Vaccine name">
		<input class="edit-input" id="edit-price" value="${escapeAttr(v.price)}" placeholder="Price">
		<input class="edit-input" id="edit-url" value="${escapeAttr(v.url)}" placeholder="Medsafe URL">

        <div class="edit-tools">
          <button type="button" class="edit-bold-btn">B</button>
          <button type="button" class="edit-highlight-btn">Highlight</button>
        </div>

        <div id="edit-notes"
             contenteditable="true"
             class="edit-notes-box">${convertOldHighlights(v.notes || '')}</div>

        <div class="vaccine-card-actions">
          <button onclick="saveVaccine()">Save</button>
          <button onclick="cancelEdit()">Cancel</button>
        </div>
      `;


      const editNotes = card.querySelector("#edit-notes");
      const editBoldBtn = card.querySelector(".edit-bold-btn");
      const editHighlightBtn = card.querySelector(".edit-highlight-btn");

      editBoldBtn.addEventListener("mousedown", (e) => {
        e.preventDefault();
        editNotes.focus();
        document.execCommand("bold");
      });

      editHighlightBtn.addEventListener("mousedown", (e) => {
        e.preventDefault();
        editNotes.focus();
        applyGradientHighlight();
      });

    } else {
      card.innerHTML = `
        <div class="vaccine-card-title">💉 ${v.name || 'Untitled vaccine'}</div>

        <div class="vaccine-card-meta">
          ${v.inj ? `<span class="vaccine-pill">${v.inj}</span>` : ""}
          ${v.price ? `<span class="vaccine-pill">${v.price}</span>` : ""}
          ${v.url ? `<a class="vaccine-link" href="${v.url}" target="_blank">Medsafe</a>` : ""}
        </div>

        <div class="vaccine-card-notes">${convertOldHighlights(v.notes || "")}</div>

        <div class="vaccine-card-actions">
          <button onclick="editVaccine('${id}')">Edit</button>
          <button onclick="deleteVaccine('${id}')">Delete</button>
        </div>
      `;

      vaccineCards.appendChild(card);

card.addEventListener("click", (e) => {
  if (e.target.closest("button, a")) return;
  if (card.classList.contains("actions-visible")) return;
  openCardZoom(v);
});
    }
  });
}


  onSnapshot(vaccineRef, snapshot => {
    fullData = snapshot.docs.map(doc => ({
      id: doc.id,
      data: doc.data()
    }));

    // preserve current search
    applyFilter();
    renderCards();
  });

  window.editVaccine = (id) => {
  editId = id;
  renderCards();

  requestAnimationFrame(() => {
    const editedCard = document.querySelector(`.vaccine-card[data-id="${id}"]`);
    if (editedCard) {
      editedCard.scrollIntoView({
        behavior: "smooth",
        block: "center"
      });

      const firstInput = editedCard.querySelector(".edit-input");
      if (firstInput) firstInput.focus();
    }
  });
};

  window.cancelEdit = () => {
    editId = null;
    renderCards();
  };

  window.saveVaccine = async () => {
    if (!editId) return;

    const inj = document.getElementById("edit-inj").value.trim();
    const name = document.getElementById("edit-name").value.trim();
    const price = document.getElementById("edit-price").value.trim();
    const url = document.getElementById("edit-url").value.trim();
    const notes = document.getElementById("edit-notes").innerHTML.trim();

    if (inj && name) {
      const docRef = doc(db, "vaccines", editId);
      await updateDoc(docRef, { inj, name, price, url, notes, timestamp: serverTimestamp() });
      editId = null;
      // reapply current filter after edit
      applyFilter();
      renderCards();
    }
  };

  window.deleteVaccine = async (id) => {
    await deleteDoc(doc(db, "vaccines", id));
  };

  searchBox.addEventListener("input", () => {
    currentSearch = searchBox.value; // store current filter
    applyFilter();
    renderCards();
  });

  // Text formatting function
  window.formatText = function (command, value = null) {
    document.execCommand(command, false, value);
  };

    // Keyboard shortcuts for formatting
  document.addEventListener("keydown", function (e) {
    if (e.ctrlKey) {
      const active = document.activeElement;
      if (active && active.isContentEditable) {
        switch (e.key.toLowerCase()) {
          case "b":
            e.preventDefault();
            formatText("bold");
            break;
          case "u":
            e.preventDefault();
            formatText("underline");
            break;
          case "h":
            e.preventDefault();
            applyGradientHighlight();
            break;
        }
      }
    }
  });
document.addEventListener("pointerdown", (e) => {
  if (!e.target.closest(".vaccine-card")) {
    document.querySelectorAll(".vaccine-card.actions-visible").forEach(card => {
  card.classList.remove("actions-visible");
});
  }
});
const toggleVaccineFormBtn = document.getElementById("toggleVaccineFormBtn");
const vaccineFormWrapper = document.getElementById("vaccineFormWrapper");

function openVaccineForm() {
  vaccineFormWrapper.classList.add("show");
  toggleVaccineFormBtn.textContent = "×";
}

function closeVaccineForm() {
  vaccineFormWrapper.classList.remove("show");
  toggleVaccineFormBtn.textContent = "+";
}

toggleVaccineFormBtn.addEventListener("pointerdown", (e) => {
  e.preventDefault();
  e.stopPropagation();

  if (vaccineFormWrapper.classList.contains("show")) {
    closeVaccineForm();
  } else {
    openVaccineForm();
  }
});

vaccineFormWrapper.addEventListener("pointerdown", (e) => {
  e.stopPropagation();
});

document.addEventListener("pointerdown", (e) => {
  if (
    vaccineFormWrapper.classList.contains("show") &&
    !vaccineFormWrapper.contains(e.target) &&
    !toggleVaccineFormBtn.contains(e.target)
  ) {
    closeVaccineForm();
  }
});
</script>
